<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-title" content="PiPa Admin">
<title>PiPa Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #0D0D0D;
  --surface: #1A1A1A;
  --surface2: #242424;
  --surface3: #2E2E2E;
  --surface4: #383838;
  --text: #F0EDE8;
  --text2: #8A8680;
  --text3: #5A5650;
  --accent: #B85C00;
  --accent-dim: rgba(184,92,0,0.15);
  --accent-bright: #D4700A;
  --green: #2D7A4F;
  --green-dim: rgba(45,122,79,0.15);
  --green-bright: #38966A;
  --red: #8B1A1A;
  --red-dim: rgba(180,30,30,0.18);
  --red-bright: #C0392B;
  --yellow: #7A6010;
  --yellow-dim: rgba(200,165,20,0.18);
  --yellow-bright: #C9A010;
  --blue: #1B3A5C;
  --blue-dim: rgba(27,58,92,0.25);
  --blue-bright: #2E6099;
  --purple: #4A2070;
  --purple-dim: rgba(74,32,112,0.2);
  --purple-bright: #7B3FBD;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html{min-height:100vh;background:#0D0D0D;}
html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: calc(var(--safe-top) + 10px) 16px 0;
  background: var(--bg);
}
.header-row {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 10px;
}
.header-title {
  font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text2);
  display: flex; align-items: center; gap: 8px;
}
.header-title .app-name { color: var(--text); }
.header-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent);
}
.header-link {
  font-size: 11px; color: var(--text3); text-decoration: none;
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid var(--surface3);
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 6px 6px calc(var(--safe-bottom) + 6px);
  background: var(--surface);
  border-top: 1px solid var(--surface3);
  display: flex; gap: 2px;
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.bottom-nav::-webkit-scrollbar { display: none; }
.bottom-nav::after{content:"";position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom,0px);background:var(--surface);z-index:99;}

.nav-tab {
  flex: 0 0 64px; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  padding: 6px 4px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text3);
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.03em; transition: all 0.15s; white-space: nowrap;
}
.nav-tab .nav-icon { font-size: 20px; line-height: 1; }
.nav-tab.active { color: var(--accent); background: var(--accent-dim); }
.nav-tab .badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); position: absolute;
  top: 6px; right: 6px;
}

/* ── SCROLL AREA ── */
.scroll-area {
  position: fixed;
  top: calc(var(--safe-top) + 56px);
  bottom: calc(var(--safe-bottom) + 68px);
  left: 0; right: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px 24px;
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text3);
  padding: 0 4px 8px; margin-top: 20px;
}
.section-label:first-child { margin-top: 0; }

/* ── CARD ── */
.card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px; margin-bottom: 8px;
  border: 1px solid transparent;
}
.card.border-green  { border-color: var(--green); }
.card.border-yellow { border-color: var(--yellow-bright); }
.card.border-red    { border-color: var(--red-bright); }
.card.border-blue   { border-color: var(--blue-bright); }
.card.border-accent { border-color: var(--accent); }

/* ── STATUS PILL ── */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 3px 8px; border-radius: 20px;
}
.pill-green  { background: var(--green-dim);  color: var(--green-bright); }
.pill-yellow { background: var(--yellow-dim); color: var(--yellow-bright); }
.pill-red    { background: var(--red-dim);    color: var(--red-bright); }
.pill-blue   { background: var(--blue-dim);   color: var(--blue-bright); }
.pill-purple { background: var(--purple-dim); color: var(--purple-bright); }
.pill-dim    { background: var(--surface3);   color: var(--text2); }

/* ── FORM ELEMENTS ── */
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text2);
  display: block; margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px;
  background: var(--surface2); border: 1.5px solid var(--surface3);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-select option { background: var(--surface2); }
.form-textarea { resize: none; line-height: 1.5; }
.form-row { display: flex; gap: 8px; }
.form-row .form-group { flex: 1; }

/* Toggle row */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--surface3);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 13px; color: var(--text); }
.toggle-sublabel { font-size: 11px; color: var(--text2); margin-top: 1px; }
.toggle {
  width: 44px; height: 26px; border-radius: 13px;
  background: var(--surface3); position: relative; cursor: pointer;
  transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: var(--green); }
.toggle::after {
  content: ''; width: 20px; height: 20px; border-radius: 50%;
  background: #fff; position: absolute; top: 3px; left: 3px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(18px); }

/* ── BUTTONS ── */
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--accent); color: #fff;
  border: none; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.btn-secondary {
  width: 100%; padding: 12px; border-radius: var(--radius);
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--surface3); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
}
.btn-danger {
  padding: 10px 16px; border-radius: var(--radius-sm);
  background: var(--red-dim); color: var(--red-bright);
  border: none; font-size: 12px; font-weight: 700; cursor: pointer;
}
.btn-sm {
  padding: 6px 12px; border-radius: var(--radius-sm);
  background: var(--surface3); color: var(--text2);
  border: none; font-size: 11px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-sm.green { background: var(--green-dim); color: var(--green-bright); }
.btn-sm.accent { background: var(--accent-dim); color: var(--accent-bright); }

/* ── CHECKLIST STEPS ── */
.checklist {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
}
.check-step {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  background: var(--surface2); color: var(--text3);
  border: 1.5px solid var(--surface3); transition: all 0.15s;
  user-select: none;
}
.check-step.done {
  background: var(--green-dim); color: var(--green-bright);
  border-color: var(--green);
}
.check-step .step-icon { font-size: 13px; }

/* ── ACTIVATION CARD ── */
.activation-name {
  font-size: 15px; font-weight: 700; margin-bottom: 4px;
}
.activation-meta {
  font-size: 11px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 10px; display: flex; gap: 12px; flex-wrap: wrap;
}
.activation-swap {
  font-size: 11px; color: var(--text2); margin-top: 8px;
  padding: 8px; background: var(--surface2); border-radius: var(--radius-sm);
}
.activation-notes {
  font-size: 12px; color: var(--text); margin-top: 8px;
  line-height: 1.5; padding: 8px; background: var(--surface2);
  border-radius: var(--radius-sm); border-left: 2px solid var(--accent);
}
.launch-btn {
  margin-top: 12px; width: 100%; padding: 12px;
  border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  background: var(--green-dim); color: var(--green-bright);
  transition: all 0.15s;
}
.launch-btn.launched {
  background: var(--green); color: #fff;
}

/* ── INVOICE CARD ── */
.invoice-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0; font-size: 13px;
}
.invoice-row .label { color: var(--text2); font-size: 12px; }
.invoice-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.invoice-checks {
  display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
}
.inv-check {
  padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--surface3);
  background: var(--surface2); color: var(--text3);
  transition: all 0.15s; user-select: none;
}
.inv-check.checked {
  background: var(--green-dim); color: var(--green-bright);
  border-color: var(--green);
}
.inv-check.flagged {
  background: var(--red-dim); color: var(--red-bright);
  border-color: var(--red-bright);
}

/* ── WASTE CARD ── */
.waste-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px;
}
.waste-item-name { font-size: 14px; font-weight: 600; }
.waste-detail { font-size: 11px; color: var(--text2); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

/* ── EVENT CARD ── */
.event-date-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent); font-weight: 700;
  margin-bottom: 6px;
}
.event-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.event-flags {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px;
}
.event-flag {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; background: var(--surface2); color: var(--text3);
}
.event-flag.active { background: var(--accent-dim); color: var(--accent-bright); }

/* ── SPECS ── */
.spec-search-wrap {
  position: sticky; top: -12px; z-index: 10;
  background: var(--bg); padding: 0 0 10px; margin: -4px 0 0;
}
.spec-search {
  width: 100%; padding: 12px 16px;
  background: var(--surface); border: 1.5px solid var(--surface3);
  border-radius: 24px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}
.spec-search:focus { border-color: var(--accent); }
.spec-search::placeholder { color: var(--text3); }

.spec-filter-row {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px;
  scrollbar-width: none;
}
.spec-filter-row::-webkit-scrollbar { display: none; }
.spec-filter {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  background: var(--surface); color: var(--text2);
  border: 1.5px solid transparent;
}
.spec-filter.active {
  border-color: var(--accent); color: var(--text);
  background: var(--accent-dim);
}

.recipe-card {
  background: var(--surface); border-radius: var(--radius);
  margin-bottom: 8px; overflow: hidden;
}
.recipe-header {
  padding: 14px 14px 10px; cursor: pointer;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.recipe-name { font-size: 15px; font-weight: 700; }
.recipe-sub {
  font-size: 11px; color: var(--text2); margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
  display: flex; gap: 10px;
}
.recipe-chevron { color: var(--text3); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; padding-top: 2px; }
.recipe-header.open .recipe-chevron { transform: rotate(180deg); }

.recipe-body { display: none; padding: 0 14px 14px; }
.recipe-body.open { display: block; }

.recipe-meta-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
}
.recipe-meta-tag {
  font-size: 10px; font-weight: 600; padding: 3px 8px;
  border-radius: 20px; background: var(--surface2); color: var(--text2);
}

.ingredients-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
.ingredients-table tr { border-bottom: 1px solid var(--surface3); }
.ingredients-table tr:last-child { border-bottom: none; }
.ingredients-table td {
  padding: 7px 4px; font-size: 13px; vertical-align: middle;
}
.ing-qty {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--accent); width: 50px; white-space: nowrap;
}
.ing-unit {
  font-size: 11px; color: var(--text2); width: 40px;
}
.ing-name { color: var(--text); }

.recipe-footer {
  display: flex; gap: 8px; padding-top: 8px;
  border-top: 1px solid var(--surface3);
  font-size: 11px; color: var(--text2);
}
.recipe-footer span { display: flex; align-items: center; gap: 4px; }

.recipe-edit-btn {
  margin-top: 10px; padding: 8px 14px; border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text2);
  border: none; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

/* ── SHEET (bottom drawer) ── */
.sheet-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
  align-items: flex-end;
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto;
  padding: 20px 16px calc(var(--safe-bottom) + 16px);
}
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--surface3); margin: 0 auto 20px;
}
.sheet-title {
  font-size: 17px; font-weight: 700; margin-bottom: 20px;
}
.sheet-actions { display: flex; gap: 8px; margin-top: 16px; }

/* Ingredient builder rows */
.ing-build-row {
  display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
}
.ing-build-row .form-input { flex: 2; }
.ing-build-row .form-input.qty { flex: 0.7; }
.ing-build-row .form-input.unit { flex: 0.8; }
.ing-remove {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--red-dim); color: var(--red-bright);
  border: none; font-size: 16px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.add-ing-btn {
  width: 100%; padding: 10px; border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--accent);
  border: 1px dashed var(--accent); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 14px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 48px 24px; color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── TOAST ── */
.toast {
  position: fixed; top: calc(var(--safe-top) + 70px);
  left: 50%; transform: translateX(-50%) translateY(-16px);
  background: var(--green); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.25s; z-index: 999; pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red-bright); }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(var(--safe-bottom) + 80px);
  right: 16px; z-index: 150;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); color: #fff;
  border: none; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(184,92,0,0.4);
  display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.94); }
.fab.hidden { display: none; }

/* ── DIVIDER ── */
.divider {
  height: 1px; background: var(--surface3);
  margin: 16px 0;
}

/* ── CARD ACTIONS ROW ── */
.card-actions {
  display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap;
}

.ops-update-compose { background:var(--surface); border-radius:12px; padding:16px; margin-bottom:4px; }
.ops-update-card { background:var(--surface); border-radius:12px; padding:14px; margin-bottom:8px; }

/* ORDER PLANNER */
.op-view-btn{padding:6px 14px;border-radius:20px;background:var(--surface);color:var(--text2);border:1.5px solid transparent;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.op-view-btn.active{border-color:var(--accent);color:var(--text);background:var(--surface2);}
.op-save-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.op-need-badge{font-size:0.688rem;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--red-dim);color:var(--red-bright);}
.op-vendor-card{background:var(--surface);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.op-vendor-header{padding:12px 14px;border-bottom:1px solid var(--surface3);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.op-vendor-name{font-size:0.938rem;font-weight:700;color:var(--text);}
.op-vendor-meta{font-size:0.625rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.op-cutoff{font-size:0.625rem;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--yellow-dim);color:var(--yellow-bright);}
.op-need-count{font-size:0.625rem;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--red-dim);color:var(--red-bright);}
.op-item-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--surface3);transition:background 0.1s;}
.op-item-row:last-of-type{border-bottom:none;}
.op-item-row.op-row-counted{background:var(--surface2);}
.op-item-row.op-row-need{background:rgba(180,30,30,0.08);}
.op-item-info{flex:1;min-width:0;}
.op-item-name{font-size:0.844rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.op-item-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.op-cat-badge{font-size:0.563rem;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:0.06em;}
.op-item-meta span{font-size:0.625rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.op-item-note{font-size:0.625rem;color:var(--yellow-bright) !important;font-family:'DM Sans',sans-serif !important;}
.op-item-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.op-par-label{font-size:0.563rem;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:right;}
.op-count-input{width:56px;height:40px;background:var(--surface3);border:1.5px solid transparent;border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;text-align:center;outline:none;-webkit-appearance:none;}
.op-count-input:focus{border-color:var(--accent);}

function xlsxCell(value, opts) {
  var cell = { v: value !== null && value !== undefined ? value : '' };
  if (typeof value === 'number') cell.t = 'n';
  else if (value instanceof Date) { cell.t = 'd'; cell.z = 'yyyy-mm-dd'; }
  else cell.t = 's';
  if (opts) Object.assign(cell, opts);
  return cell;
}



function xlsxSheet(headers, rows, colWidths) {
  var ws = {};
  var range = { s: { c: 0, r: 0 }, e: { c: headers.length - 1, r: rows.length } };
  headers.forEach(function(h, ci) {
    ws[XLSX.utils.encode_cell({ c: ci, r: 0 })] = { v: h, t: 's', s: { font: { bold: true } } };
  });
  rows.forEach(function(row, ri) {
    row.forEach(function(val, ci) {
      var key = XLSX.utils.encode_cell({ c: ci, r: ri + 1 });
      ws[key] = xlsxCell(val);
    });
  });
  ws['!ref'] = XLSX.utils.encode_range(range);
  if (colWidths) ws['!cols'] = colWidths.map(function(w) { return { wch: w }; });
  return ws;
}



function downloadXlsx(wb, filename) {
  // Generate file as blob
  var wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  var blob  = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  var url   = URL.createObjectURL(blob);

  // Try direct download first
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // On iOS Safari, direct download often doesn't work — show share sheet fallback
  setTimeout(function() {
    // Check if we're on iOS
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
      // Show a modal with an Open button that triggers the share sheet
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:flex-end;justify-content:center;';
      overlay.innerHTML =
        '<div style="background:var(--surface);border-radius:16px 16px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;">' +
          '<div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;">' + filename + '</div>' +
          '<div style="font-size:0.813rem;color:var(--text2);margin-bottom:20px;">Tap Open to view in Files or Excel. From there you can save or share.</div>' +
          '<a href="' + url + '" download="' + filename + '" ' +
            'style="display:block;width:100%;padding:14px;background:var(--accent);color:var(--text);text-align:center;border-radius:var(--radius);font-weight:700;font-size:0.938rem;text-decoration:none;margin-bottom:10px;">' +
            '&#x1F4C2; Open File' +
          '</a>' +
          '<button onclick="this.closest(\'div\').parentElement.remove();URL.revokeObjectURL(\'' + url + '\')" ' +
            'style="width:100%;padding:12px;background:var(--surface2);border:none;border-radius:var(--radius);color:var(--text2);font-size:0.938rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;">' +
            'Cancel' +
          '</button>' +
        '</div>';
      overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); URL.revokeObjectURL(url); } };
      document.body.appendChild(overlay);
    } else {
      URL.revokeObjectURL(url);
      toast(filename + ' downloaded');
    }
  }, 300);
}

function exportWeeklyReport() {
  var weekStart = getWeekStart();
  var wb = XLSX.utils.book_new();

  // Fetch all this week's data in parallel
  Promise.all([
    supa.from('order_counts').select('*').eq('count_date', TODAY),
    supa.from('waste_log').select('*').gte('shift_date', weekStart),
    supa.from('bottle_log').select('*').gte('shift_date', weekStart),
    supa.from('checklist_completions').select('*').gte('shift_date', weekStart),
    supa.from('collateral_requests').select('*').gte('shift_date', weekStart),
    supa.from('weekly_summary').select('*').eq('week_start', weekStart),
    supa.from('activations_log').select('*').eq('launched', false),
  ]).then(function(results) {
    var orders     = results[0].data || [];
    var waste      = results[1].data || [];
    var bottles    = results[2].data || [];
    var checklists = results[3].data || [];
    var collateral = results[4].data || [];
    var weeklySched= results[5].data || [];
    var activations= results[6].data || [];

    // Sheet 1 — Weekly Summary
    var summarySheet = xlsxSheet(
      ['Vendor', 'Day', 'Contact', 'Confirmed', 'Received', 'Issues', 'Notes'],
      weeklySched.map(function(r) {
        return [r.vendor, r.delivery_day || '', '', r.confirmed ? 'Y' : 'N', r.received ? 'Y' : 'N', r.issues || '', r.notes || ''];
      }),
      [24, 6, 20, 10, 10, 30, 30]
    );
    XLSX.utils.book_append_sheet(wb, summarySheet, 'Weekly Summary');

    // Sheet 2 — Order Counts
    var orderSheet = xlsxSheet(
      ['D365', 'Item', 'Category', 'Vendor', 'Par', 'Count', 'Order Qty'],
      orders.filter(function(r) { return r.order_qty > 0; }).map(function(r) {
        return [r.d365, r.item_name, r.category || '', r.vendor || '', r.par || '', r.count, r.order_qty || 0];
      }),
      [12, 36, 12, 14, 6, 8, 9]
    );
    XLSX.utils.book_append_sheet(wb, orderSheet, 'Order Counts');

    // Sheet 3 — Waste & Breakage
    var wasteSheet = xlsxSheet(
      ['Date', 'Item', 'Category', 'Qty', 'Unit', 'Reason', 'Initials'],
      waste.map(function(r) {
        return [r.shift_date, r.item, r.category || '', r.qty || '', r.unit || '', r.reason || '', r.initials || ''];
      }),
      [12, 28, 12, 6, 8, 24, 8]
    );
    XLSX.utils.book_append_sheet(wb, wasteSheet, 'Waste & Breakage');

    // Sheet 4 — Open Bottles / BTG Sales
    var bottleSheet = xlsxSheet(
      ['Date', 'Wine', 'Amount'],
      bottles.map(function(r) { return [r.shift_date, r.wine, r.amount || '']; }),
      [12, 36, 14]
    );
    XLSX.utils.book_append_sheet(wb, bottleSheet, 'Bottles & BTG Sales');

    // Sheet 5 — Checklists
    var clSheet = xlsxSheet(
      ['Date', 'Shift', 'Done', 'Total', 'Missed', 'Completed At'],
      checklists.map(function(r) {
        return [r.shift_date, r.shift_type === 'am' ? 'AM Opening' : 'PM Closing',
          r.done, r.total, r.missed, r.completed_at ? new Date(r.completed_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : ''];
      }),
      [12, 14, 6, 6, 6, 12]
    );
    XLSX.utils.book_append_sheet(wb, clSheet, 'Checklists');

    // Sheet 6 — Active Activations
    var actSheet = xlsxSheet(
      ['Priority', 'Name', 'D365', 'Vendor', 'Category', 'Launch Date', 'Swap Item', 'Notes', 'Steps Done', 'Issues'],
      activations.map(function(r) {
        var steps = r.steps || {};
        var stepsDone = Object.values(steps).filter(Boolean).length + '/5';
        return [r.priority, r.name, r.d365 || '', r.vendor || '', r.category || '',
          r.launch_date || '', r.swap_item || '', r.notes || '', stepsDone, r.open_issues || ''];
      }),
      [8, 36, 12, 14, 12, 12, 24, 40, 10, 30]
    );
    XLSX.utils.book_append_sheet(wb, actSheet, 'Activations');

    var filename = 'Weekly_Report_' + weekStart + '.xlsx';
    downloadXlsx(wb, filename);
  });
}

function getWeekStart() {
  var d = new Date();
  var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1);
  var mon = new Date(d.setDate(diff));
  return mon.toISOString().slice(0,10);
}



function renderWeeklySummary() {
  var el = document.getElementById('view-weekly');
  var weekStart = getWeekStart();

  el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4E1;</div><div class="empty-text">Loading...</div></div>';

  supa.from('weekly_summary').select('*').eq('week_start', weekStart)
    .then(function(result) {
      var saved = result.data || [];
      weeklySummaryData = {};
      saved.forEach(function(row) {
        weeklySummaryData[row.vendor] = row;
      });
      _renderWeeklySummaryInner(el, weekStart);

function renderWeeklyInsights(weekStart) {
  var panel = document.getElementById('weekly-insights-body');
  if (!panel) return;

  Promise.all([
    supa.from('waste_log').select('*').gte('shift_date', weekStart),
    supa.from('order_counts').select('*').gte('count_date', weekStart),
    supa.from('checklist_completions').select('*').gte('shift_date', weekStart),
  ]).then(function(results) {
    var wastes     = results[0].data || [];
    var orders     = results[1].data || [];
    var checklists = results[2].data || [];

    var html = '';

    // ── WASTE & BREAKAGE ─────────────────────────────────
    html += '<div style="background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;">';
    html += '<div style="font-size:0.75rem;font-weight:700;color:var(--text);margin-bottom:10px;">🗑 Waste & Breakage</div>';

    if (wastes.length === 0) {
      html += '<div style="font-size:0.75rem;color:var(--text3);">No waste logged this week.</div>';
    } else {
      // Count by reason
      var reasons = {};
      var itemCount = {};
      wastes.forEach(function(w) {
        var r = w.reason || 'Other';
        reasons[r] = (reasons[r] || 0) + 1;
        var key = (w.item_name || w.item || 'Unknown').trim();
        itemCount[key] = (itemCount[key] || 0) + 1;
      });

      html += '<div style="font-size:0.688rem;color:var(--text3);margin-bottom:8px;">' + wastes.length + ' entries this week</div>';

      // Reason bars
      var total = wastes.length;
      Object.keys(reasons).sort(function(a,b){return reasons[b]-reasons[a];}).forEach(function(r) {
        var pct = Math.round((reasons[r] / total) * 100);
        html += '<div style="margin-bottom:6px;">';
        html += '<div style="display:flex;justify-content:space-between;font-size:0.625rem;margin-bottom:3px;">';
        html += '<span style="color:var(--text2);">' + r + '</span>';
        html += '<span style="color:var(--text3);">' + reasons[r] + ' (' + pct + '%)</span>';
        html += '</div>';
        html += '<div style="height:4px;background:var(--surface3);border-radius:2px;">';
        html += '<div style="height:4px;width:' + pct + '%;background:var(--red-bright);border-radius:2px;transition:width 0.4s;"></div>';
        html += '</div></div>';
      });

      // Top 3 wasted items
      var sortedItems = Object.keys(itemCount).sort(function(a,b){return itemCount[b]-itemCount[a];}).slice(0,3);
      if (sortedItems.length) {
        html += '<div style="margin-top:10px;font-size:0.625rem;color:var(--text3);margin-bottom:5px;">TOP WASTED ITEMS</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:5px;">';
        sortedItems.forEach(function(item) {
          html += '<span style="font-size:0.625rem;padding:3px 8px;border-radius:20px;background:rgba(220,60,60,0.15);color:#E07070;font-weight:600;">'
                + item + ' ×' + itemCount[item] + '</span>';
        });
        html += '</div>';
      }
    }
    html += '</div>';

    // ── STOCK LEVELS ─────────────────────────────────────
    html += '<div style="background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;">';
    html += '<div style="font-size:0.75rem;font-weight:700;color:var(--text);margin-bottom:10px;">📦 Stock Levels</div>';

    if (orders.length === 0) {
      html += '<div style="font-size:0.75rem;color:var(--text3);">No order counts recorded this week.</div>';
    } else {
      // Latest count per item — last record wins
      var latestByItem = {};
      orders.forEach(function(o) {
        var key = o.item_name || o.item || '';
        if (!key) return;
        if (!latestByItem[key] || o.count_date > latestByItem[key].count_date) {
          latestByItem[key] = o;
        }
      });

      // Flag items at/below 25% par as critical, 26-50% as low
      var critical = [], low = [], ok = 0;
      Object.keys(latestByItem).forEach(function(item) {
        var r = latestByItem[item];
        var par = parseFloat(r.par) || 0;
        var cnt = parseFloat(r.count) || 0;
        if (par <= 0) { ok++; return; }
        var pct = cnt / par;
        if (pct <= 0.25) critical.push({item: item, cnt: cnt, par: par, pct: Math.round(pct*100)});
        else if (pct <= 0.50) low.push({item: item, cnt: cnt, par: par, pct: Math.round(pct*100)});
        else ok++;
      });

      // Sort most critical first
      critical.sort(function(a,b){return a.pct-b.pct;});
      low.sort(function(a,b){return a.pct-b.pct;});

      var tracked = Object.keys(latestByItem).length;
      html += '<div style="font-size:0.688rem;color:var(--text3);margin-bottom:10px;">' + tracked + ' items tracked &middot; ' + critical.length + ' critical &middot; ' + low.length + ' low</div>';

      if (critical.length === 0 && low.length === 0) {
        html += '<div style="font-size:0.75rem;color:var(--green);padding:8px 0;">✓ All items above 50% par</div>';
      } else {
        critical.forEach(function(s) {
          html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--surface2);">';
          html += '<span style="font-size:0.75rem;color:var(--text);">' + s.item + '</span>';
          html += '<span style="font-size:0.625rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(220,60,60,0.18);color:var(--red-bright);">CRITICAL ' + s.pct + '%</span>';
          html += '</div>';
        });
        low.forEach(function(s) {
          html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--surface2);">';
          html += '<span style="font-size:0.75rem;color:var(--text);">' + s.item + '</span>';
          html += '<span style="font-size:0.625rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(220,170,0,0.15);color:var(--yellow-bright);">LOW ' + s.pct + '%</span>';
          html += '</div>';
        });
      }
    }
    html += '</div>';

    // ── SHIFT PERFORMANCE ─────────────────────────────────
    html += '<div style="background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;">';
    html += '<div style="font-size:0.75rem;font-weight:700;color:var(--text);margin-bottom:10px;">📋 Shift Performance</div>';

    if (checklists.length === 0) {
      html += '<div style="font-size:0.75rem;color:var(--text3);">No checklist data this week.</div>';
    } else {
      var amDone = 0, amTotal = 0, pmDone = 0, pmTotal = 0;
      checklists.forEach(function(c) {
        var shift = (c.shift || '').toUpperCase();
        var done  = parseInt(c.completed_items) || 0;
        var total = parseInt(c.total_items)     || 0;
        if (shift === 'AM') { amDone += done; amTotal += total; }
        else                { pmDone += done; pmTotal += total; }
      });

      function pctBar(done, total, label) {
        if (total === 0) return '';
        var pct = Math.round((done/total)*100);
        var color = pct >= 95 ? 'var(--green)' : pct >= 80 ? 'var(--yellow-bright)' : 'var(--red-bright)';
        return '<div style="margin-bottom:8px;">'
          + '<div style="display:flex;justify-content:space-between;font-size:0.625rem;margin-bottom:3px;">'
          + '<span style="color:var(--text2);">' + label + '</span>'
          + '<span style="color:' + color + ';font-weight:700;">' + pct + '%</span>'
          + '</div>'
          + '<div style="height:4px;background:var(--surface3);border-radius:2px;">'
          + '<div style="height:4px;width:' + pct + '%;background:' + color + ';border-radius:2px;transition:width 0.4s;"></div>'
          + '</div></div>';
      }

      html += pctBar(amDone, amTotal, 'AM Completion');
      html += pctBar(pmDone, pmTotal, 'PM Completion');

      // 86'd count from updates (use waste_log items marked 86 if available, otherwise show note)
      var eighty6 = wastes.filter(function(w){ return (w.reason||'').toLowerCase().indexOf('86') !== -1; }).length;
      html += '<div style="display:flex;gap:10px;margin-top:10px;">';
      html += '<div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center;">';
      html += '<div style="font-size:1.1rem;font-weight:700;color:var(--red-bright);">' + eighty6 + '</div>';
      html += '<div style="font-size:0.563rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.07em;">86&rsquo;d Items</div>';
      html += '</div>';
      var totalEntries = wastes.length;
      html += '<div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center;">';
      html += '<div style="font-size:1.1rem;font-weight:700;color:var(--accent);">' + totalEntries + '</div>';
      html += '<div style="font-size:0.563rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.07em;">Waste Entries</div>';
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';

    panel.innerHTML = html;
  }).catch(function(err) {
    var panel = document.getElementById('weekly-insights-body');
    if (panel) panel.innerHTML = '<div style="font-size:0.75rem;color:var(--text3);">Could not load insights.</div>';
    console.error('Insights error:', err);
  });
}


function togglePoPanel(id) {

}

function addWeeklyOrder(vendor, panelId) {
  var poEl  = document.getElementById(panelId + '-po');
  var invEl = document.getElementById(panelId + '-inv');
  var po  = (poEl  ? poEl.value.trim()  : '');
  var inv = (invEl ? invEl.value.trim() : '');
  if (!po && !inv) { toast('Enter at least a PO# or Invoice#'); return; }

  var weekStart = getWeekStart();
  var existing  = weeklySummaryData[vendor] || {};
  var orders = [];
  try { orders = JSON.parse(existing.orders || '[]'); } catch(e) {}
  orders.push({ po: po, inv: inv, added: new Date().toISOString().slice(0,10) });

  var record = Object.assign({}, existing, {
    week_start: weekStart,
    vendor: vendor,
    orders: JSON.stringify(orders)
  });
  weeklySummaryData[vendor] = record;

  supa.from('weekly_summary')
    .upsert(record, {onConflict: 'week_start,vendor'})
    .then(function(r) {
      if (r && r.error) { toast('Error: ' + r.error.message); return; }
      toast('Order saved');
      renderWeeklySummary();
      // Re-open panel after re-render
      setTimeout(function() {
        var el = document.getElementById(panelId);
        if (el) el.style.display = 'block';
      }, 80);
    });
}

function removeWeeklyOrder(vendor, idx) {
  var weekStart = getWeekStart();
  var existing  = weeklySummaryData[vendor] || {};
  var orders = [];
  try { orders = JSON.parse(existing.orders || '[]'); } catch(e) {}
  orders.splice(idx, 1);

  var record = Object.assign({}, existing, {
    week_start: weekStart,
    vendor: vendor,
    orders: JSON.stringify(orders)
  });
  weeklySummaryData[vendor] = record;

  var panelId = 'po-panel-' + vendor.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');

  supa.from('weekly_summary')
    .upsert(record, {onConflict: 'week_start,vendor'})
    .then(function(r) {
      if (r && r.error) { toast('Error: ' + r.error.message); return; }
      renderWeeklySummary();
      setTimeout(function() {
        var el = document.getElementById(panelId);
        if (el) el.style.display = 'block';
      }, 80);
    });
}


function toggleWeekly(vendor, field) {
  var weekStart = getWeekStart();
  var existing  = weeklySummaryData[vendor] || {};
  var newVal    = !existing[field];
  var record    = Object.assign({}, existing, {week_start: weekStart, vendor: vendor});
  record[field] = newVal;
  weeklySummaryData[vendor] = record;

  // Upsert
  supa.from('weekly_summary')
    .upsert(record, {onConflict: 'week_start,vendor'})
    .then(function(r) {
      if (r && r.error) { toast('Error: ' + r.error.message); return; }
      renderWeeklySummary();
    });
}

function renderAdminBTG(el) {

        '<div style="font-size:0.625rem;color:var(--text3);font-family:monospace;margin-top:2px;">' +
          w.d365 + ' &middot; ' + w.region + ' &middot; ' + w.vendor + '</div>';

      var cb = document.createElement('input');

      cb.checked = isOn;

          supa.from('btg_wines')

              if (res && res.error) {

              toast(active ? '\u2713 ' + name + ' enabled' : name + ' disabled');

    addTitle.textContent = '+ Add Wine';

    [['admin-btg-d365','D365 #'],['admin-btg-name','Brand + Item name'],
     ['admin-btg-region','Region'],['admin-btg-vendor','Vendor']].forEach(function(s) {

function renderAdminChecklist(el) {
  el.innerHTML = '<div style="font-size:0.688rem;color:var(--text3);padding:20px;text-align:center;">Loading checklist items…</div>';

  var clAdminShift = 'am';

  function load() {
    supa.from('checklist_items')
      .select('*')
      .order('shift').order('sort_order', { ascending: true })
      .then(function(r) {
        var all = r.data || [];
        draw(all);
      });
  }

  function draw(all) {
    el.innerHTML = '';

    // Shift toggle
    var toggleRow = document.createElement('div');
    toggleRow.style.cssText = 'display:flex;gap:6px;margin-bottom:16px;';
    ['am','pm'].forEach(function(s) {
      var btn = document.createElement('button');
      btn.textContent = s === 'am' ? '☀️ AM Opening' : '🌙 PM Closing';
      btn.style.cssText = 'padding:7px 16px;border-radius:20px;border:none;cursor:pointer;font-size:0.75rem;font-weight:700;font-family:\'DM Sans\',sans-serif;' +
        (clAdminShift === s ? 'background:var(--accent);color:#fff;' : 'background:var(--surface2);color:var(--text2);');
      btn.onclick = function() { clAdminShift = s; draw(all); };
      toggleRow.appendChild(btn);
    });
    el.appendChild(toggleRow);

    // Filter to current shift
    var items = all.filter(function(x){ return x.shift === clAdminShift; });

    // Group by section
    var sections = {};
    var sectionOrder = [];
    items.forEach(function(row) {
      if (!sections[row.section]) { sections[row.section] = []; sectionOrder.push(row.section); }
      sections[row.section].push(row);
    });

    // Render each section
    sectionOrder.forEach(function(sec) {
      var secItems = sections[sec];

      var secDiv = document.createElement('div');
      secDiv.style.cssText = 'background:var(--surface);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;';

      var secHdr = document.createElement('div');
      secHdr.style.cssText = 'font-size:0.688rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;';
      secHdr.innerHTML = '<span>' + sec + '</span><span style="color:var(--text3);font-size:0.563rem;">' + secItems.length + ' items</span>';
      secDiv.appendChild(secHdr);

      secItems.forEach(function(row) {
        var row_el = document.createElement('div');
        row_el.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--surface2);' + (row.active ? '' : 'opacity:0.4;');

        var label = document.createElement('div');
        label.style.cssText = 'flex:1;font-size:0.813rem;color:var(--text);line-height:1.4;';
        label.textContent = row.item;

        var toggleBtn = document.createElement('button');
        toggleBtn.textContent = row.active ? 'On' : 'Off';
        toggleBtn.style.cssText = 'font-size:0.563rem;font-weight:700;padding:3px 8px;border-radius:4px;border:none;cursor:pointer;font-family:\'DM Sans\',sans-serif;' +
          (row.active ? 'background:var(--green);color:#fff;' : 'background:var(--surface3);color:var(--text3);');
        toggleBtn.onclick = (function(id, active) {
          return function() {
            supa.from('checklist_items').update({ active: !active }).eq('id', id)
              .then(function(r) {
                if (r && r.error) { toast('Error: ' + r.error.message); return; }
                load();
              });
          };
        })(row.id, row.active);

        var delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.style.cssText = 'font-size:0.625rem;padding:3px 7px;border-radius:4px;border:none;cursor:pointer;background:var(--surface3);color:var(--text3);';
        delBtn.onclick = (function(id, itemText) {
          return function() {
            if (!confirm('Delete: "' + itemText + '"?')) return;
            supa.from('checklist_items').delete().eq('id', id)
              .then(function(r) {
                if (r && r.error) { toast('Error: ' + r.error.message); return; }
                toast('Deleted');
                load();
              });
          };
        })(row.id, row.item);

        row_el.appendChild(label);
        row_el.appendChild(toggleBtn);
        row_el.appendChild(delBtn);
        secDiv.appendChild(row_el);
      });

      el.appendChild(secDiv);
    });

    // ── Add new item form ────────────────────────────────────────────
    var addDiv = document.createElement('div');
    addDiv.style.cssText = 'background:var(--surface);border-radius:var(--radius);padding:14px;margin-top:4px;';
    addDiv.innerHTML =
      '<div style="font-size:0.688rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;">+ Add Item</div>';

    var sectionSel = document.createElement('select');
    sectionSel.className = 'field-input';
    sectionSel.style.cssText = 'margin-bottom:8px;font-size:0.813rem;';
    sectionOrder.forEach(function(sec) {
      var opt = document.createElement('option');
      opt.value = sec;
      opt.textContent = sec;
      sectionSel.appendChild(opt);
    });
    var newSecOpt = document.createElement('option');
    newSecOpt.value = '__new__';
    newSecOpt.textContent = '— New section…';
    sectionSel.appendChild(newSecOpt);

    var newSecInput = document.createElement('input');
    newSecInput.className = 'field-input';
    newSecInput.placeholder = 'New section name';
    newSecInput.style.cssText = 'display:none;margin-bottom:8px;font-size:0.813rem;';
    sectionSel.onchange = function() {
      newSecInput.style.display = sectionSel.value === '__new__' ? 'block' : 'none';
    };

    var itemInput = document.createElement('input');
    itemInput.className = 'field-input';
    itemInput.placeholder = 'Checklist item text';
    itemInput.style.cssText = 'margin-bottom:10px;font-size:0.813rem;';

    var addBtn = document.createElement('button');
    addBtn.textContent = '+ Add to ' + (clAdminShift === 'am' ? 'AM' : 'PM') + ' Checklist';
    addBtn.className = 'btn-send';
    addBtn.style.cssText = 'font-size:0.75rem;width:100%;';
    addBtn.onclick = function() {
      var sec = sectionSel.value === '__new__' ? newSecInput.value.trim() : sectionSel.value;
      var txt = itemInput.value.trim();
      if (!sec || !txt) { toast('Enter section and item text'); return; }
      var maxSort = items.length ? Math.max.apply(null, items.map(function(x){return x.sort_order;})) + 1 : 0;
      supa.from('checklist_items').insert({ shift: clAdminShift, section: sec, item: txt, sort_order: maxSort, active: true })
        .then(function(r) {
          if (r && r.error) { toast('Error: ' + r.error.message); return; }
          toast('Item added');
          itemInput.value = '';
          load();
        });
    };

    addDiv.appendChild(sectionSel);
    addDiv.appendChild(newSecInput);
    addDiv.appendChild(itemInput);
    addDiv.appendChild(addBtn);
    el.appendChild(addDiv);
  }

  load();
}

function renderUpdatesOps() {
  var el = document.getElementById('view-updates');
  el.innerHTML = '<div class="updates-loading"><div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">Loading...</div></div></div>';

  supa.from('updates').select('*').order('created_at', {ascending: false}).limit(50)
    .then(function(result) {
      var data  = result.data || [];

      // Filter
      var filtered = updFilter === 'all' ? data : data.filter(function(u) { return u.tag === updFilter; });

      var tagColors = {info:'#5A5650', ops:'#1B3A5C', '86':'#8B1A1A', 'new':'#1E5C38', spec:'#4A1520'};
      var tagLabels = {info:'Info', ops:'Ops', '86':'86', 'new':'New', spec:'Spec', all:'All'};
      var filterTags = ['all','info','ops','86','new','spec'];

      var filterBtns = '';
      // filter buttons built via DOM after innerHTML set



      var feed = filtered.length === 0
        ? '<div class="empty-state" style="padding:24px 0;"><div class="empty-text">No updates' + (updFilter !== 'all' ? ' with this tag' : ' posted yet') + '.</div></div>'
        : filtered.map(function(u) {
            var bg  = tagColors[u.tag] || '#2E2E2E';
            var ts  = new Date(u.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' ' +
                      new Date(u.created_at).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
            var isAlert = !!u.expires_at;
            var alertBadge = isAlert ? ' <span style="font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(180,80,0,0.3);color:#E08030;margin-left:4px;">TIMED</span>' : '';
            return '<div class="ops-update-card">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
                '<div style="display:flex;align-items:center;gap:6px;">' +
                  '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:3px 8px;border-radius:4px;background:' + bg + ';color:#F0EDE8;">' + u.tag.toUpperCase() + '</span>' +
                  alertBadge +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:8px;">' +
                  '<span style="font-size:11px;color:var(--text3);font-family:monospace;">' + ts + '</span>' +
                  '<button onclick="deleteUpdate(' + u.id + ')" style="background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;">&times;</button>' +
                '</div>' +
              '</div>' +
              '<div style="font-size:13px;color:var(--text);line-height:1.6;">' + u.text + '</div>' +
            '</div>';
          }).join('');

      el.innerHTML =
        '<div class="ops-update-compose">' +
          '<div class="field-label">Tag</div>' +
          '<select id="upd-tag" class="field-input"><option value="info">Info</option><option value="ops">Ops</option><option value="86">86</option><option value="new">New Item</option><option value="spec">Spec Update</option></select>' +
          '<div class="field-label" style="margin-top:12px;">Message</div>' +
          '<textarea id="upd-text" class="field-input" rows="4" placeholder="Write your update for the team..." style="resize:none;line-height:1.5;" oninput="updateCharCount(this)"></textarea>' +
          '<div style="text-align:right;font-size:10px;color:var(--text3);margin-top:4px;" id="upd-char-count">0 / 280</div>' +
          '<div style="display:flex;gap:8px;margin-top:12px;">' +
            '<button class="btn-action btn-primary" onclick="postUpdate()" style="flex:1;">Post Update</button>' +
          '</div>' +
        '</div>' +
        '<div id="upd-filter-row"></div>' +
        '<div style="font-size:10px;color:var(--text3);margin-bottom:10px;">' + data.length + ' total &middot; ' + filtered.length + ' shown</div>' +
        feed;
      // Insert filter buttons via DOM
      setTimeout(function() { _insertFilterBtns(filterTags, tagLabels); }, 0);
    });
}


function setUpdFilter(t) { updFilter = t; renderUpdatesOps(); }


function _insertFilterBtns(filterTags, tagLabels) {
  var row = document.getElementById('upd-filter-row');
  if (!row) return;
  filterTags.forEach(function(t) {
    var btn = document.createElement('button');
    btn.textContent = tagLabels[t];
    var baseStyle = 'border:none;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;margin:2px;';
    btn.style.cssText = (updFilter === t ? 'background:var(--accent);color:#fff;' : 'background:var(--surface2);color:var(--text2);') + baseStyle;

    btn.onclick = (function(tag){ return function(){ setUpdFilter(tag); }; })(t);
    row.appendChild(btn);
  });
}

function updateCharCount(el) {
  var count = el.value.length;
  var counter = document.getElementById('upd-char-count');
  if (counter) counter.textContent = count + ' / 280';
}



function postUpdate() {
  var tag  = document.getElementById('upd-tag').value;
  var text = document.getElementById('upd-text').value.trim();
  if (!text) { alert('Write a message first.'); return; }

  var btn = document.querySelector('[onclick="postUpdate()"]');
  if (btn) { btn.textContent = 'Posting...'; btn.disabled = true; }

  supa.from('updates').insert({ tag: tag, text: text, date: TODAY, published: true })
    .then(function(result) {
      if (result.error) {
        alert('Error posting: ' + result.error.message);
        if (btn) { btn.textContent = 'Post Update'; btn.disabled = false; }
        return;
      }
      renderUpdatesOps();
    });
}


function deleteUpdate(id) {
  if (!confirm('Delete this update?')) return;
  supa.from('updates').delete().eq('id', id)
    .then(function(result) {
      if (result.error) { toast('Delete failed: ' + (result.error.message || 'Check RLS')); return; }
      toast('Deleted');
      renderUpdatesOps();
    });
}

function deleteSubmission(table, id) {
  if (!confirm('Delete this record?')) return;
  supa.from(table).delete().eq('id', id)
    .then(function(r) {
      if (r && r.error) {
        var msg = r.error.message || r.error.code || JSON.stringify(r.error);
        toast('Delete failed: ' + msg);
        console.error('Supabase delete error:', r.error);
        return;
      }
      // Supabase returns data:[] on success for delete — check status
      toast('Record deleted');
      renderSubmissions();
    })
    .catch(function(err) {
      toast('Delete error: ' + (err.message || err));
      console.error('Delete catch:', err);
    });
}


function renderSubmissions() {
  var el = document.getElementById('view-submissions');
  el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">Loading...</div>';

  var tables = { waste: 'waste_log', bottles: 'bottle_log', collateral: 'collateral_requests', checklist: 'checklist_completions', orders: 'order_counts' };
  var tbl = tables[subType] || 'waste_log';

  var query = supa.from(tbl).select('*').order('created_at', {ascending: false}).limit(100);
  if (subDate) query = query.eq(tbl === 'checklist_completions' ? 'shift_date' : (tbl === 'order_counts' ? 'count_date' : 'shift_date'), subDate);

  query.then(function(result) {
    var data = result.data || [];

    // Type filter buttons
    var typeLabels = { waste:'Waste', bottles:'Bottles', collateral:'Collateral', checklist:'Checklists', orders:'Orders' };
    var typeBtns = Object.keys(typeLabels).map(function(t) {
      var active = subType === t;
      var btn = document.createElement('button');
      btn.textContent = typeLabels[t];
      btn.style.cssText = (active ? 'background:var(--accent);color:#fff;' : 'background:var(--surface2);color:var(--text2);') +
        'border:none;padding:5px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;white-space:nowrap;';
      btn.onclick = function() { subType = t; renderSubmissions(); };
      return btn;
    });

    var typeRow = document.createElement('div');
    typeRow.style.cssText = 'display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;scrollbar-width:none;';
    typeBtns.forEach(function(btn) { typeRow.appendChild(btn); });

    // Date filter
    var dateInput = document.createElement('input');
    dateInput.type = 'date';
    dateInput.value = subDate || '';
    dateInput.style.cssText = 'background:var(--surface2);border:1.5px solid var(--surface3);border-radius:8px;color:var(--text);padding:8px 12px;font-size:0.813rem;width:100%;margin-bottom:8px;outline:none;';
    dateInput.onchange = function() { subDate = this.value; renderSubmissions(); };

    // Filter by search
    if (subSearch) {
      data = data.filter(function(row) {
        return JSON.stringify(row).toLowerCase().includes(subSearch.toLowerCase());
      });
    }

    var rowsHTML = '';
    if (!data.length) {
      rowsHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">No records' + (subDate ? ' for ' + subDate : '') + '.</div>';
    } else if (subType === 'waste') {
      rowsHTML = data.map(function(r) {
        var delBtn = document.createElement('button');
        delBtn.innerHTML = '&times;';
        delBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:1.125rem;cursor:pointer;flex-shrink:0;padding:0;';
        delBtn.onclick = (function(id){ return function(){ deleteSubmission('waste_log', id); }; })(r.id);
        var row = document.createElement('div');
        row.className = 'sub-hist-row';
        row.innerHTML = '<div style="flex:1;min-width:0;">' +
          '<div class="sub-hist-name">' + r.item + '</div>' +
          '<div class="sub-hist-meta">' + (r.qty||'') + ' ' + (r.unit||'') + ' &middot; ' + (r.reason||'') + (r.initials ? ' &middot; ' + r.initials : '') + '</div>' +
          '<div class="sub-hist-date">' + (r.shift_date||'') + '</div></div>';
        row.appendChild(delBtn);
        return row.outerHTML;
      }).join('');
    } else if (subType === 'bottles') {
      rowsHTML = data.map(function(r) {
        var delBtn = document.createElement('button');
        delBtn.innerHTML = '&times;';
        delBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:1.125rem;cursor:pointer;flex-shrink:0;padding:0;';
        delBtn.onclick = (function(id){ return function(){ deleteSubmission('bottle_log', id); }; })(r.id);
        var row = document.createElement('div');

          '<div class="sub-hist-name">' + r.wine + '</div>' +
          '<div class="sub-hist-meta">' + (r.amount||'') + '</div>' +
          '<div class="sub-hist-date">' + (r.shift_date||'') + '</div></div>';
        row.appendChild(delBtn);
        return row.outerHTML;
      }).join('');

        delBtn.innerHTML = '&times;';
        delBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:1.125rem;cursor:pointer;flex-shrink:0;padding:0;';
        delBtn.onclick = (function(id){ return function(){ deleteSubmission('checklist_completions', id); }; })(r.id);
        var row = document.createElement('div');
        row.className = 'sub-hist-row';
        row.innerHTML = '<div style="flex:1;min-width:0;">' +
          '<div class="sub-hist-name">' + (r.shift_type === 'am' ? 'AM Opening' : 'PM Closing') + '</div>' +
          '<div class="sub-hist-meta" style="color:' + color + ';">' + r.done + '/' + r.total + ' complete' + (r.missed > 0 ? ' &middot; ' + r.missed + ' missed' : '') + '</div>' +
          '<div class="sub-hist-date">' + new Date(r.completed_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) + ' &middot; ' + (r.shift_date||'') + '</div></div>';
        row.appendChild(delBtn);
        return row.outerHTML;
      }).join('');
    } else if (subType === 'orders') {
      rowsHTML = data.map(function(r) {
        var needOrder = r.order_qty && r.order_qty > 0;
        return '<div class="sub-hist-row">' +
          '<div>' +
            '<div class="sub-hist-name">' + r.item_name + '</div>' +
            '<div class="sub-hist-meta">' + (r.vendor||'') + ' &middot; ' + r.d365 + ' &middot; count:' + r.count + (r.par ? ' / par:' + r.par : '') + '</div>' +
          '</div>' +
          '<div style="text-align:right;flex-shrink:0;">' +
            (needOrder ? '<div style="font-size:0.875rem;font-weight:700;color:var(--red-bright);">+' + r.order_qty + '</div>' : '<div style="font-size:0.875rem;color:var(--green-bright);">&#x2713;</div>') +
            '<div class="sub-hist-date">' + (r.count_date||'') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    el.innerHTML = '';
    el.appendChild(typeRow);
    el.appendChild(dateInput);

    var totalEl = document.createElement('div');
    totalEl.style.cssText = 'font-size:0.688rem;color:var(--text3);margin-bottom:8px;';
    totalEl.textContent = data.length + ' record' + (data.length !== 1 ? 's' : '') + (subDate ? ' on ' + subDate : ' (last 100)');
    el.appendChild(totalEl);

    if (!data.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;padding:40px;color:var(--text3);';
      empty.textContent = 'No records' + (subDate ? ' for ' + subDate : '') + '.';
      el.appendChild(empty);
    } else {
      // Build rows directly as DOM nodes so onclick handlers work
      var fragment = document.createDocumentFragment();
      data.forEach(function(r) {
        var row = document.createElement('div');
        row.className = 'sub-hist-row';

        var info = document.createElement('div');
        info.style.cssText = 'flex:1;min-width:0;';

        var nameEl = document.createElement('div');
        nameEl.className = 'sub-hist-name';
        var metaEl = document.createElement('div');
        metaEl.className = 'sub-hist-meta';
        var dateEl = document.createElement('div');
        dateEl.className = 'sub-hist-date';

        if (subType === 'waste') {
          nameEl.textContent = r.item;
          metaEl.textContent = (r.qty||'') + ' ' + (r.unit||'') + ' · ' + (r.reason||'') + (r.initials ? ' · ' + r.initials : '');
          dateEl.textContent = r.shift_date || '';
        } else if (subType === 'bottles') {
          nameEl.textContent = r.wine;
          metaEl.textContent = r.amount || '';
          dateEl.textContent = r.shift_date || '';
        } else if (subType === 'collateral') {
          var items2 = [];
          try { items2 = JSON.parse(r.items||'[]'); } catch(e) {}
          nameEl.textContent = 'Collateral Request';
          metaEl.textContent = items2.map(function(i){ return (i.name||i) + (i.qty ? ' x'+i.qty : ''); }).join(', ') || 'No items';
          dateEl.textContent = r.shift_date || '';
        } else if (subType === 'checklist') {
          var color = r.missed > 0 ? 'var(--yellow-bright)' : 'var(--green-bright)';
          nameEl.textContent = r.shift_type === 'am' ? 'AM Opening' : 'PM Closing';
          metaEl.textContent = r.done + '/' + r.total + ' complete' + (r.missed > 0 ? ' · ' + r.missed + ' missed' : '');
          metaEl.style.color = color;
          dateEl.textContent = (r.completed_at ? new Date(r.completed_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) + ' · ' : '') + (r.shift_date||'');
        } else if (subType === 'orders') {
          nameEl.textContent = r.item_name;
          metaEl.textContent = (r.vendor||'') + ' · ' + r.d365 + ' · count:' + r.count + (r.par ? ' / par:' + r.par : '');
          var needOrder = r.order_qty && r.order_qty > 0;
          dateEl.textContent = r.count_date || '';
          var qtyEl = document.createElement('div');
          qtyEl.style.cssText = 'font-size:0.875rem;font-weight:700;color:' + (needOrder ? 'var(--red-bright)' : 'var(--green-bright)') + ';';
          qtyEl.textContent = needOrder ? '+' + r.order_qty : '✓';
          var rightCol = document.createElement('div');
          rightCol.style.cssText = 'text-align:right;flex-shrink:0;';
          rightCol.appendChild(qtyEl);
          rightCol.appendChild(dateEl);
          info.appendChild(nameEl);
          info.appendChild(metaEl);
          row.appendChild(info);
          row.appendChild(rightCol);
          fragment.appendChild(row);
          return;
        }

        info.appendChild(nameEl);
        info.appendChild(metaEl);
        info.appendChild(dateEl);
        row.appendChild(info);

        if (subType !== 'orders') {
          var tableMap = { waste:'waste_log', bottles:'bottle_log', collateral:'collateral_requests', checklist:'checklist_completions' };
          var delBtn = document.createElement('button');
          delBtn.innerHTML = '&times;';
          delBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:1.25rem;cursor:pointer;flex-shrink:0;padding:0 4px;line-height:1;';
          delBtn.onclick = (function(tbl, id){ return function(){ deleteSubmission(tbl, id); }; })(tableMap[subType], r.id);
          row.appendChild(delBtn);
        }

        fragment.appendChild(row);
      });
      el.appendChild(fragment);
    }
  });
}

function buildQRCard(p, svgStr) {
  var div = document.createElement('div');
  div.style.cssText = 'background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:pointer;';
  div.onclick = (function(svg, lbl){ return function(){ openQRFullscreen(svg, lbl); }; })(svgStr, p.label);

  var qrWrap = document.createElement('div');
  qrWrap.style.cssText = 'flex-shrink:0;border-radius:8px;overflow:hidden;background:#F5F0EB;width:90px;height:90px;';
  qrWrap.innerHTML = svgStr || '';

  var info = document.createElement('div');
  info.style.cssText = 'flex:1;min-width:0;';
  info.innerHTML =
    '<div style="font-size:1.1rem;margin-bottom:4px;">' + p.icon + '</div>' +
    '<div style="font-size:0.875rem;font-weight:700;color:var(--text);margin-bottom:4px;">' + p.label + '</div>' +
    '<span style="font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:2px 8px;border-radius:4px;display:inline-block;background:' + p.roleColor + ';color:' + p.roleText + ';">' + p.role + '</span>' +
    '<div style="font-size:0.563rem;color:var(--text3);margin-top:6px;font-family:monospace;">' + p.file + '</div>';

  div.appendChild(qrWrap);
  div.appendChild(info);
  return div;
}


function openQRFullscreen(svgStr, label) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;';
  overlay.onclick = function() { document.body.removeChild(overlay); };

  var title = document.createElement('div');
  title.textContent = label;
  title.style.cssText = 'font-family:"DM Sans",sans-serif;font-size:1rem;font-weight:700;color:#F0EDE8;';

  var qrWrap = document.createElement('div');
  qrWrap.style.cssText = 'background:#F5F0EB;border-radius:16px;padding:20px;width:280px;height:280px;box-sizing:border-box;';
  qrWrap.innerHTML = svgStr || '';

  var hint = document.createElement('div');
  hint.textContent = 'Tap anywhere to close';
  hint.style.cssText = 'font-family:"DM Sans",sans-serif;font-size:0.688rem;color:#5A5650;';

  overlay.appendChild(title);
  overlay.appendChild(qrWrap);
  overlay.appendChild(hint);
  document.body.appendChild(overlay);
}
