<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PiPa FOH">
<meta name="theme-color" content="#3B0D14">
<title>PiPa KOP — Server</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#3B0D14;--surface:#501828;--surface2:#62202E;--surface3:#7A2E3C;
  --text:#F5EDE8;--text2:#C4A49A;--text3:#8A6058;
  --accent:#8B4A44;--accent-bright:#A85A52;--accent-dim:rgba(139,74,68,0.3);
  --nav-bg:#F5EDE8;--nav-border:rgba(105,57,53,0.2);--nav-active:#693935;--nav-active-bg:rgba(105,57,53,0.1);
  --green:#1E5C38;--green-dim:rgba(30,92,56,0.25);--green-bright:#38966A;
  --red-dim:rgba(180,30,30,0.25);--red-bright:#E05050;
  --yellow-dim:rgba(200,165,20,0.2);--yellow-bright:#D4A830;
  --blue-dim:rgba(50,100,160,0.25);--blue-bright:#7AB0D8;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html{min-height:100vh;background:#3B0D14;}
html,body{font-family:'DM Sans',sans-serif;background:#3B0D14;color:var(--text);height:100%;overflow:hidden;font-size:100%;-webkit-text-size-adjust:none;}
.header{position:fixed;top:0;left:0;right:0;z-index:100;padding:calc(var(--safe-top) + 10px) 16px 0;background:var(--bg);border-bottom:1px solid var(--surface3);}
.header-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;}
.header-title{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);}
.header-date{font-size:0.688rem;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:6px 4px calc(var(--safe-bottom) + 6px);background:var(--nav-bg);border-top:1px solid var(--nav-border);display:flex;gap:2px;}
.bottom-nav::after{content:"";position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom,0px);background:var(--nav-bg);z-index:99;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border-radius:10px;cursor:pointer;color:var(--nav-active);opacity:0.4;font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;transition:all 0.15s;}
.nav-tab .nav-icon{font-size:1.125rem;line-height:1;}
.nav-tab.active{opacity:1;background:var(--nav-active-bg);}
.scroll-area{position:fixed;top:calc(var(--safe-top) + 52px);bottom:calc(var(--safe-bottom) + 60px);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 24px;background:#3B0D14;}
.view{display:none;background:#3B0D14;}.view.active{display:block;}
.section-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:0 2px 8px;margin-top:18px;}
.section-label:first-child{margin-top:0;}
/* UPDATE CARDS */
.update-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:8px;}
.update-tag{display:inline-flex;padding:3px 8px;border-radius:4px;font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.tag-alert{background:rgba(180,80,0,0.3);color:#E08030;border:1px solid rgba(180,80,0,0.4);}
.tag-86{background:var(--red-dim);color:var(--red-bright);}
.tag-new{background:var(--green-dim);color:var(--green-bright);}
.tag-spec{background:var(--accent-dim);color:var(--accent-bright);}
.tag-ops{background:var(--blue-dim);color:var(--blue-bright);}
.tag-info{background:var(--surface3);color:var(--text2);}
.update-text{font-size:0.875rem;line-height:1.6;color:var(--text);}
.update-sub{font-size:0.688rem;color:var(--text3);margin-top:6px;font-family:'JetBrains Mono',monospace;}
/* WINE CARDS */
.spec-search{width:100%;padding:11px 16px;background:var(--surface);border:1.5px solid var(--surface3);border-radius:24px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.875rem;outline:none;margin-bottom:10px;}
.spec-search::placeholder{color:var(--text3);}
.spec-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.spec-filters::-webkit-scrollbar{display:none;}
.spec-filter{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text2);border:1.5px solid transparent;white-space:nowrap;}
.spec-filter.active{border-color:var(--accent-bright);color:var(--text);background:var(--accent-dim);}
.wine-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;cursor:pointer;}
.wine-card-header{padding:16px 16px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.wine-card-left{flex:1;min-width:0;}
.wine-name{font-size:1rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px;}
.wine-appellation{font-size:0.688rem;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.wine-type-badge{flex-shrink:0;padding:4px 8px;border-radius:6px;font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
.wine-card-body{display:none;padding:0 16px 16px;border-top:1px solid var(--surface3);}
.wine-card-body.open{display:block;}
.wine-section{margin-top:14px;}
.wine-section-label{font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text2);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--surface3);}
.wine-section-text{font-size:0.844rem;color:var(--text);line-height:1.6;}
.wine-pairings{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.wine-pairing-tag{font-size:0.688rem;padding:4px 9px;border-radius:6px;background:var(--surface2);color:var(--text2);font-weight:500;}
/* SUBMIT */
.form-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);display:block;margin-bottom:6px;}
.form-input,.form-select{width:100%;padding:11px 12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.875rem;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--accent-bright);}
.form-input::placeholder{color:var(--text3);}
.form-select option{background:var(--surface2);}
.form-group{margin-bottom:12px;}
.bin-log-row{background:var(--surface);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-left:3px solid var(--green);}
.bin-log-name{font-size:0.844rem;font-weight:500;color:var(--text);}
.bin-log-meta{font-size:0.688rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.bin-log-del{background:none;border:none;color:var(--text3);font-size:1.25rem;cursor:pointer;flex-shrink:0;}
.btn-send{width:100%;padding:14px;border-radius:var(--radius);background:var(--green);color:#fff;border:none;font-size:0.875rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px;}
.btn-clear-sm{width:100%;padding:10px;border-radius:var(--radius);background:var(--surface2);color:var(--text2);border:none;font-size:0.813rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
/* EMPTY & TOAST */
.empty-state{text-align:center;padding:40px 24px;color:var(--text3);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.empty-text{font-size:0.813rem;line-height:1.6;}
.toast{position:fixed;top:calc(var(--safe-top) + 64px);left:50%;transform:translateX(-50%) translateY(-14px);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:0.813rem;font-weight:600;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.coll-cat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 4px 8px;cursor:pointer;user-select:none;font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-top:14px;}
.coll-cat-body{overflow:hidden;max-height:2000px;transition:max-height 0.3s ease;}
.coll-cat-body.collapsed{max-height:0;}
.coll-cat-chevron{font-size:0.75rem;color:var(--text3);transition:transform 0.2s;margin-left:4px;display:inline-block;}
.coll-cat-header.collapsed .coll-cat-chevron{transform:rotate(-90deg);}
.coll-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border-radius:var(--radius);margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;}
.coll-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.813rem;}
.coll-name{font-size:0.844rem;font-weight:500;flex:1;}
.coll-qty{width:44px;height:34px;background:var(--bg);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.938rem;text-align:center;outline:none;-webkit-appearance:none;}
.coll-qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.add-custom-btn{width:100%;padding:12px;border-radius:var(--radius);background:var(--surface);border:1px dashed var(--surface3);color:var(--text2);font-size:0.813rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;}
.custom-input-row{display:flex;gap:8px;margin:8px 0;}

.submit-section-title{font-size:0.813rem;font-weight:700;color:var(--text);margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--surface3);display:flex;align-items:center;justify-content:space-between;}
.log-add-form{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.btn-add-entry{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--accent-bright);border:1px dashed var(--accent-bright);font-size:0.813rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.form-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);display:block;margin-bottom:6px;}
.form-select{width:100%;padding:11px 12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;}
.send-bar{padding:10px 0 4px;}
.btn-clear-sm{width:100%;padding:11px;border-radius:var(--radius);background:var(--surface2);color:var(--text2);border:none;font-size:0.75rem;font-weight:600;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;}
</style>
</head>

var WINE_NOTES = [{"name": "Ronco Belvedere Prosecco", "type": "Sparkling", "appellation": "Prosecco DOC · Veneto", "tasting": "Pale straw, lively bubbles. Green apple, white peach, acacia blossom, fresh cream. Light-bodied, delicate stone fruit, citrus zest, clean slightly off-dry finish.", "selling": "The backbone of our Spritz menu. Made by Charmat method in Treviso. Slightly off-dry — gateway for unsure guests. Versatile for opening or closing a meal.", "producer": "Family estate in the Prosecco DOC zone, Treviso, Veneto. Charmat method preserves freshness. Veneto is Italy's most prolific DOC region. Prosecco has surpassed Champagne as the world's best-selling sparkling wine.", "pairings": "Burrata e Prosciutto, Focaccia, Arancinò, Salumi e Formaggi, Aperol Spritz, Campari Spritz, Limoncello Spritz"}, {"name": "Ronco Belvedere Lambrusco", "type": "Sparkling", "appellation": "Lambrusco DOC · Emilia-Romagna", "tasting": "Deep ruby, violet foam. Sour cherry, wild blackberry, dried violet, earthy note. Lively, juicy, bright acidity, dry slightly tannic finish. Nothing like sweet Lambrusco of the past.", "selling": "Dry sparkling red — serve chilled. High acidity and light tannin make it one of the best food wines on the menu. Great for guests beyond Prosecco but not ready for a full red. The sparkling red always starts a conversation.", "producer": "From Emilia-Romagna — home of Parmigiano-Reggiano, Prosciutto di Parma, and mortadella. Lambrusco has been the table wine here for centuries. Best modern examples are dry and complex.", "pairings": "Prosciutto e Burrata, Salumi e Formaggi, Tagliatelle Bolognese, Lasagna Emiliana, Salsicciotta pizza"}, {"name": "Lucci Lambrusco Reggiano DOC Secco", "type": "Sparkling", "appellation": "Lambrusco Reggiano DOC · Emilia-Romagna", "tasting": "Deep ruby, fine violet froth. Dark berries, red cherry, dried flowers. Juicy raspberry, cherry, wild blackberry with earthy undertones and bright acidity. Dry, lively finish.", "selling": "Serve chilled like a rosé — Italy's answer to sparkling red. James Suckling 91 pts. Low ABV. Great for guests who want something different from Prosecco or a still red.", "producer": "Co-founded by Ashley Graham, made by a fifth-generation winemaker in Emilia-Romagna. Charmat method in stainless steel. Region home to Parmigiano-Reggiano, prosciutto di Parma, and tortellini.", "pairings": "Prosciutto e Burrata, Salumi e Formaggi, Salsicciotta pizza, Tagliatelle al Fungo, Tagliatelle Bolognese, Lasagna Emiliana, Tonnarelli Cacio e Pepe"}, {"name": "Cascina Asinari Moscato d'Asti", "type": "Sparkling", "appellation": "Moscato d'Asti DOCG · Piemonte", "tasting": "Nearly crystalline, frizzante effervescence. Intensely aromatic: white peach, apricot, orange blossom, ripe pear, honeyed sweetness. Gently sweet, light (5.5% ABV), creamy, fresh finish.", "selling": "Low alcohol, gentle sweetness — accessible to almost anyone. Perfect dessert wine or for guests who prefer lighter and aromatic. DOCG — Italy's highest designation. Great for celebratory tables.", "producer": "Family estate in the Asti hills of Piemonte. Muscat Blanc a Petits Grains — one of the oldest cultivated varietals in the world. Fermented partway, leaving natural residual sugar, never aged.", "pairings": "Tiramisu, Panna Cotta, fresh fruit, aged cheeses, spicy dishes, or as a digestivo"}, {"name": "Cantine Ferrari Trento DOC Brut", "type": "Sparkling", "appellation": "Trento DOC · Trentino", "tasting": "Brilliant pale gold, fine persistent perlage. Complex and toasty: brioche, fresh citrus, green apple, white flowers, chalky mineral. Structured, creamy, vibrant acidity, almond and lemon curd, long elegant finish.", "selling": "Ferrari is Italy's most celebrated metodo classico producer. Same method as Champagne — second fermentation in bottle. The most prestigious sparkling appellation in Italy. For Champagne lovers wanting Italian. Consistently 90+ pts.", "producer": "Founded 1902 by Giulio Ferrari, Lunelli family since 1952. Trento DOC — in the Alps of Trentino, 400-700m elevation — is Italy's only sparkling appellation exclusively for metodo classico.", "pairings": "Burrata e Prosciutto, Crudo, Branzino alla Livornese, Salmone, celebrations and toasts"}, {"name": "Baglio di Grisi Grillo", "type": "White", "appellation": "Sicilia DOC · Sicilia", "tasting": "Pale straw, golden glints. Citrus blossom, lemon peel, ripe pear, clean saline note. Medium-bodied and round, stone fruit, fresh herbs, bright mineral finish. Fuller texture than Pinot Grigio with dry bitter almond aftertaste.", "selling": "Sicily's signature white grape. Great for guests who find Pinot Grigio too light or Chardonnay too heavy. Natural salinity from sea influence makes it one of the most versatile food wines on the list.", "producer": "Family estate in western Sicily. Grillo — a crossing of two native Sicilian grapes — was historically used in Marsala; today bottled as a serious varietal. Sicily's warm climate, sea breezes, and volcanic soils produce whites of real character.", "pairings": "Focaccia Bianca, Arancino, Burrata, Tonnarelli Cacio e Pepe, Linguine alle Vongole, Branzino alla Livornese, Insalata di Cavolo Nero"}, {"name": "Fontanafredda Arneis Pradalupo", "type": "White", "appellation": "Langhe DOC · Piemonte", "tasting": "Pale straw, light gold. Delicate and floral: white peach, pear, almond, wildflowers. Dry, medium-bodied, refreshingly crisp — stone fruit, citrus, bitter almond finish with light mineral texture.", "selling": "Arneis means little rascal in Piedmontese — notoriously difficult to grow. Fontanafredda is one of Piemonte's most historic estates (originally House of Savoy land). Great for guests who want distinctly Italian and off the beaten path.", "producer": "Founded 1878 on land belonging to the House of Savoy, Serralunga d'Alba, heart of the Barolo zone. Piemonte — foot of the mountains — home to Barolo, Barbaresco, and distinctive natives like Arneis and Moscato.", "pairings": "Fonduta al Burro di Tartufo, Salumi e Formaggi, Ravioli di Barbabietola, Gnocchi con Zucca, Pollo Milano-Cortina"}, {"name": "La Staffa Verdicchio Castello di Jesi", "type": "White", "appellation": "Verdicchio dei Castelli di Jesi DOC · Marche", "tasting": "Pale straw-gold, greenish highlights. Citrus blossom, grapefruit, green apple, fresh herbs, stony mineral. Dry, crisp, medium-bodied — grapefruit and pear with distinctive bitter-almond finish. Long, vibrant acidity.", "selling": "Verdicchio — from verde (green) — is one of Italy's great underappreciated whites. La Staffa is biodynamic. For guests who love mineral-driven whites like Chablis or Muscadet. The bitter-almond finish is a signature conversation starter.", "producer": "Small family-run biodynamic estate in the Marche hills near Jesi. Verdicchio was historically Italy's first white wine exported internationally in volume. The Castelli di Jesi zone produces Verdicchio of exceptional freshness and mineral precision.", "pairings": "Linguine alle Vongole, Branzino alla Livornese, Salmone alla Piastra, Burrata, Focaccia Bianca, Ravioli di Barbabietola"}, {"name": "Feudi di San Gregorio Falanghina", "type": "White", "appellation": "Falanghina del Sannio DOC · Campania", "tasting": "Bright golden yellow. Ripe citrus, white peach, apricot, fresh herbs, faint floral note. Full and round — generous fruit, good acidity, clean slightly mineral finish with touch of almonds.", "selling": "Falanghina is ancient — historians believe it was the basis of Falernum, the wine favored by Roman emperors. Feudi di San Gregorio is the benchmark producer. 90+ pts consistently. Full, fruited, and interesting without oak.", "producer": "Founded 1986, leading Campanian estate in the Irpinia hills. Works extensively with ancient Campanian native varieties. Campania is one of Italy's oldest wine regions — Greeks settled here in the 8th century BC.", "pairings": "Linguine alle Vongole, Branzino alla Livornese, Salmone alla Piastra, Burrata e Prosciutto, Gnocchi con Zucca e Fonduta, Pollo Milano-Cortina"}, {"name": "Jermann Pinot Grigio", "type": "White", "appellation": "Venezia Giulia IGT · Friuli-Venezia Giulia", "tasting": "Pale copper-gold, shimmering silver. Complex: ripe pear, peach, quince, honeysuckle, subtle spice. Round and generous — full-bodied for Pinot Grigio, rich stone fruit, toasted almond, long savory finish.", "selling": "Jermann is one of the most important names in Italian white wine — a pioneer of the Friuli quality movement in the 1970s and 80s. This pours BTG and also appears BTB. Will surprise guests who think they know Pinot Grigio.", "producer": "Founded 1881, became a legend under Silvio Jermann Jr. in the 1970s. Collio area near the Slovenian border. Friuli's warm days, cool nights, and glacial soils produce whites of remarkable depth and longevity.", "pairings": "Fonduta al Burro di Tartufo, Ravioli di Barbabietola, Branzino alla Livornese, Salmone, Burrata, Gnocchi con Zucca e Fonduta"}, {"name": "Argiolas Costamolino Vermentino", "type": "White", "appellation": "Vermentino di Sardegna DOC · Sardegna", "tasting": "Pale straw with gold hints. Floral and inviting — lemon zest, white peach, pine, fresh mint. Vibrant and textural with stone fruit, quince, touch of tangerine. Bright lingering acidity with subtle saline Mediterranean note.", "selling": "Sardinia's signature white at its most expressive. Consistently 91+ pts. Stainless steel, hillside vineyards 190m above sea. Great for guests who love Sauvignon Blanc but want something more textural. Citrus-driven and herbal.", "producer": "Sardinia's leading wine estate since 1938. Third-generation family, 600 acres of native varieties. Vermentino's aromatic character shaped by Sardinia's macchia — the wild herb scrubland of the Mediterranean.", "pairings": "Burrata e Prosciutto, Arancinò Milano-Cortina, Linguine alle Vongole, Ravioli di Barbabietola, Branzino alla Livornese, Salmone alla Piastra, Insalata di Cavolo Nero"}, {"name": "Attems Pinot Grigio", "type": "White", "appellation": "Friuli DOC · Friuli-Venezia Giulia", "tasting": "Pale straw, silver-green highlights. Ripe pear, green apple, lemon blossom, crushed limestone. Creamy yet bright — stone fruit and Meyer lemon with delicate minerality, clean crisp finish.", "selling": "Friuli is the benchmark for Italian Pinot Grigio. Attems is now part of the legendary Frescobaldi family. Drawn from three distinct soil types — real complexity. Consistently 88-90 pts. The answer for guests who think they don't like Pinot Grigio.", "producer": "Attems family has grown wine in Friuli since 1106 — nearly a millennium. Acquired by Marchesi de' Frescobaldi in 2000. Located in Collio and Isonzo near the Slovenian border. Warm days, cool nights produce whites of uncommon depth.", "pairings": "Fonduta al Burro di Tartufo, Focaccia Bianca, Ravioli di Barbabietola, Gnocchi con Zucca e Fonduta, Spaghetti Cacio e Pepe, Branzino alla Livornese, Pollo Milano-Cortina"}, {"name": "Elena Walch Chardonnay", "type": "White", "appellation": "Alto Adige DOC · Alto Adige / Südtirol", "tasting": "Bright straw yellow, golden highlights. Fresh apple, tropical fruit (pineapple, mango), white flowers, alpine mineral freshness. Medium-bodied, vibrant, juicy stone fruit, crisp clean finish. Stainless steel — no oak.", "selling": "Chardonnay as it tastes in the Alps — bright, unoaked, and alive. High-altitude vineyards up to 600m give natural tension. Wine Enthusiast highly rated. For guests who find California Chardonnay too buttery or French Burgundy too austere.", "producer": "Founded 1985 in Tramin by Elena Walch, architect turned wine revolutionary — earned the title Donna del Vino. Today run by daughters Julia and Karoline. Alto Adige is Italy's northernmost region, in the Dolomites.", "pairings": "Burrata, Prosciutto di Parma, Tagliatelle Verde al Fungo, Ravioli di Barbabietola, Spaetzle, Pollo Milano-Cortina, Branzino alla Livornese"}, {"na mooth — supple tannins, vibrant acidity, clean fruit-forward finish.", "selling": "Planeta is one of Sicily's most recognized names globally. La Segreta is their approachable flagship red — Nero d'Avola, Frappato, Merlot, Syrah blend. Consistent 88-90 pts, excellent value-to-quality. Bridges Italian and international palates.", "producer": "Founded 1985, within two decades became Sicily's most internationally celebrated estate. Nine estates across the island. Credited with sparking Sicily's quality revolution. La Segreta is their gateway wine — everyday excellence.", "pairings": "Tagliatelle al Fungo, Salsicciotta pizza, Salumi e Formaggi, Goulash, Lasagna Emiliana, Stinco di Maiale"}, {"name": "Valle Reale Montepulciano d'Abruzzo", "type": "Red", "appellation": "Montepulciano d'Abruzzo DOC · Abruzzo", "tasting": "Deep ruby, garnet rim. Rich and complex: dark plum, black cherry, dried herbs, leather, dark chocolate. Full-bodied, dense velvety tannins, concentrated dark fruit, long warming finish.", "selling": "Valle Reale is one of Abruzzo's leading organic estates. Montepulciano (the grape, not the Tuscan town) is Italy's great underrated red — naturally high in tannin and color. Consistently 90+ pts.", "producer": "Certified organic estate founded 2000 in the dramatic mountain valleys of Abruzzo, in the shadow of the Gran Sasso — Italy's highest mainland peak.", "pairings": "Tagliatelle Bolognese, Lasagna Emiliana, Stinco di Maiale, Goulash, Ribeye, Salumi e Formaggi"}, {"name": "Colombaio di Cencio Chianti Classico", "type": "Red", "appellation": "Chianti Classico DOCG · Toscana", "tasting": "Transparent ruby, garnet hints. Classic Sangiovese nose: tart cherry, dried rose, tobacco, leather, dried herbs. Medium-bodied — bright acidity, firm integrated tannins, long saline finish. Earthy, complex, unmistakably Tuscan.", "selling": "Chianti Classico is one of the world's great food wines — Sangiovese's naturally high acidity and firm tannins were designed by nature // ── UPDATES ──────────────────────────────────────────────────────
function renderUpdates() {
  var el = document.getElementById('view-updates');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4E1;</div><div class="empty-text">Loading...</div></div>';
  var cutoff = new Date(Date.now() - 16 * 60 * 60 * 1000).toISOString();
  var now = new Date();

  supa.from('updates').select('*').eq('published', true).order('created_at', {ascending: false})
    .then(function(result) {
      var data = result.data || [];
      var visible = data.filter(function(u) {
        if (u.expires_at) return new Date(u.expires_at) > now;
        return new Date(u.created_at) > new Date(cutoff);
      });

      if (!visible.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4E2;</div><div class="empty-text">No updates in the last 16 hours.</div></div>';
        return;
      }

      var tagLabel = { 'new': 'New Item', 'spec': 'Spec Update', 'ops': 'Ops', 'info': 'Info' };
      var tagClass = { 'new': 'tag-new', 'spec': 'tag-spec', 'ops': 'tag-ops', 'info': 'tag-info' };

      el.innerHTML = visible.map(function(u) {
        var isAlert = !!u.expires_at;
        var cls   = isAlert ? 'tag-alert' : (tagClass[u.tag] || 'tag-info');
        var label = isAlert ? 'Alert' : (tagLabel[u.tag] || u.tag);
        var mins  = isAlert ? Math.round((new Date(u.expires_at) - now) / 60000) : 0;
        var sub   = isAlert
          ? (mins >= 60 ? Math.round(mins / 60) + 'h left' : mins + 'min left')
          : new Date(u.created_at).toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
        var border = isAlert ? ' style="border-left:3px solid #E08030;"' : '';
        return '<div class="update-card"' + border + '>' +
          '<span class="update-tag ' + cls + '">' + label + (isAlert ? ' &middot; ' + sub : '') + '</span>' +
          '<div class="update-text">' + u.text + '</div>' +
          '<div class="update-sub">' + sub + '</div>' +
        '</div>';
      }).join('');
    });
}

function setWineFilter(t) { wineFilter = t; renderWines(); }

function renderWines() {
  var el = document.getElementById('view-wines');
  var types = ['All', 'Sparkling', 'White', 'Rose', 'Red', 'Specialty'];
  var typeLabels = { All:'All', Sparkling:'Sparkling', White:'White', Rose:'Ros\u00e9', Red:'Red', Specialty:'Specialty' };

  var filtered = WINE_NOTES.filter(function(w) {
    var search = wineSearch.toLowerCase();
    var typeOK = wineFilter === 'All' || w.type === wineFilter || (wineFilter === 'Rose' && w.type === 'Ros\u00e9');
    var searchOK = !wineSearch ||
      w.name.toLowerCase().includes(search) ||
      w.pairings.toLowerCase().includes(search) ||
      w.appellation.toLowerCase().includes(search) ||
      w.tasting.toLowerCase().includes(search);
    return typeOK && searchOK;
  });

  var sticky = document.createElement('div');
  sticky.style.cssText = 'position:sticky;top:-12px;z-index:10;background:var(--bg);padding:0 0 4px;';

  var searchEl = document.createElement('input');
  searchEl.className = 'spec-search';
  searchEl.type = 'text';
  searchEl.placeholder = 'Search wine, region, pairing...';
  searchEl.value = wineSearch || '';
  searchEl.oninput = function() { wineSearch = this.value; renderWines(); };

  var filtersEl = document.createElement('div');
  filtersEl.className = 'spec-filters';
  types.forEach(function(t) {
    var btn = document.createElement('div');
    btn.className = 'spec-filter' + (wineFilter === t ? ' active' : '');
    btn.textContent = typeLabels[t];
    btn.onclick = function() { setWineFilter(t); };
    filtersEl.appendChild(btn);
  });

  sticky.appendChild(searchEl);
  sticky.appendChild(filtersEl);

  var typeColorMap = {
    Sparkling: {bg:'rgba(200,175,30,0.18)',color:'#C8AF1E'},
    White:     {bg:'rgba(27,58,92,0.25)',  color:'#7AB0D8'},
    'Ros\u00e9': {bg:'rgba(184,92,0,0.18)',  color:'#D4834A'},
    Red:       {bg:'rgba(160,30,30,0.25)', color:'#E05050'},
    Specialty: {bg:'rgba(30,92,56,0.25)',  color:'#38966A'},
  };

  var cardsHTML = filtered.map(function(w) {
    var tc = typeColorMap[w.type] || {bg:'var(--surface3)',color:'var(--text2)'};
    var pairingTags = w.pairings.split(',').map(function(p) {
      return '<span class="wine-pairing-tag">' + p.trim() + '</span>';
    }).join('');
    return '<div class="wine-card" onclick="toggleWineCard(this)">' +
      '<div class="wine-card-header">' +
        '<div class="wine-card-left">' +
          '<div class="wine-name">' + w.name + '</div>' +
          '<div class="wine-appellation">' + w.appellation + '</div>' +
        '</div>' +
        '<div class="wine-type-badge" style="background:' + tc.bg + ';color:' + tc.color + ';">' + w.type + '</div>' +
      '</div>' +
      '<div class="wine-card-body">' +
        '<div class="wine-section"><div class="wine-section-label">Tasting</div><div class="wine-section-text">' + w.tasting + '</div></div>' +
        '<div class="wine-section"><div class="wine-section-label">Selling Point</div><div class="wine-section-text">' + w.selling + '</div></div>' +
        '<div class="wine-section"><div class="wine-section-label">Producer</div><div class="wine-section-text">' + w.producer + '</div></div>' +
        '<div class="wine-section"><div class="wine-section-label">Pairings</div><div class="wine-pairings">' + pairingTags + '</div></div>' +
      '</div>' +
    '</div>';
  }).join('');

  el.innerHTML = filtered.length ? cardsHTML : '<div class="empty-state"><div class="empty-icon">&#x1F377;</div><div class="empty-text">No wines match.</div></div>';
  el.insertBefore(sticky, el.firstChild);
}

function toggleWineCard(card) {
  var body = card.querySelector('.wine-card-body');
  var isOpen = body.classList.contains('open');
  document.querySelectorAll('.wine-card-body.open').forEach(function(b) { b.classList.remove('open'); });
  if (!isOpen) body.classList.add('open');
}

function toggleFOHCollCat(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
  var span = header.querySelector('span:first-child');
  if (span) {
    var key = span.childNodes[0] ? span.childNodes[0].textContent.trim() : span.textContent.trim();
    fohCollOpen[key] = !header.classList.contains('collapsed');
  }
}
function toggleFOHColl(event) {
  event.stopPropagation();
  if (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON') return;
  var name = decodeURIComponent(event.currentTarget.getAttribute('data-item'));
  var idx  = fohCollat.findIndex(function(c) { return c.name === name; });
  if (idx >= 0) fohCollat.splice(idx, 1); else fohCollat.push({ name: name, qty: '1' });
  renderSubmit();
}
function updateFOHCQ(input) {
  var name = decodeURIComponent(input.getAttribute('data-item'));
  var item = fohCollat.find(function(c) { return c.name === name; });
  if (item) item.qty = input.value;
}
function toggleFOHCI() { fohCustomShow = !fohCustomShow; renderSubmit(); }
function addFOHCI() {
  var inp = document.getElementById('fohCIInput');
  var val = inp ? inp.value.trim() : '';
  if (!val) return;
  fohCollCustom.push({ name: val, qty: '1' });
  fohCustomShow = false;
  renderSubmit();
}
function removeFOHCC(btn) {
  fohCollCustom.splice(parseInt(btn.getAttribute('data-ci')), 1);
  renderSubmit();
}
function updateFOHCCQ(input) {
  var i = parseInt(input.getAttribute('data-ci'));
  if (fohCollCustom[i]) fohCollCustom[i].qty = input.value;
}
function addBottleSale() {
  var nameEl = document.getElementById('btb-name');
  var binEl  = document.getElementById('btb-bin');
  var nameVal = nameEl ? nameEl.value.trim() : '';
  var binVal  = binEl  ? binEl.value.trim()  : '';
  var qty = parseInt((document.getElementById('btb-qty') || {}).value) || 1;
  if (!nameVal) { toast('Enter the wine name'); return; }
  if (!binVal)  { toast('Enter the BIN / D365 number'); return; }
  var existing = bottleSales.find(function(s) { return s.bin === binVal; });
  if (existing) { existing.qty += qty; } else { bottleSales.push({ bin: binVal, name: nameVal, qty: qty }); }
  if (nameEl) nameEl.value = '';
  if (binEl)  binEl.value  = '';
  toast(parts[1] + ' added');
  renderSubmit();
}
function removeSale(i) { bottleSales.splice(i, 1); renderSubmit(); }
function submitFOHReport() {
  var promises = [];
  bottleSales.forEach(function(s) {
    promises.push(supa.from('bottle_log').insert({ wine: s.name, amount: s.qty + ' bottle' + (s.qty > 1 ? 's' : ''), shift_date: TODAY }));
  });
  var allCollat = fohCollat.concat(fohCollCustom);
  if (allCollat.length) {
    promises.push(supa.from('collateral_requests').insert({ items: JSON.stringify(allCollat), shift_date: TODAY }));
  }
  Promise.all(promises).then(function() {
    toast('Report submitted');
    bottleSales = []; fohCollat = []; fohCollCustom = [];
    renderSubmit();
  });
}
function clearFOHSubmit() {
  if (!confirm('Clear all entries?')) return;
  bottleSales = []; fohCollat = []; fohCollCustom = [];
  renderSubmit();
}

initRealtime();

</script>
</body>
