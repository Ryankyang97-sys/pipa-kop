<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #0D0D0D;
  --surface: #1A1A1A;
  --surface2: #242424;
  --surface3: #2E2E2E;
  --text: #F0EDE8;
  --text2: #8A8680;
  --accent: #B85C00;
  --accent-dim: rgba(184,92,0,0.15);
  --green: #2D7A4F;
  --green-dim: rgba(45,122,79,0.15);
  --red: #8B1A1A;
  --red-dim: rgba(139,26,26,0.18);
  --yellow: #7A6A10;
  --yellow-dim: rgba(200,175,30,0.15);
  --purple: #5B2D8E;
  --purple-dim: rgba(91,45,142,0.18);
  --blue: #1B3A5C;
  --cellar: #B85C00;
  --cage: #5B2D8E;
  --walkin: #0D6E6E;
  --bar: #E94560;
  --radius: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
}

/* ── TOP NAV ── */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: calc(var(--safe-top) + 8px) 12px 0;
  background: var(--bg);
}
.top-bar h1 {
  font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
  color: var(--text2); text-transform: uppercase; padding: 0 4px 8px;
  display: flex; align-items: center; justify-content: space-between;
}

.header-link {
  font-size: 11px; color: var(--text3); text-decoration: none;
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid var(--surface3);
  white-space: nowrap;
}
.top-bar h1 .date { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 12px; }
.stop-tabs {
  display: flex; gap: 6px; padding-bottom: 10px;
  overflow-x: auto; scrollbar-width: none;
}
.stop-tabs::-webkit-scrollbar { display:none; }
.stop-tab {
  flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: var(--surface); color: var(--text2);
  border: 1.5px solid transparent;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.stop-tab.active { color: var(--text); border-color: var(--accent); background: var(--accent-dim); }
.stop-tab .badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: var(--surface3); padding: 2px 6px; border-radius: 8px;
}
.stop-tab.active .badge { background: var(--accent); color: #fff; }

/* ── SECTION ACCORDION ── */
.main-scroll {
  position: fixed;
  top: calc(var(--safe-top) + 82px);
  bottom: calc(var(--safe-bottom) + 64px);
  left: 0; right: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 10px 20px;
}
.section-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
  padding: 14px 6px 8px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.section-header h2 {
  font-size: 15px; font-weight: 700; color: var(--text);
}
.section-header .sub { font-size: 11px; color: var(--text2); margin-left: 8px; font-weight: 400; }
.section-header .progress {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--green); background: var(--green-dim);
  padding: 3px 8px; border-radius: 8px;
}
.section-header .chevron {
  color: var(--text2); transition: transform 0.2s; font-size: 14px;
}
.section-header.collapsed .chevron { transform: rotate(-90deg); }
.section-body { overflow: hidden; }
.section-body.collapsed { display: none; }

/* ── ITEM ROW ── */
.item-row {
  display: flex; align-items: center;
  padding: 10px 8px;
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 4px;
  gap: 8px;
  min-height: 52px;
  position: relative;
}
.item-row.counted { background: var(--surface2); }
.item-row.counted .item-name { color: var(--text2); }

/* Flag states */
.item-row.flag-86 { border-left: 3px solid #c0392b; }
.item-row.flag-low { border-left: 3px solid #c9a010; }
.item-row.flag-reorder { border-left: 3px solid #8e44ad; }
.item-row.has-note { border-right: 3px solid var(--accent); }

.item-info { flex: 1; min-width: 0; }
.item-name {
  font-size: 13.5px; font-weight: 500; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-meta {
  font-size: 10.5px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 1px;
  display: flex; align-items: center; gap: 6px;
}
.flag-badge {
  font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.flag-badge.b86 { background: #c0392b; color: #fff; }
.flag-badge.low { background: #c9a010; color: #fff; }
.flag-badge.reorder { background: #8e44ad; color: #fff; }

/* ── COUNT INPUT CLUSTER ── */
.count-cluster { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.count-field {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.count-label {
  font-size: 8.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text2);
}
.count-input {
  width: 48px; height: 40px;
  background: var(--bg); border: 1.5px solid var(--surface3);
  border-radius: 8px; color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 500;
  text-align: center; outline: none;
  -webkit-appearance: none;
}
.count-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}
.count-input.has-value { border-color: var(--green); background: var(--green-dim); }

/* ── FLAG BUTTON ── */
.flag-btn {
  width: 32px; height: 40px;
  background: var(--surface3); border: none; border-radius: 8px;
  color: var(--text2); font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.flag-btn:active { transform: scale(0.93); }
.flag-btn.active { background: var(--accent-dim); color: var(--text); }

/* ── BOTTOM ACTION BAR ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 10px 12px calc(var(--safe-bottom) + 10px);
  background: linear-gradient(transparent, var(--bg) 20%);
  display: flex; gap: 8px;
}
.btn {
  flex: 1; padding: 14px; border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-export { background: var(--accent); color: #fff; }
.btn-clear { background: var(--surface2); color: var(--text2); flex: 0.5; }
.btn-summary { background: var(--green); color: #fff; flex: 0.5; }
.btn-notes { background: var(--surface2); color: var(--text2); flex: 0.5; }
.btn:active { transform: scale(0.97); }

/* ── MODAL (Summary / Flag / Notes) ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 80vh; overflow-y: auto;
  padding: 24px 16px calc(var(--safe-bottom) + 16px);
}
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.modal-stat {
  display: flex; justify-content: space-between; padding: 8px 0;
  border-bottom: 1px solid var(--surface3);
  font-size: 13px;
}
.modal-stat .val { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
.modal-close {
  margin-top: 16px; width: 100%; padding: 14px;
  background: var(--surface3); color: var(--text);
  border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer;
}

/* ── FLAG SHEET ── */
.flag-sheet {
  display: none; position: fixed; inset: 0; z-index: 210;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  align-items: flex-end; justify-content: center;
}
.flag-sheet.open { display: flex; }
.flag-panel {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; padding: 20px 16px calc(var(--safe-bottom) + 16px);
}
.flag-panel h4 {
  font-size: 15px; font-weight: 700; margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.flag-panel .flag-item-meta {
  font-size: 11px; color: var(--text2); margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
}
.flag-options {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.flag-option {
  flex: 1; padding: 14px 8px; border-radius: var(--radius);
  border: 2px solid var(--surface3);
  background: var(--surface2);
  color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.flag-option .flag-icon { font-size: 20px; }
.flag-option.selected-86 { border-color: #c0392b; background: rgba(192,57,43,0.18); color: #e74c3c; }
.flag-option.selected-low { border-color: #c9a010; background: rgba(201,160,16,0.18); color: #f1c40f; }
.flag-option.selected-reorder { border-color: #8e44ad; background: rgba(142,68,173,0.18); color: #9b59b6; }

/* Note textarea inside flag panel */
.flag-note-label {
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.flag-note-input {
  width: 100%; background: var(--bg); border: 1.5px solid var(--surface3);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 12px; outline: none; resize: none; line-height: 1.4;
  min-height: 80px;
  margin-bottom: 12px;
}
.flag-note-input:focus { border-color: var(--accent); }
.flag-note-input::placeholder { color: var(--text2); }

.flag-save {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--accent); color: #fff;
  border: none; font-size: 14px; font-weight: 700; cursor: pointer;
}
.flag-clear-btn {
  width: 100%; padding: 12px; border-radius: var(--radius);
  background: var(--surface3); color: var(--text2);
  border: none; font-size: 13px; font-weight: 600; cursor: pointer;
  margin-top: 8px;
}

/* ── SHIFT NOTES SHEET ── */
.notes-sheet {
  display: none; position: fixed; inset: 0; z-index: 210;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  align-items: flex-end; justify-content: center;
}
.notes-sheet.open { display: flex; }
.notes-panel {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 80vh;
  padding: 20px 16px calc(var(--safe-bottom) + 16px);
  display: flex; flex-direction: column;
}
.notes-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.notes-panel .notes-sub { font-size: 11px; color: var(--text2); margin-bottom: 14px; }
.notes-textarea {
  flex: 1; min-height: 160px; max-height: 280px;
  background: var(--bg); border: 1.5px solid var(--surface3);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 12px; outline: none; resize: none; line-height: 1.5;
  margin-bottom: 12px;
}
.notes-textarea:focus { border-color: var(--accent); }
.notes-textarea::placeholder { color: var(--text2); }
.notes-save { 
  padding: 14px; border-radius: var(--radius);
  background: var(--accent); color: #fff;
  border: none; font-size: 14px; font-weight: 700; cursor: pointer;
  width: 100%;
}
.notes-close-btn {
  padding: 12px; border-radius: var(--radius);
  background: var(--surface3); color: var(--text2);
  border: none; font-size: 13px; font-weight: 600; cursor: pointer;
  width: 100%; margin-top: 8px;
}
.notes-indicator {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); display: inline-block;
  margin-right: 4px; vertical-align: middle;
}

/* ── TOAST ── */
.toast {
  position: fixed; top: calc(var(--safe-top) + 90px);
  left: 50%; transform: translateX(-50%) translateY(-20px);
  background: var(--green); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.3s; z-index: 300; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

<div class="top-bar">

    <span>PiPa Count</span>

      <a class="header-link" href="pipa-admin.html">Admin →</a>
    </div>
  </h1>
  <div class="stop-tabs" id="stopTabs"></div>
</div>

<div class="main-scroll" id="mainScroll"></div>

<div class="bottom-bar">

  <button class="btn btn-notes" id="notesBtn" onclick="openNotes()">📝 Notes</button>
  <button class="btn btn-export" onclick="exportCSV()">Export CSV</button>
  <button class="btn btn-export" id="supa-save-btn" onclick="saveCountToSupabase()" style="background:var(--accent,#B85C00);color:#fff;margin-left:6px;">Save to Trend</button>
  <button class="btn btn-summary" onclick="openLoadDateSheet()">📅 Load</button>
  <button class="btn btn-summary" onclick="showSummary()">Summary</button>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeSummary(event)">

</div>

<!-- Flag Sheet -->
<div class="flag-sheet" id="flagSheet" onclick="closeFlagSheet(event)">

    <div class="flag-item-meta" id="flagItemMeta"></div>
    <div class="flag-options">
      <div class="flag-option" id="flag-86" onclick="selectFlag('86')">
        <span class="flag-icon">🚫</span>
        86'd
      </div>
      <div class="flag-option" id="flag-low" onclick="selectFlag('low')">
        <span class="flag-icon">⚠️</span>
        Low
      </div>
      <div class="flag-option" id="flag-reorder" onclick="selectFlag('reorder')">
        <span class="flag-icon">🔄</span>
        Reorder
      </div>
    </div>
    <div class="flag-note-label">Note (optional)</div>
    <textarea class="flag-note-input" id="flagNoteInput" placeholder="e.g. Carpano Antica empty, need to 86 — or — Prosecco delivery came short 2 cases…" rows="3"></textarea>
    <button class="flag-save" onclick="saveFlag()">Save Flag & Note</button>
    <button class="flag-clear-btn" onclick="clearFlag()">Clear Flag</button>
  </div>
</div>

<!-- Shift Notes Sheet -->
<div class="notes-sheet" id="notesSheet" onclick="closeNotesSheet(event)">
  <div class="notes-panel" onclick="event.stopPropagation()">
    <h3>📝 Shift Notes</h3>
    <div class="notes-sub">Jot anything mid-count. Exports with CSV.</div>
    <textarea class="notes-textarea" id="shiftNotesTA" placeholder="Carpano Antica empty, need to 86&#10;Prosecco delivery came short 2 cases&#10;Brief staff on Cortina swap…"></textarea>
    <button class="notes-save" onclick="saveNotes()">Save Notes</button>
    <button class="notes-close-btn" onclick="closeNotes()">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Hidden CSV file input for import -->
<input type="file" id="csvImportInput" accept=".csv" style="display:none;" onchange="handleCSVImport(this)">

<!-- Load Date / Import Sheet -->
<div class="notes-sheet" id="loadDateSheet" onclick="closeLoadDateSheet(event)">
  <div class="notes-panel" onclick="event.stopPropagation()">
    <h3>📅 Load Count</h3>
    <div class="notes-sub">Load a past session for editing, or import from CSV.</div>

    <div style="margin-top:16px;">
      <label style="font-size:0.75rem;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;">Load by date</label>
      <input type="date" id="loadDateInput" style="width:100%;padding:10px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:8px;color:var(--text);font-size:1rem;font-family:'DM Sans',sans-serif;">
      <button onclick="loadDateSession()" style="width:100%;margin-top:8px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.938rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">Load This Date</button>
    </div>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--surface3);">
      <label style="font-size:0.75rem;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;">Import from CSV</label>
      <div style="font-size:0.688rem;color:var(--text3);margin-bottom:8px;">Pick a pipa-count CSV export. Counts & flags load into the current session.</div>
      <button onclick="document.getElementById('csvImportInput').click()" style="width:100%;padding:12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:8px;color:var(--text);font-size:0.938rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">📂 Choose CSV File</button>
    </div>

    <div id="loadDateStatus" style="margin-top:12px;font-size:0.813rem;color:var(--accent);text-align:center;min-height:20px;"></div>

    <button onclick="closeLoadDateSheet()" style="width:100%;margin-top:16px;padding:12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:8px;color:var(--text2);font-size:0.938rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Close</button>
  </div>
</div>

// ── STATE ──
let currentStop = 0;
let counts = {};   // "sheet|row|field" -> number
let flags = {};    // "sheet|row" -> {type: '86'|'low'|'reorder', note: string}
let shiftNotes = '';
let activeFlagItem = null; // {item, flagKey}
const TODAY = new Date().toISOString().slice(0,10);
// ── STORAGE: Supabase count_sessions + localStorage cache ──
const LS_COUNTS = 'pipa-count-' + TODAY;
const LS_FLAGS  = 'pipa-flags-' + TODAY;
const LS_NOTES  = 'pipa-notes-' + TODAY;

try { const s = localStorage.getItem(LS_COUNTS); if (s) counts = JSON.parse(s); } catch(e){}
try { const s = localStorage.getItem(LS_FLAGS);  if (s) flags  = JSON.parse(s); } catch(e){}
try { const s = localStorage.getItem(LS_NOTES);  if (s) shiftNotes = s; } catch(e){}

function loadCountSession() {
  supa.from('count_sessions').select('*').eq('snap_date', TODAY).limit(1)
    .then(function(r) {
      if (r.error || !r.data || !r.data.length) return;
      var row = r.data[0];
      if (row.counts && Object.keys(row.counts).length) {
        counts = row.counts;
        localStorage.setItem(LS_COUNTS, JSON.stringify(counts));
      }
      if (row.flags && Object.keys(row.flags).length) {
        flags = row.flags;
        localStorage.setItem(LS_FLAGS, JSON.stringify(flags));
      }
      if (row.notes) {
        shiftNotes = row.notes;
        localStorage.setItem(LS_NOTES, shiftNotes);
      }
      renderStop(currentStop);
      var ta = document.getElementById('shiftNotesTA');
      if (ta) ta.value = shiftNotes;
    });
}
try { loadCountSession(); } catch(e) { console.warn('loadCountSession:', e); }

var _saveTimer = null;
function _flushToSupabase() {
  supa.from('count_sessions').upsert({
    snap_date:  TODAY,
    counts:     counts,
    flags:      flags,
    notes:      shiftNotes,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'snap_date' })
  .then(function(r) { if (r.error) console.warn('count_sessions:', r.error.message); });
}
function save() {
  try { localStorage.setItem(LS_COUNTS, JSON.stringify(counts)); } catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_flushToSupabase, 800);
}
function saveFlags() {
  try { localStorage.setItem(LS_FLAGS, JSON.stringify(flags)); } catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_flushToSupabase, 800);
}
function saveNotesStorage() {
  try { localStorage.setItem(LS_NOTES, shiftNotes); } catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_flushToSupabase, 800);
}

function countKey(item, fieldKey) { return `${item.sheet}|${item.row}|${fieldKey}`; }
function flagKey(item)            { return `${item.sheet}|${item.row}`; }

// ── RENDER TABS ──
function renderTabs() {
  const container = document.getElementById('stopTabs');
  container.innerHTML = WALK_ROUTE.map((stop, i) => {
    const totalItems = stop.sections.reduce((s, sec) => s + sec.items.length, 0);
    const counted = stop.sections.reduce((s, sec) =>
      s + sec.items.filter(item =>
        item.fields.some(f => counts[countKey(item, f.key)] !== undefined)
      ).length
    , 0);
    const flagged = stop.sections.reduce((s, sec) =>
      s + sec.items.filter(item => flags[flagKey(item)]).length
    , 0);
    const active = i === currentStop ? 'active' : '';
    return `<div class="stop-tab ${active}" onclick="switchStop(${i})">
      ${stop.icon} ${stop.stop}
      <span class="badge">${counted}/${totalItems}${flagged ? ' 🚩' : ''}</span>
    </div>`;
  }).join('');
}

// ── RENDER SECTIONS ──
function renderSections() {
  const stop = WALK_ROUTE[currentStop];
  const container = document.getElementById('mainScroll');

  // Save scroll position and which sections are collapsed
  const savedScroll = container.scrollTop;
  const collapsedSections = new Set();
  container.querySelectorAll('.section-header.collapsed').forEach(function(h) {
    var nameEl = h.querySelector('h2');
    if (nameEl) collapsedSections.add(nameEl.textContent.trim().split('\n')[0].trim());
  });

  container.innerHTML = stop.sections.map((sec, si) => {
    const counted = sec.items.filter(item =>
      item.fields.some(f => counts[countKey(item, f.key)] !== undefined)
    ).length;
    const total = sec.items.length;
    if (total === 0) return '';

    const itemsHTML = sec.items.map((item) => {
      const hasCounts = item.fields.some(f => counts[countKey(item, f.key)] !== undefined);
      const fk = flagKey(item);
      const flagData = flags[fk];

      // Flag class
      let flagClass = '';
      let flagBadge = '';
      if (flagData) {
        if (flagData.type === '86') { flagClass = 'flag-86'; flagBadge = '<span class="flag-badge b86">86\'d</span>'; }
        if (flagData.type === 'low') { flagClass = 'flag-low'; flagBadge = '<span class="flag-badge low">Low</span>'; }
        if (flagData.type === 'reorder') { flagClass = 'flag-reorder'; flagBadge = '<span class="flag-badge reorder">Reorder</span>'; }
      }
      const hasNote = flagData && flagData.note && flagData.note.trim();
      const noteClass = hasNote ? 'has-note' : '';

      const fieldsHTML = item.fields.map(f => {
        const key = countKey(item, f.key);
        const val = counts[key] !== undefined ? counts[key] : '';
        const hasVal = val !== '';
        return `<div class="count-field">
          <span class="count-label">${f.label}</span>
          <input type="number" inputmode="numeric" pattern="[0-9]*"
            class="count-input ${hasVal ? 'has-value' : ''}"
            value="${val}"
            data-key="${key}"
            onfocus="this.select()"
            oninput="onCount(this)"
            placeholder="–">
        </div>`;
      }).join('');

      const meta = item.bin ? `BIN ${item.bin}` : item.d365;
      const flagIconActive = flagData ? '🚩' : '⚑';

      return `<div class="item-row ${hasCounts ? 'counted' : ''} ${flagClass} ${noteClass}" data-fk="${fk}">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${meta} ${flagBadge}</div>
        </div>
        <div class="count-cluster">
          ${fieldsHTML}
          <button class="flag-btn ${flagData ? 'active' : ''}"
            onclick="openFlagSheet(${si}, '${fk}', '${item.name.replace(/'/g,"\\'")}', '${meta}')"
            title="Flag item">
            ${flagData ? '🚩' : '⚑'}
          </button>
        </div>
      </div>`;
    }).join('');

    return `<div>
      <div class="section-header" onclick="toggleSection(this)">
        <div>
          <h2>${sec.name}<span class="sub">${sec.subtitle || ''}</span></h2>
        </div>
        <span class="progress">${counted}/${total}</span>
      </div>
      <div class="section-body">${itemsHTML}</div>
    </div>`;
  }).join('');

  // Restore collapsed state
  container.querySelectorAll('.section-header').forEach(function(h) {
    var nameEl = h.querySelector('h2');
    if (!nameEl) return;
    var secName = nameEl.textContent.trim().split('\n')[0].trim();
    if (collapsedSections.has(secName)) {
      h.classList.add('collapsed');
      var body = h.nextElementSibling;
      if (body) body.classList.add('collapsed');
    }
  });

  // Restore scroll position (requestAnimationFrame ensures DOM is ready)
  requestAnimationFrame(function() { container.scrollTop = savedScroll; });
}

function switchStop(i) {
  currentStop = i;
  // When switching stops, reset scroll — no preserved state needed
  var container = document.getElementById('mainScroll');
  if (container) container.scrollTop = 0;
  renderTabs();
  renderSections();
}

function toggleSection(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
}

function onCount(input) {
  const key = input.dataset.key;
  const val = input.value.trim();
  if (val === '') {
    delete counts[key];
    input.classList.remove('has-value');
  } else {
    counts[key] = parseInt(val) || 0;
    input.classList.add('has-value');
  }
  save();
  const row = input.closest('.item-row');
  const allInputs = row.querySelectorAll('.count-input');
  const anyCounted = Array.from(allInputs).some(inp => inp.value.trim() !== '');
  row.classList.toggle('counted', anyCounted);
  clearTimeout(window._tabTimer);
  window._tabTimer = setTimeout(renderTabs, 300);
}

// ── FLAG SHEET ──
function openFlagSheet(sectionIdx, fk, itemName, itemMeta) {
  activeFlagItem = { fk };
  document.getElementById('flagItemName').textContent = itemName;
  document.getElementById('flagItemMeta').textContent = itemMeta;

  // Reset option highlight
  document.getElementById('flag-86').className = 'flag-option';
  document.getElementById('flag-low').className = 'flag-option';
  document.getElementById('flag-reorder').className = 'flag-option';

  const existing = flags[fk];
  if (existing) {
    if (existing.type === '86')      document.getElementById('flag-86').classList.add('selected-86');
    if (existing.type === 'low')     document.getElementById('flag-low').classList.add('selected-low');
    if (existing.type === 'reorder') document.getElementById('flag-reorder').classList.add('selected-reorder');
    document.getElementById('flagNoteInput').value = existing.note || '';
  } else {
    document.getElementById('flagNoteInput').value = '';
  }

  document.getElementById('flagSheet').classList.add('open');
}

function closeFlagSheet(e) {
  if (e && e.target !== document.getElementById('flagSheet')) return;
  document.getElementById('flagSheet').classList.remove('open');
  activeFlagItem = null;
}

function selectFlag(type) {
  const classMap = { '86': 'selected-86', 'low': 'selected-low', 'reorder': 'selected-reorder' };
  document.getElementById('flag-86').className = 'flag-option';
  document.getElementById('flag-low').className = 'flag-option';
  document.getElementById('flag-reorder').className = 'flag-option';
  document.getElementById('flag-' + type).classList.add(classMap[type]);
  document.getElementById('flag-' + type).dataset.selected = 'true';
  // Store temporary selection
  if (activeFlagItem) activeFlagItem.type = type;
}

function saveFlag() {
  if (!activeFlagItem) return;
  const fk = activeFlagItem.fk;
  const note = document.getElementById('flagNoteInput').value.trim();

  // Determine which option is selected
  let type = null;
  if (document.getElementById('flag-86').classList.contains('selected-86'))       type = '86';
  if (document.getElementById('flag-low').classList.contains('selected-low'))     type = 'low';
  if (document.getElementById('flag-reorder').classList.contains('selected-reorder')) type = 'reorder';

  if (!type && !note) {
    delete flags[fk];
  } else {
    flags[fk] = { type: type || 'low', note };
  }
  saveFlags();
  document.getElementById('flagSheet').classList.remove('open');
  activeFlagItem = null;
  renderTabs();
  renderSections();
  toast('Flag saved');
}

function clearFlag() {
  if (!activeFlagItem) return;
  delete flags[activeFlagItem.fk];
  saveFlags();
  document.getElementById('flagSheet').classList.remove('open');
  activeFlagItem = null;
  renderTabs();
  renderSections();
  toast('Flag cleared');
}

// ── EXPORT CSV ──
function exportCSV() {
  const date = TODAY;
  let rows = ['Date,Sheet,Row,D365#,Item,Field,Count,Flag,Note'];

  WALK_ROUTE.forEach(stop => {
    stop.sections.forEach(sec => {
      sec.items.forEach(item => {
        const fk = flagKey(item);
        const fd = flags[fk];
        item.fields.forEach(f => {
          const key = countKey(item, f.key);
          if (counts[key] !== undefined) {
            const name = item.name.replace(/,/g, ';');
            const flagStr = fd ? fd.type : '';
            const noteStr = fd && fd.note ? fd.note.replace(/,/g, ';').replace(/\n/g, ' ') : '';
            rows.push(`${date},${item.sheet},${item.row},${item.d365},${name},${f.key},${counts[key]},${flagStr},${noteStr}`);
          }
        });
      });
    });
  });

  // All flagged items (even if not counted)
  let flagRows = ['','--- FLAGGED ITEMS ---', 'D365#,Item,Flag,Note'];
  Object.entries(flags).forEach(([fk, fd]) => {
    // Find item by fk
    let foundItem = null;
    WALK_ROUTE.forEach(stop => stop.sections.forEach(sec =>
      sec.items.forEach(item => { if (flagKey(item) === fk) foundItem = item; })
    ));
    if (foundItem && fd.type) {
      flagRows.push(`${foundItem.d365},${foundItem.name.replace(/,/g,';')},${fd.type},${(fd.note||'').replace(/,/g,';').replace(/\n/g,' ')}`);
    }
  });

  // Shift notes
  let noteRows = [];
  if (shiftNotes.trim()) {
    noteRows = ['', '--- SHIFT NOTES ---', shiftNotes.replace(/\n/g, ' | ')];
  }

  if (rows.length <= 1 && flagRows.length <= 2 && !shiftNotes.trim()) {
    toast('Nothing to export yet');
    return;
  }

  const allRows = [...rows, ...flagRows, ...noteRows];
  const blob = new Blob([allRows.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);

  if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
    const file = new File([blob], `pipa-count-${date}.csv`, { type: 'text/csv' });
    navigator.share({ files: [file], title: `PiPa Count ${date}` })
      .then(() => toast('Shared!'))
      .catch(() => downloadFallback(url, date));
  } else {
    downloadFallback(url, date);
  }
}

function downloadFallback(url, date) {
  const a = document.createElement('a');
  a.href = url; a.download = `pipa-count-${date}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('CSV downloaded');
}

  let totalItems = 0, totalCounted = 0, totalFlagged = 0;

      sItems += sec.items.length;

      ).length;
      sFlagged += sec.items.filter(item => flags[flagKey(item)]).length;
    });
    totalItems += sItems;
    totalCounted += sCounted;
    totalFlagged += sFlagged;
    stopStats.push({ name: `${stop.icon} ${stop.stop}`, counted: sCounted, total: sItems, flagged: sFlagged });

  const pct = totalItems > 0 ? Math.round((totalCounted / totalItems) * 100) : 0;

  // Collect flagged items
  const flaggedList = [];
  WALK_ROUTE.forEach(stop => stop.sections.forEach(sec => sec.items.forEach(item => {
    const fd = flags[flagKey(item)];

          <span style="color:${col};font-weight:700;text-transform:uppercase;">${f.type}</span>
          <span style="color:var(--text);margin-left:8px;">${f.name}</span>
          ${f.note ? `<div style="color:var(--text2);font-size:11px;margin-top:2px;">${f.note}</div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '';

  const notesHTML = shiftNotes.trim() ? `
    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px;">📝 Shift Notes</div>
      <div style="font-size:12px;color:var(--text2);white-space:pre-wrap;background:var(--surface2);padding:10px;border-radius:8px;">${shiftNotes}</div>
    </div>` : '';

  modal.innerHTML = `
    <h3>Count Summary — ${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</h3>
    <div class="modal-stat" style="font-size:15px;font-weight:700;">
      <span>Overall Progress</span>
      <span class="val">${totalCounted} / ${totalItems} (${pct}%)</span>
    </div>
    ${stopStats.map(s => `
      <div class="modal-stat">
        <span>${s.name}</span>
        <span class="val">${s.counted}/${s.total}${s.flagged ? ` · 🚩${s.flagged}` : ''}</span>
      </div>`).join('')}
    ${flagHTML}
    ${notesHTML}
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Close</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeSummary(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

function clearAll() {
  if (!confirm('Clear all counts for today? (Flags & notes will be kept)')) return;
  counts = {};
  save();
  renderTabs();
  renderSections();
  toast('Counts cleared');
}

// ── LOAD DATE / CSV IMPORT ──────────────────────────────────────────────

function openLoadDateSheet() {
  // Default the date picker to today
  document.getElementById('loadDateInput').value = TODAY;
  document.getElementById('loadDateStatus').textContent = '';
  document.getElementById('loadDateSheet').classList.add('open');
}

function closeLoadDateSheet(e) {
  if (e && e.target !== document.getElementById('loadDateSheet')) return;
  document.getElementById('loadDateSheet').classList.remove('open');
}

function loadDateSession() {
  var date = document.getElementById('loadDateInput').value;
  if (!date) { toast('Pick a date first'); return; }

  var statusEl = document.getElementById('loadDateStatus');
  statusEl.textContent = 'Loading…';

  supa.from('count_sessions').select('*').eq('snap_date', date).limit(1)
    .then(function(r) {
      if (r.error) { statusEl.textContent = 'Error: ' + r.error.message; return; }
      if (!r.data || !r.data.length) {
        statusEl.textContent = 'No session found for ' + date;
        return;
      }
      var row = r.data[0];
      counts = row.counts || {};
      flags  = row.flags  || {};
      shiftNotes = row.notes || '';
      // Write to cache
      localStorage.setItem(LS_COUNTS, JSON.stringify(counts));
      localStorage.setItem(LS_FLAGS,  JSON.stringify(flags));
      localStorage.setItem(LS_NOTES,  shiftNotes);
      var ta = document.getElementById('shiftNotesTA');
      if (ta) ta.value = shiftNotes;
      renderTabs();
      renderSections();
      statusEl.textContent = '✓ Loaded ' + date;
      toast('Loaded count: ' + date);
    });
}

function handleCSVImport(input) {
  var file = input.files[0];
  if (!file) return;
  var statusEl = document.getElementById('loadDateStatus');
  statusEl.textContent = 'Parsing…';

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var lines = e.target.result.split('\n');
      var header = lines[0].split(',').map(function(h) { return h.trim(); });
      var dateIdx   = header.indexOf('Date');
      var sheetIdx  = header.indexOf('Sheet');
      var rowIdx    = header.indexOf('Row');
      var fieldIdx  = header.indexOf('Field');
      var countIdx  = header.indexOf('Count');
      var flagIdx   = header.indexOf('Flag');
      var noteIdx   = header.indexOf('Note');

      if (sheetIdx < 0 || rowIdx < 0 || fieldIdx < 0 || countIdx < 0) {
        statusEl.textContent = '✗ Not a valid pipa-count CSV';
        return;
      }

      var newCounts = {};
      var newFlags  = {};

      for (var i = 1; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        // Parse CSV line respecting quoted fields
        var cols = parseCSVLine(line);
        var sheet = (cols[sheetIdx] || '').trim();
        var r     = (cols[rowIdx]   || '').trim();
        var field = (cols[fieldIdx] || '').trim();
        var count = (cols[countIdx] || '').trim();
        var flag  = (cols[flagIdx]  || '').trim();
        var note  = noteIdx >= 0 ? (cols[noteIdx] || '').trim() : '';

        if (!sheet || !r || !field) continue;

        var key = sheet + '|' + r + '|' + field;
        if (count !== '') {
          var num = parseFloat(count);
          if (!isNaN(num)) newCounts[key] = num;
        }
        if (flag) {
          newFlags[sheet + '|' + r] = { type: flag, note: note };
        }
      }

      var countN = Object.keys(newCounts).length;
      var flagN  = Object.keys(newFlags).length;
      if (countN === 0) { statusEl.textContent = '✗ No counts found in file'; return; }

      counts = newCounts;
      flags  = newFlags;
      localStorage.setItem(LS_COUNTS, JSON.stringify(counts));
      localStorage.setItem(LS_FLAGS,  JSON.stringify(flags));
      save(); // also queues Supabase upsert for today

      renderTabs();
      renderSections();
      statusEl.textContent = '✓ Imported ' + countN + ' counts, ' + flagN + ' flags';
      toast('CSV imported — ' + countN + ' items');
    } catch(err) {
      statusEl.textContent = '✗ Parse error: ' + err.message;
    }
    // Reset input so same file can be re-selected
    input.value = '';
  };
  reader.readAsText(file);
}

// Simple CSV line parser that handles quoted fields
function parseCSVLine(line) {
  var result = [];
  var cur = '';
  var inQuotes = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}


// ── SUPABASE SYNC ──
async function saveCountToSupabase() {
  var rows = [];
  WALK_ROUTE.forEach(function(stop) {
    stop.sections.forEach(function(sec) {
      sec.items.forEach(function(item) {
        var total = 0, hasAny = false;
        item.fields.forEach(function(f) {
          var val = counts[countKey(item, f.key)];
          if (val !== undefined) { total += parseFloat(val) || 0; hasAny = true; }
        });
        if (hasAny) {
          rows.push({
            snap_date: TODAY,
            d365:      item.d365,
            item_name: item.name.replace(/—/g,'-'),
            category:  item.sheet || '',
            vendor:    '',
            par:       null,
            count:     total
          });
        }
      });
    });
  });

  if (!rows.length) { toast('No counts to save'); return; }

  var btn = document.getElementById('supa-save-btn');
  if (btn) btn.textContent = 'Saving...';

  // Deduplicate rows by d365 — sum counts if same d365 appears in multiple fields/sections
  var deduped = {};
  rows.forEach(function(row) {
    if (deduped[row.d365]) {
      deduped[row.d365].count += row.count;
    } else {
      deduped[row.d365] = Object.assign({}, row);
    }
  });
  var dedupedRows = Object.values(deduped);

  var result = await supa.from('inventory_trend')
    .upsert(dedupedRows, { onConflict: 'snap_date,d365' });

  if (btn) btn.textContent = 'Save to Supabase';

  if (result.error) {
    toast('Error: ' + result.error.message);
    return;
  }

  // Mirror counts to order_counts so the Orders tab in PiPa Ops
  // auto-populates without manual re-entry after a count.
  // We only write count_date + d365 + count here — vendor/par/order_qty
  // are filled by the Orders tab from its own ORDER_VENDORS data on load.
  var orderRows = dedupedRows.map(function(row) {
    return {
      count_date: row.snap_date,
      d365:       row.d365,
      item_name:  row.item_name,
      category:   row.category,
      vendor:     null,
      par:        null,
      count:      row.count,
      order_qty:  null
    };
  });

  var orderResult = await supa.from('order_counts')
    .upsert(orderRows, { onConflict: 'count_date,d365' });

  if (orderResult.error) {
    // Trend write succeeded — don't block the user, just log the issue
    toast('Trend saved ✓ — Orders sync failed: ' + orderResult.error.message);
  } else {
    toast('Saved ' + dedupedRows.length + ' items — trend + orders updated ✓');
  }
}

// ── INIT ──
renderTabs();
renderSections();
</script>
