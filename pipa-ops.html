<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<meta name="apple-mobile-web-app-title" content="PiPa Ops">
<title>PiPa Ops</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #0D0D0D;
  --surface: #1A1A1A;
  --surface2: #242424;
  --surface3: #2E2E2E;
  --surface4: #383838;
  --text: #F0EDE8;
  --text2: #8A8680;
  --text3: #5A5650;
  --accent: #B85C00;
  --accent-dim: rgba(184,92,0,0.15);
  --accent-bright: #D4700A;
  --green: #2D7A4F;
  --green-dim: rgba(45,122,79,0.15);
  --green-bright: #38966A;
  --red: #8B1A1A;
  --red-dim: rgba(180,30,30,0.18);
  --red-bright: #C0392B;
  --yellow: #7A6010;
  --yellow-dim: rgba(200,165,20,0.18);
  --yellow-bright: #C9A010;
  --blue: #1B3A5C;
  --blue-dim: rgba(27,58,92,0.25);
  --blue-bright: #2E6099;
  --purple: #4A2070;
  --purple-dim: rgba(74,32,112,0.2);
  --purple-bright: #7B3FBD;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html{min-height:100vh;background:#0D0D0D;}
html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: calc(var(--safe-top) + 10px) 16px 0;
  background: var(--bg);
}
.header-row {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 10px;
}
.header-title {
  font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text2);
  display: flex; align-items: center; gap: 8px;
}
.header-title .app-name { color: var(--text); }
.header-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent);
}
.header-link {
  font-size: 11px; color: var(--text3); text-decoration: none;
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid var(--surface3);
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 6px 6px calc(var(--safe-bottom) + 6px);
  background: var(--surface);
  border-top: 1px solid var(--surface3);
  display: flex; gap: 2px;
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.bottom-nav::-webkit-scrollbar { display: none; }
.bottom-nav::after{content:"";position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom,0px);background:var(--surface);z-index:99;}

.nav-tab {
  flex: 0 0 64px; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  padding: 6px 4px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text3);
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.03em; transition: all 0.15s; white-space: nowrap;
}
.nav-tab .nav-icon { font-size: 20px; line-height: 1; }
.nav-tab.active { color: var(--accent); background: var(--accent-dim); }
.nav-tab .badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); position: absolute;
  top: 6px; right: 6px;
}

/* ── SCROLL AREA ── */
.scroll-area {
  position: fixed;
  top: calc(var(--safe-top) + 56px);
  bottom: calc(var(--safe-bottom) + 68px);
  left: 0; right: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px 24px;
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text3);
  padding: 0 4px 8px; margin-top: 20px;
}
.section-label:first-child { margin-top: 0; }

/* ── CARD ── */
.card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px; margin-bottom: 8px;
  border: 1px solid transparent;
}
.card.border-green  { border-color: var(--green); }
.card.border-yellow { border-color: var(--yellow-bright); }
.card.border-red    { border-color: var(--red-bright); }
.card.border-blue   { border-color: var(--blue-bright); }
.card.border-accent { border-color: var(--accent); }

/* ── STATUS PILL ── */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 3px 8px; border-radius: 20px;
}
.pill-green  { background: var(--green-dim);  color: var(--green-bright); }
.pill-yellow { background: var(--yellow-dim); color: var(--yellow-bright); }
.pill-red    { background: var(--red-dim);    color: var(--red-bright); }
.pill-blue   { background: var(--blue-dim);   color: var(--blue-bright); }
.pill-purple { background: var(--purple-dim); color: var(--purple-bright); }
.pill-dim    { background: var(--surface3);   color: var(--text2); }

/* ── FORM ELEMENTS ── */
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text2);
  display: block; margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px;
  background: var(--surface2); border: 1.5px solid var(--surface3);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-select option { background: var(--surface2); }
.form-textarea { resize: none; line-height: 1.5; }
.form-row { display: flex; gap: 8px; }
.form-row .form-group { flex: 1; }

/* Toggle row */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--surface3);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 13px; color: var(--text); }
.toggle-sublabel { font-size: 11px; color: var(--text2); margin-top: 1px; }
.toggle {
  width: 44px; height: 26px; border-radius: 13px;
  background: var(--surface3); position: relative; cursor: pointer;
  transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: var(--green); }
.toggle::after {
  content: ''; width: 20px; height: 20px; border-radius: 50%;
  background: #fff; position: absolute; top: 3px; left: 3px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(18px); }

/* ── BUTTONS ── */
.btn-primary {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--accent); color: #fff;
  border: none; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.btn-secondary {
  width: 100%; padding: 12px; border-radius: var(--radius);
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--surface3); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
}
.btn-danger {
  padding: 10px 16px; border-radius: var(--radius-sm);
  background: var(--red-dim); color: var(--red-bright);
  border: none; font-size: 12px; font-weight: 700; cursor: pointer;
}
.btn-sm {
  padding: 6px 12px; border-radius: var(--radius-sm);
  background: var(--surface3); color: var(--text2);
  border: none; font-size: 11px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-sm.green { background: var(--green-dim); color: var(--green-bright); }
.btn-sm.accent { background: var(--accent-dim); color: var(--accent-bright); }

/* ── CHECKLIST STEPS ── */
.checklist {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
}
.check-step {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  background: var(--surface2); color: var(--text3);
  border: 1.5px solid var(--surface3); transition: all 0.15s;
  user-select: none;
}
.check-step.done {
  background: var(--green-dim); color: var(--green-bright);
  border-color: var(--green);
}
.check-step .step-icon { font-size: 13px; }

/* ── ACTIVATION CARD ── */
.activation-name {
  font-size: 15px; font-weight: 700; margin-bottom: 4px;
}
.activation-meta {
  font-size: 11px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 10px; display: flex; gap: 12px; flex-wrap: wrap;
}
.activation-swap {
  font-size: 11px; color: var(--text2); margin-top: 8px;
  padding: 8px; background: var(--surface2); border-radius: var(--radius-sm);
}
.activation-notes {
  font-size: 12px; color: var(--text); margin-top: 8px;
  line-height: 1.5; padding: 8px; background: var(--surface2);
  border-radius: var(--radius-sm); border-left: 2px solid var(--accent);
}
.launch-btn {
  margin-top: 12px; width: 100%; padding: 12px;
  border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  background: var(--green-dim); color: var(--green-bright);
  transition: all 0.15s;
}
.launch-btn.launched {
  background: var(--green); color: #fff;
}

/* ── INVOICE CARD ── */
.invoice-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0; font-size: 13px;
}
.invoice-row .label { color: var(--text2); font-size: 12px; }
.invoice-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.invoice-checks {
  display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
}
.inv-check {
  padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
  cursor: pointer; border: 1.5px solid var(--surface3);
  background: var(--surface2); color: var(--text3);
  transition: all 0.15s; user-select: none;
}
.inv-check.checked {
  background: var(--green-dim); color: var(--green-bright);
  border-color: var(--green);
}
.inv-check.flagged {
  background: var(--red-dim); color: var(--red-bright);
  border-color: var(--red-bright);
}

/* ── WASTE CARD ── */
.waste-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px;
}
.waste-item-name { font-size: 14px; font-weight: 600; }
.waste-detail { font-size: 11px; color: var(--text2); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

/* ── EVENT CARD ── */
.event-date-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent); font-weight: 700;
  margin-bottom: 6px;
}
.event-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.event-flags {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px;
}
.event-flag {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; background: var(--surface2); color: var(--text3);
}
.event-flag.active { background: var(--accent-dim); color: var(--accent-bright); }

/* ── SPECS ── */
.spec-search-wrap {
  position: sticky; top: -12px; z-index: 10;
  background: var(--bg); padding: 0 0 10px; margin: -4px 0 0;
}
.spec-search {
  width: 100%; padding: 12px 16px;
  background: var(--surface); border: 1.5px solid var(--surface3);
  border-radius: 24px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}
.spec-search:focus { border-color: var(--accent); }
.spec-search::placeholder { color: var(--text3); }

.spec-filter-row {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px;
  scrollbar-width: none;
}
.spec-filter-row::-webkit-scrollbar { display: none; }
.spec-filter {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  background: var(--surface); color: var(--text2);
  border: 1.5px solid transparent;
}
.spec-filter.active {
  border-color: var(--accent); color: var(--text);
  background: var(--accent-dim);
}

.recipe-card {
  background: var(--surface); border-radius: var(--radius);
  margin-bottom: 8px; overflow: hidden;
}
.recipe-header {
  padding: 14px 14px 10px; cursor: pointer;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.recipe-name { font-size: 15px; font-weight: 700; }
.recipe-sub {
  font-size: 11px; color: var(--text2); margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
  display: flex; gap: 10px;
}
.recipe-chevron { color: var(--text3); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; padding-top: 2px; }
.recipe-header.open .recipe-chevron { transform: rotate(180deg); }

.recipe-body { display: none; padding: 0 14px 14px; }
.recipe-body.open { display: block; }

.recipe-meta-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
}
.recipe-meta-tag {
  font-size: 10px; font-weight: 600; padding: 3px 8px;
  border-radius: 20px; background: var(--surface2); color: var(--text2);
}

.ingredients-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
.ingredients-table tr { border-bottom: 1px solid var(--surface3); }
.ingredients-table tr:last-child { border-bottom: none; }
.ingredients-table td {
  padding: 7px 4px; font-size: 13px; vertical-align: middle;
}
.ing-qty {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--accent); width: 50px; white-space: nowrap;
}
.ing-unit {
  font-size: 11px; color: var(--text2); width: 40px;
}
.ing-name { color: var(--text); }

.recipe-footer {
  display: flex; gap: 8px; padding-top: 8px;
  border-top: 1px solid var(--surface3);
  font-size: 11px; color: var(--text2);
}
.recipe-footer span { display: flex; align-items: center; gap: 4px; }

.recipe-edit-btn {
  margin-top: 10px; padding: 8px 14px; border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text2);
  border: none; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

/* ── SHEET (bottom drawer) ── */
.sheet-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
  align-items: flex-end;
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto;
  padding: 20px 16px calc(var(--safe-bottom) + 16px);
}
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--surface3); margin: 0 auto 20px;
}
.sheet-title {
  font-size: 17px; font-weight: 700; margin-bottom: 20px;
}
.sheet-actions { display: flex; gap: 8px; margin-top: 16px; }

/* Ingredient builder rows */
.ing-build-row {
  display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
}
.ing-build-row .form-input { flex: 2; }
.ing-build-row .form-input.qty { flex: 0.7; }
.ing-build-row .form-input.unit { flex: 0.8; }
.ing-remove {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--red-dim); color: var(--red-bright);
  border: none; font-size: 16px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.add-ing-btn {
  width: 100%; padding: 10px; border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--accent);
  border: 1px dashed var(--accent); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 14px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 48px 24px; color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── TOAST ── */
.toast {
  position: fixed; top: calc(var(--safe-top) + 70px);
  left: 50%; transform: translateX(-50%) translateY(-16px);
  background: var(--green); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.25s; z-index: 999; pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red-bright); }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(var(--safe-bottom) + 80px);
  right: 16px; z-index: 150;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); color: #fff;
  border: none; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(184,92,0,0.4);
  display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.94); }
.fab.hidden { display: none; }

/* ── DIVIDER ── */
.divider {
  height: 1px; background: var(--surface3);
  margin: 16px 0;
}

/* ── CARD ACTIONS ROW ── */
.card-actions {
  display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap;
}

.ops-update-compose { background:var(--surface); border-radius:12px; padding:16px; margin-bottom:4px; }
.ops-update-card { background:var(--surface); border-radius:12px; padding:14px; margin-bottom:8px; }

/* ORDER PLANNER */
.op-view-btn{padding:6px 14px;border-radius:20px;background:var(--surface);color:var(--text2);border:1.5px solid transparent;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.op-view-btn.active{border-color:var(--accent);color:var(--text);background:var(--surface2);}
.op-save-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.op-need-badge{font-size:0.688rem;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--red-dim);color:var(--red-bright);}
.op-vendor-card{background:var(--surface);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.op-vendor-header{padding:12px 14px;border-bottom:1px solid var(--surface3);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.op-vendor-name{font-size:0.938rem;font-weight:700;color:var(--text);}
.op-vendor-meta{font-size:0.625rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.op-cutoff{font-size:0.625rem;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--yellow-dim);color:var(--yellow-bright);}
.op-need-count{font-size:0.625rem;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--red-dim);color:var(--red-bright);}
.op-item-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--surface3);transition:background 0.1s;}
.op-item-row:last-of-type{border-bottom:none;}
.op-item-row.op-row-counted{background:var(--surface2);}
.op-item-row.op-row-need{background:rgba(180,30,30,0.08);}
.op-item-info{flex:1;min-width:0;}
.op-item-name{font-size:0.844rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.op-item-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.op-cat-badge{font-size:0.563rem;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:0.06em;}
.op-item-meta span{font-size:0.625rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.op-item-note{font-size:0.625rem;color:var(--yellow-bright) !important;font-family:'DM Sans',sans-serif !important;}
.op-item-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.op-par-label{font-size:0.563rem;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:right;}
.op-count-input{width:56px;height:40px;background:var(--surface3);border:1.5px solid transparent;border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;text-align:center;outline:none;-webkit-appearance:none;}
.op-count-input:focus{border-color:var(--accent);}

function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('nav-' + view).classList.add('active');
  document.getElementById('scrollArea').scrollTop = 0;
  currentView = view;
  // Scroll active tab into view
  var activeTab = document.getElementById('nav-' + view);
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});

  // FAB label
  const fab = document.getElementById('fab');
  fab.classList.remove('hidden');
  if (view === 'specs') fab.textContent = '✎';
  else fab.textContent = '+';

  render(view);
}

function render(view) {
  const fns = {
    activations: renderActivations,
    invoices: renderInvoices,
    waste: renderWaste,
    events: renderEvents,
    specs: renderSpecs,
    order: renderOrderPlanner,
    trend: renderInventoryTrend,
    vendors: renderVendors,
  };
  if (fns[view]) fns[view]();
}

const ACTIVATION_STEPS = [
  { key: 'd365',       label: 'D365 Added',    icon: '💻' },
  { key: 'ordered',    label: 'Ordered',        icon: '📦' },
  { key: 'inStock',    label: 'In Stock',       icon: '✅' },
  { key: 'briefed',    label: 'Staff Briefed',  icon: '👥' },
  { key: 'eightySixed',label: "Old Item 86'd",  icon: '🚫' },
];

function activationStatus(act) {
  if (act.launched) return { label: '✅ Launched', cls: 'pill-green' };
  const done = Object.values(act.steps).filter(Boolean).length;
  const total = ACTIVATION_STEPS.length;
  if (done === 0) return { label: '⏳ Pending', cls: 'pill-dim' };
  if (done === total) return { label: '🟡 Ready to Launch', cls: 'pill-yellow' };
  return { label: `🔄 In Progress ${done}/${total}`, cls: 'pill-blue' };
}

function priorityPill(p) {
  if (p === 'HIGH') return '<span class="pill pill-red">HIGH</span>';
  if (p === 'MED')  return '<span class="pill pill-yellow">MED</span>';
  return '<span class="pill pill-dim">LOW</span>';
}


function saveActivationToSupabase(act) {
  var row = {
    priority: act.priority, name: act.name, d365: act.d365,
    vendor: act.vendor, category: act.category, launch_date: act.launchDate,
    swap_item: act.swapItem, swap_d365: act.swapD365,
    notes: act.notes, open_issues: act.openIssues,
    steps: act.steps, launched: act.launched
  };
  if (typeof act.id === 'number') {
    // existing Supabase row — update
    supa.from('activations_log').update(row).eq('id', act.id)
      .then(function(r) { if (r.error) console.warn('act update:', r.error.message); });
  } else {
    // new row — insert and get id back
    supa.from('activations_log').insert(row).select()
      .then(function(r) {
        if (r.error) { console.warn('act insert:', r.error.message); return; }
        if (r.data && r.data[0]) act.id = r.data[0].id;
        DB.set('activations', activations);
      });
  }
}

function deleteActivationFromSupabase(act) {
  if (typeof act.id === 'number') {
    supa.from('activations_log').delete().eq('id', act.id)
      .then(function(r) { if (r.error) console.warn('act delete:', r.error.message); });
  }
}

function renderActivations() {
  const el = document.getElementById('view-activations');
  const active = activations.filter(a => !a.launched);
  const launched = activations.filter(a => a.launched);

  let html = '';

  if (active.length === 0 && launched.length === 0) {
    html = `<div class="empty-state"><div class="empty-icon">🚀</div><div class="empty-text">No activations yet. Tap + to add one.</div></div>`;
  } else {
    if (active.length) {
      html += `<div class="section-label">Active (${active.length})</div>`;
      html += active.map(act => renderActivationCard(act)).join('');
    }
    if (launched.length) {
      html += `<div class="section-label" style="margin-top:24px;">Launched (${launched.length})</div>`;
      html += launched.map(act => renderActivationCard(act)).join('');
    }
  }

  el.innerHTML = html;
}

function renderActivationCard(act) {
  const status = activationStatus(act);
  const stepsHTML = ACTIVATION_STEPS.map(s => `
    <div class="check-step ${act.steps[s.key] ? 'done' : ''}"
         onclick="toggleStep('${act.id}', '${s.key}')">
      <span class="step-icon">${act.steps[s.key] ? '✓' : s.icon}</span>
      ${s.label}
    </div>`).join('');

  const allStepsDone = ACTIVATION_STEPS.every(s => act.steps[s.key]);
  const launchBtnClass = act.launched ? 'launch-btn launched' : 'launch-btn';
  const launchBtnText = act.launched ? '✅ Launched' : (allStepsDone ? '🚀 Mark as Launched' : '🚀 Mark as Launched');

  const borderCls = act.launched ? 'border-green' : allStepsDone ? 'border-yellow' : '';

  return `
    <div class="card ${borderCls}" id="act-${act.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div>
          <span class="pill ${status.cls}" style="margin-bottom:8px;display:inline-flex;">${status.label}</span>
          ${priorityPill(act.priority)}
        </div>
        <button class="btn-sm" data-actid="${act.id}" onclick="editActivation(this.getAttribute('data-actid'))">Edit</button>
      </div>
      <div class="activation-name">${act.name}</div>
      <div class="activation-meta">
        <span>📅 ${fmtDate(act.launchDate)}</span>
        <span>🏷 ${act.category}</span>
        <span>📦 ${act.vendor}</span>
        <span style="font-family:'JetBrains Mono',monospace;">D365: ${act.d365}</span>
      </div>
      ${act.swapItem && act.swapItem !== '—' ? `
        <div class="activation-swap">
          🔄 Swaps: <strong>${act.swapItem}</strong> <span style="color:var(--text3)">(D365: ${act.swapD365})</span>
        </div>` : ''}
      ${act.notes ? `<div class="activation-notes">${act.notes}</div>` : ''}
      <div class="checklist">${stepsHTML}</div>
      ${act.openIssues ? `<div style="font-size:12px;color:var(--red-bright);margin-top:8px;">⚠️ ${act.openIssues}</div>` : ''}
      ${!act.launched ? `<button class="${launchBtnClass}" data-actid2="${act.id}" onclick="toggleLaunched(this.getAttribute('data-actid2'))">${launchBtnText}</button>` : ''}
    </div>`;
}

function toggleStep(actId, stepKey) {
  const act = activations.find(a => a.id === actId);
  if (!act || act.launched) return;
  act.steps[stepKey] = !act.steps[stepKey];
  save('activations', activations);
  saveActivationToSupabase(act);
  renderActivations();
  toast(act.steps[stepKey] ? `✓ ${ACTIVATION_STEPS.find(s=>s.key===stepKey).label}` : 'Step unmarked');
}

function toggleLaunched(actId) {
  const act = activations.find(a => a.id === actId);
  if (!act) return;
  const allDone = ACTIVATION_STEPS.every(s => act.steps[s.key]);
  if (!act.launched && !allDone) {
    if (!confirm('Not all steps are complete. Mark as launched anyway?')) return;
  }
  act.launched = !act.launched;
  if (act.launched) ACTIVATION_STEPS.forEach(s => act.steps[s.key] = true);
  save('activations', activations);
  saveActivationToSupabase(act);
  renderActivations();
  toast(act.launched ? '🚀 Activation launched!' : 'Unmarked as launched');
}

function editActivation(actId) {
  const act = activations.find(a => a.id === actId);
  if (!act) return;
  openActivationSheet(act);
}

// DELIVERY RECEIPT
// ─────────────────────────────────────────────
var activeReceiptInvId   = null;
var activeReceiptVendor  = null;
var activeReceiptDate    = null;
var receiptDraft         = {}; // d365 -> qty_received

function openReceiptSheet(invId, vendor, date) {
  activeReceiptInvId  = invId;
  activeReceiptVendor = vendor;
  activeReceiptDate   = date;
  receiptDraft        = {};

  // Load any previously saved draft for this invoice
  supa.from('delivery_items')
    .select('d365, qty_received')
    .eq('invoice_id', invId)
    .eq('confirmed', false)
    .then(function(r) {
      if (r.data && r.data.length) {
        r.data.forEach(function(row) {
          if (row.qty_received != null) receiptDraft[row.d365] = row.qty_received;
        });
      }
      _renderReceiptSheet();
    })
    .catch(function() { _renderReceiptSheet(); });
}

function _renderReceiptSheet() {
  var vendor    = activeReceiptVendor;
  var invId     = activeReceiptInvId;
  var vendorObj = ORDER_VENDORS[vendor];

  // Prefer invoice line items if this invoice was created from the Orders tab.
  // Fall back to full vendor item list for manually-created invoices.
  var inv   = invoices.find(function(i) { return i.id === invId; });
  var items = (inv && inv.lineItems && inv.lineItems.length)
                ? inv.lineItems
                : (vendorObj ? vendorObj.items : []);

  var content = document.getElementById('addSheetContent');

  // Group items by category
  var cats = {};
  items.forEach(function(item) {
    var cat = item.cat || 'Other';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(item);
  });

  var itemsHTML = Object.keys(cats).map(function(cat) {
    var rows = cats[cat].map(function(item) {
      var qty = receiptDraft[item.d365] != null ? receiptDraft[item.d365] : '';
      var hasQty = qty !== '' && qty > 0;
      var orderedQty = item.ordered_qty != null ? item.ordered_qty : null;
      var metaParts = [item.d365];
      if (item.par != null) metaParts.push('par ' + item.par);
      if (orderedQty != null) metaParts.push('ordered: ' + orderedQty);
      if (item.count_on_hand != null) metaParts.push('on hand: ' + item.count_on_hand);
      return '<div class="rcpt-item-row">' +
        '<div class="rcpt-item-info">' +
          '<div class="rcpt-item-name">' + item.name + '</div>' +
          '<div class="rcpt-item-meta">' + metaParts.join(' · ') + '</div>' +
        '</div>' +
        '<input class="rcpt-qty-input' + (hasQty ? ' has-qty' : '') + '" ' +
          'type="number" inputmode="numeric" min="0" placeholder="—" ' +
          'value="' + (qty !== '' ? qty : '') + '" ' +
          'data-d365="' + item.d365 + '" ' +
          'data-name="' + item.name.replace(/"/g, '&quot;') + '" ' +
          'data-cat="' + cat + '" ' +
          'oninput="onReceiptQty(this)" onfocus="this.select()">' +
      '</div>';
    }).join('');
    return '<div class="rcpt-section-label">' + cat + '</div>' + rows;
  }).join('');

  if (!items.length) {
    itemsHTML = '<div style="padding:20px;text-align:center;font-size:0.813rem;color:var(--text3);">' +
      'No items found for ' + vendor + '.<br>Items are pulled from the Order Vendors list.</div>';
  }

  content.innerHTML =
    '<div class="sheet-handle"></div>' +
    '<div class="sheet-title">Receive ' + vendor + '</div>' +
    '<div style="font-size:0.688rem;color:var(--text3);margin-bottom:12px;">' +
      activeReceiptDate + ' · Enter qty received for each item. Leave blank if not received.' +
    '</div>' +
    itemsHTML +
    '<div class="rcpt-confirm-bar">' +
      '<button class="btn-primary" style="width:100%;margin-bottom:6px;" onclick="confirmReceipt()">Confirm Receipt</button>' +
      '<button class="btn-secondary" style="width:100%;font-size:0.813rem;" onclick="saveDraftReceipt()">Save Draft</button>' +
    '</div>';

  document.getElementById('addSheet').classList.add('open');
}

function onReceiptQty(input) {
  var d365 = input.dataset.d365;
  var val  = parseFloat(input.value);
  if (!isNaN(val) && val > 0) {
    receiptDraft[d365] = val;
    input.classList.add('has-qty');
  } else {
    delete receiptDraft[d365];
    input.classList.remove('has-qty');
  }
}

function saveDraftReceipt() {
  _saveReceiptItems(false, function() {
    closeSheet('addSheet');
    toast('Draft saved');
  });
}

function confirmReceipt() {
  var filled = Object.keys(receiptDraft).filter(function(d) { return receiptDraft[d] > 0; });
  if (!filled.length) { toast('Enter at least one quantity'); return; }
  _saveReceiptItems(true, function() {
    closeSheet('addSheet');
    toast('Receipt confirmed — ' + filled.length + ' items logged to trend');
  });
}

function _saveReceiptItems(confirmed, cb) {
  var vendor    = activeReceiptVendor;
  var vendorObj = ORDER_VENDORS[vendor];
  var inv       = invoices.find(function(i) { return i.id === activeReceiptInvId; });

  // Build item lookup from invoice lineItems (if available) or full vendor list
  var items = (inv && inv.lineItems && inv.lineItems.length)
                ? inv.lineItems
                : (vendorObj ? vendorObj.items : []);
  var itemMap = {};
  items.forEach(function(i) { itemMap[i.d365] = i; });

  var rows = Object.keys(receiptDraft).map(function(d365) {
    var qty  = receiptDraft[d365];
    var item = itemMap[d365] || { name: d365, cat: '' };
    return {
      invoice_id:   activeReceiptInvId,
      vendor:       vendor,
      d365:         d365,
      item_name:    item.name,
      qty_received: qty,
      received_date: activeReceiptDate,
      confirmed:    confirmed
    };
  }).filter(function(r) { return r.qty_received > 0; });

  if (!rows.length) { if (cb) cb(); return; }

  // Delete existing draft rows for this invoice first, then insert
  supa.from('delivery_items')
    .delete().eq('invoice_id', activeReceiptInvId).eq('confirmed', false)
    .then(function() {
      return supa.from('delivery_items').insert(rows);
    })
    .then(function(r) {
      if (r && r.error) { toast('Save error: ' + r.error.message); return; }

      if (confirmed) {
        // 1. Update received_qty on the invoice's lineItems in localStorage
        if (inv && inv.lineItems && inv.lineItems.length) {
          rows.forEach(function(row) {
            var li = inv.lineItems.find(function(l) { return l.d365 === row.d365; });
            if (li) li.received_qty = row.qty_received;
          });
          // Flag discrepancy if any received qty differs from ordered qty
          var hasDiscrepancy = inv.lineItems.some(function(li) {
            return li.ordered_qty != null && li.received_qty != null && li.received_qty !== li.ordered_qty;
          });
          if (hasDiscrepancy) inv.discrepancy = true;
          inv.status = 'received';
          save('invoices', invoices);
        }

        // 2. Update order_counts — add received qty to current on-hand count
        //    so next Orders tab open reflects post-delivery stock
        var countUpdates = rows.map(function(row) {
          var prior = opCounts[row.d365] || 0;
          var item  = itemMap[row.d365] || {};
          return {
            count_date: TODAY,
            d365:       row.d365,
            item_name:  row.item_name,
            category:   item.cat || '',
            vendor:     vendor,
            par:        item.par || null,
            count:      prior + row.qty_received,
            order_qty:  0
          };
        });

        supa.from('order_counts')
          .upsert(countUpdates, { onConflict: 'count_date,d365' })
          .then(function() {
            // Update local opCounts map immediately so UI reflects new stock
            rows.forEach(function(row) {
              opCounts[row.d365] = (opCounts[row.d365] || 0) + row.qty_received;
            });
          });

        if (cb) cb();
      } else {
        if (cb) cb();
      }
    })
    .catch(function(e) { toast('Error: ' + e.message); });
}

// INVOICES
// ═══════════════════════════════════════════════
function renderInvoices() {
  const el = document.getElementById('view-invoices');
  if (invoices.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🧾</div><div class="empty-text">No invoices logged yet.<br>Tap + after each delivery.</div></div>`;
    return;
  }

  // Sort newest first
  const sorted = [...invoices].sort((a,b) => new Date(b.date) - new Date(a.date));
  const pending = sorted.filter(i => !i.checks.received || !i.checks.d365 || !i.checks.sentIC || !i.checks.pricingOK);
  const clear = sorted.filter(i => i.checks.received && i.checks.d365 && i.checks.sentIC && i.checks.pricingOK);

  let html = '';
  if (pending.length) {
    html += `<div class="section-label">Needs Attention (${pending.length})</div>`;
    html += pending.map(renderInvoiceCard).join('');
  }
  if (clear.length) {
    html += `<div class="section-label" style="margin-top:24px;">Complete (${clear.length})</div>`;
    html += clear.map(renderInvoiceCard).join('');
  }

  el.innerHTML = html;
}

function renderInvoiceCard(inv) {
  const allClear = inv.checks.received && inv.checks.d365 && inv.checks.sentIC && inv.checks.pricingOK;
  const hasDiscrepancy = inv.discrepancy;
  const borderCls = hasDiscrepancy ? 'border-red' : allClear ? 'border-green' : 'border-yellow';

  const checks = [
    { key: 'received',   label: 'Invoice Rcvd' },
    { key: 'd365',       label: 'In D365' },
    { key: 'sentIC',     label: 'Sent to IC' },
    { key: 'pricingOK',  label: 'Pricing ✓' },
  ];

  const checksHTML = checks.map(c => `
    <div class="inv-check ${inv.checks[c.key] ? 'checked' : ''}"
         onclick="toggleInvCheck('${inv.id}', '${c.key}')">
      ${inv.checks[c.key] ? '✓ ' : ''}${c.label}
    </div>`).join('');

  // Status pill
  const statusLabels = { draft:'📝 Draft', ordered:'📦 Ordered', received:'✅ Received', verified:'🔒 Verified' };
  const statusColors = { draft:'pill-dim', ordered:'pill-blue', received:'pill-green', verified:'pill-purple' };
  const statusPill = inv.status
    ? `<span class="pill ${statusColors[inv.status] || 'pill-dim'}" style="margin-left:8px;">${statusLabels[inv.status] || inv.status}</span>`
    : '';

  // Line items summary (if invoice was created from Orders tab)
  var lineItemsHTML = '';
  if (inv.lineItems && inv.lineItems.length) {
    var totalOrdered = inv.lineItems.reduce(function(sum, li) { return sum + (li.ordered_qty || 0); }, 0);
    var totalReceived = inv.lineItems.reduce(function(sum, li) { return sum + (li.received_qty || 0); }, 0);
    var itemRows = inv.lineItems.map(function(li) {
      var rcvd = li.received_qty != null ? li.received_qty : '—';
      var discrepant = li.received_qty != null && li.received_qty !== li.ordered_qty;
      return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--surface3);font-size:11px;">' +
        '<span style="color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + li.name + '</span>' +
        '<span style="font-family:\'JetBrains Mono\',monospace;color:var(--text3);margin-left:8px;flex-shrink:0;">ord:' + li.ordered_qty + '</span>' +
        '<span style="font-family:\'JetBrains Mono\',monospace;margin-left:8px;flex-shrink:0;color:' + (discrepant ? 'var(--red-bright)' : 'var(--text2)') + ';">rcv:' + rcvd + '</span>' +
      '</div>';
    }).join('');
    lineItemsHTML = `
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--surface3);">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px;">
          ${inv.lineItems.length} items · ordered: ${totalOrdered}${totalReceived > 0 ? ' · received: ' + totalReceived : ''}
        </div>
        ${itemRows}
      </div>`;
  }

  return `
    <div class="card ${borderCls}" id="inv-${inv.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:15px;font-weight:700;">${inv.vendor}${statusPill}</div>
          <div style="font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:3px;">
            ${fmtDate(inv.date)} · PO# ${inv.po || '—'} · Inv# ${inv.invoiceNum || '—'}
          </div>
        </div>
        <div style="text-align:right;">
          ${inv.amount ? `<div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);">$${inv.amount}</div>` : ''}
          ${hasDiscrepancy ? `<div class="pill pill-red" style="margin-top:4px;">⚠️ Discrepancy</div>` : ''}
        </div>
      </div>
      ${lineItemsHTML}
      <div class="invoice-checks">${checksHTML}</div>
      ${inv.discrepancy ? `
        <div onclick="toggleInvDiscrepancy('${inv.id}')" style="margin-top:8px;cursor:pointer;">
          <span class="inv-check flagged">⚠️ Flag Discrepancy</span>
        </div>` : `
        <div style="margin-top:8px;">
          <span class="inv-check" onclick="toggleInvDiscrepancy('${inv.id}')">Flag Discrepancy</span>
        </div>`}
      ${inv.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--surface3);">${inv.notes}</div>` : ''}
      <div class="card-actions">
        <button class="btn-sm btn-primary" onclick="openReceiptSheet('${inv.id}', '${inv.vendor}', '${inv.date}')">Log Items</button>
        <button class="btn-sm" onclick="deleteEntry('invoices', '${inv.id}')">Delete</button>
      </div>
    </div>`;
}

function toggleInvCheck(invId, checkKey) {
  const inv = invoices.find(i => i.id === invId);
  if (!inv) return;
  inv.checks[checkKey] = !inv.checks[checkKey];
  save('invoices', invoices);
  renderInvoices();
}

function toggleInvDiscrepancy(invId) {
  const inv = invoices.find(i => i.id === invId);
  if (!inv) return;
  inv.discrepancy = !inv.discrepancy;
  save('invoices', invoices);
  renderInvoices();
}

// WASTE & BREAKAGE
// ═══════════════════════════════════════════════
const WASTE_REASONS = ['Spill','Breakage','Spoiled','Flat','Mispour','Comp','Staff Drinks','Promo Pour','Expired','Returned','Other'];
const WASTE_UNITS   = ['oz','btl','ea','keg','cs','lb','other'];
const WASTE_CATS    = ['BTG WINE','BTB WINE','BEER','LIQUOR','N.A.','GARNISH','COCKTAIL','OTHER'];

function renderWaste() {
  const el = document.getElementById('view-waste');
  if (waste.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗑️</div><div class="empty-text">No waste logged yet.<br>Tap + to log a spill, breakage, or comp.</div></div>`;
    return;
  }

  const sorted = [...waste].sort((a,b) => new Date(b.date) - new Date(a.date));

  // Group by date
  const groups = {};
  sorted.forEach(w => {
    const d = w.date || TODAY;
    if (!groups[d]) groups[d] = [];
    groups[d].push(w);
  });

  let html = '';
  Object.entries(groups).forEach(([date, entries]) => {
    html += `<div class="section-label">${fmtDate(date)} — ${entries.length} entr${entries.length===1?'y':'ies'}</div>`;
    html += entries.map(w => `
      <div class="card">
        <div class="waste-row">
          <div>
            <div class="waste-item-name">${w.item}</div>
            <div class="waste-detail">
              ${w.qty} ${w.unit} · ${w.category} · ${w.reason}
              ${w.value ? ` · ~$${w.value}` : ''}
            </div>
            ${w.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:4px;">${w.notes}</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${w.initials || '—'}</div>
            ${w.approved ? `<div style="font-size:10px;color:var(--green-bright);margin-top:4px;">✓ Approved</div>` : ''}
          </div>
        </div>
        <div class="card-actions">
          ${!w.approved ? `<button class="btn-sm green" onclick="approveWaste('${w.id}')">✓ Approve</button>` : ''}
          <button class="btn-sm" onclick="deleteEntry('waste', '${w.id}')">Delete</button>
        </div>
      </div>`).join('');
  });

  el.innerHTML = html;
}

function approveWaste(id) {
  const w = waste.find(x => x.id === id);
  if (w) { w.approved = true; save('waste', waste); renderWaste(); toast('Entry approved'); }
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
function renderEvents() {
  const el = document.getElementById('view-events');
  if (events.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No events logged.<br>Tap + to add an upcoming party or event.</div></div>`;
    return;
  }

  const sorted = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
  const upcoming = sorted.filter(e => new Date(e.date) >= new Date(TODAY.slice(0,10)));
  const past     = sorted.filter(e => new Date(e.date) <  new Date(TODAY.slice(0,10)));

  let html = '';
  if (upcoming.length) {
    html += `<div class="section-label">Upcoming (${upcoming.length})</div>`;
    html += upcoming.map(renderEventCard).join('');
  }
  if (past.length) {
    html += `<div class="section-label" style="margin-top:24px;">Past (${past.length})</div>`;
    html += past.map(renderEventCard).join('');
  }

  el.innerHTML = html;
}

function renderEventCard(ev) {
  const isPast = new Date(ev.date) < new Date(TODAY.slice(0,10));
  const borderCls = isPast ? '' : 'border-accent';
  const eventFlags = [
    { key: 'barPackage',     label: '🍹 Bar Package' },
    { key: 'winePairing',    label: '🍷 Wine Pairing' },
    { key: 'sparkling',      label: '🥂 Sparkling' },
    { key: 'specialtyCocktail', label: '✨ Specialty Cocktail' },
    { key: 'productPulled',  label: '📦 Product Pulled' },
    { key: 'orderPlaced',    label: '📋 Extra Order Placed' },
  ];
  const flagsHTML = eventFlags.map(f => `
    <div class="event-flag ${ev.flags[f.key] ? 'active' : ''}"
         onclick="toggleEventFlag('${ev.id}', '${f.key}')">
      ${f.label}
    </div>`).join('');

  return `
    <div class="card ${borderCls}">

const MENUS = ['All', 'PiPa', 'Cortina', 'Mocktail', 'Next Menu'];

function renderSpecs() {
  const el = document.getElementById('view-specs');

  const filtered = recipes.filter(r => {
    const menuMatch = specFilter === 'All' || r.menu === specFilter;
    const searchMatch = !specSearch || r.name.toLowerCase().includes(specSearch.toLowerCase())
      || r.ingredients.some(i => i.name.toLowerCase().includes(specSearch.toLowerCase()));
    return menuMatch && searchMatch;
  });

  const filterBtns = MENUS.map(m => `
    <div class="spec-filter ${specFilter === m ? 'active' : ''}"
         onclick="setSpecFilter('${m}')">${m}</div>`).join('');

  const recipesHTML = filtered.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No recipes match.</div></div>`
    : filtered.map(renderRecipeCard).join('');

  el.innerHTML = `
    <div class="spec-search-wrap">
      <input class="spec-search" type="text" placeholder="Search by name or ingredient…"
        value="${specSearch}" oninput="onSpecSearch(this.value)">
      <div class="spec-filter-row" style="margin-top:8px;">${filterBtns}</div>
    </div>
    ${recipesHTML}`;
}

function renderRecipeCard(r) {
  const menuColor = {PiPa:'pill-blue', Cortina:'pill-purple', Mocktail:'pill-green', 'Next Menu':'pill-dim'}[r.menu] || 'pill-dim';
  const ingsHTML = r.ingredients.map(i => `
    <tr>
      <td class="ing-qty">${i.qty}</td>
      <td class="ing-unit">${i.unit}</td>
      <td class="ing-name">${i.name}</td>
    </tr>`).join('');

  return `
    <div class="recipe-card" id="recipe-${r.id}">
      <div class="recipe-header" onclick="toggleRecipe('${r.id}')">
        <div>
          <div class="recipe-name">${r.name}</div>
          <div class="recipe-sub">
            <span>${r.glass}</span>
            <span>${r.method}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="pill ${menuColor}">${r.menu}</span>
          <span class="recipe-chevron">▾</span>
        </div>
      </div>
      <div class="recipe-body" id="rbody-${r.id}">
        <div class="recipe-meta-row">
          ${r.ice ? `<span class="recipe-meta-tag">🧊 ${r.ice}</span>` : ''}
          ${r.garnish ? `<span class="recipe-meta-tag">🍊 ${r.garnish}</span>` : ''}
        </div>
        <table class="ingredients-table">${ingsHTML}</table>
        <div style="display:flex;gap:8px;">
          <button class="recipe-edit-btn" onclick="openEditRecipe('${r.id}')">✏️ Edit Recipe</button>
          <button class="recipe-edit-btn btn-danger" style="padding:8px 14px;" onclick="deleteRecipe('${r.id}')">Delete</button>
        </div>
      </div>
    </div>`;
}

function toggleRecipe(id) {
  const header = document.querySelector(`#recipe-${id} .recipe-header`);
  const body   = document.getElementById('rbody-' + id);
  header.classList.toggle('open');

function deleteRecipe(id) {

// CREATE INVOICE FROM ORDERS TAB
// ─────────────────────────────────────────────
function createInvoiceFromOrder(vendorName) {
  var v = ORDER_VENDORS[vendorName];
  if (!v) return;

  // Collect items where suggested order qty > 0
  var lineItems = v.items
    .filter(function(item) {
      var count = opCounts[item.d365];
      var sug = opSuggest(item.par, count !== undefined ? count : null);
      return sug != null && sug > 0;
    })
    .map(function(item) {
      var count = opCounts[item.d365];
      var sug = opSuggest(item.par, count);
      return {
        d365:          item.d365,
        name:          item.name,
        cat:           item.cat,
        par:           item.par,
        count_on_hand: count != null ? count : null,
        ordered_qty:   sug,
        received_qty:  null,
      };
    });

  if (!lineItems.length) { toast('No items need ordering from ' + vendorName); return; }

  var inv = {
    id:          'inv-' + Date.now(),
    date:        TODAY,
    vendor:      vendorName,
    po:          '',
    invoiceNum:  '',
    amount:      '',
    notes:       '',
    checks:      { received:false, d365:false, sentIC:false, pricingOK:false },
    discrepancy: false,
    lineItems:   lineItems,
    status:      'ordered',
  };

  invoices.unshift(inv);
  save('invoices', invoices);
  switchView('invoices');
  toast('Invoice created — ' + lineItems.length + ' items from ' + vendorName);
}

function addIngRow() {
  editIngredients.push({qty:'', unit:'oz', name:''});
  renderIngRows();
}

function removeIngRow(i) {
  if (editIngredients.length <= 1) return;
  editIngredients.splice(i, 1);
  renderIngRows();
}

function saveRecipe(existingId) {
  const name = document.getElementById('rec-name').value.trim();
  if (!name) { toast('Recipe name required', true); return; }
  const ings = editIngredients.filter(i => i.name.trim());

  if (existingId) {
    const idx = recipes.findIndex(r => r.id === existingId);
    if (idx >= 0) {
      recipes[idx] = {
        ...recipes[idx],
        name, menu: document.getElementById('rec-menu').value,
        glass: document.getElementById('rec-glass').value.trim(),
        method: document.getElementById('rec-method').value.trim(),
        ice: document.getElementById('rec-ice').value.trim(),
        garnish: document.getElementById('rec-garnish').value.trim(),
        ingredients: ings,
      };
    }
  } else {
    recipes.push({
      id: 'r-' + Date.now(),
      name, menu: document.getElementById('rec-menu').value,
      glass: document.getElementById('rec-glass').value.trim(),
      method: document.getElementById('rec-method').value.trim(),
      ice: document.getElementById('rec-ice').value.trim(),
      garnish: document.getElementById('rec-garnish').value.trim(),
      ingredients: ings,
    });
  }

  save('recipes', recipes);
  closeSheet('editSpecSheet');
  renderSpecs();
  toast(existingId ? 'Recipe updated' : 'Recipe added');
}

function deleteEntry(store, id) {
  const stores = { activations, invoices, waste, events };
  const arr = stores[store];
  if (!arr) return;
  const idx = arr.findIndex(x => x.id === id);
  if (idx < 0) return;
  if (!confirm('Delete this entry?')) return;
  const entry = arr[idx];
  if (store === 'activations') deleteActivationFromSupabase(entry);
  arr.splice(idx, 1);
  save(store, arr);
  closeSheet('addSheet');
  render(currentView);
  toast('Entry deleted');
}

function closeSheet(sheetId, evt) {
  if (evt && evt.target !== document.getElementById(sheetId)) return;
  document.getElementById(sheetId).classList.remove('open');
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  } catch(e) { return d; }
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2300);
}

var updFilter = 'all';

function renderUpdatesOps() {
  var el = document.getElementById('view-updates');
  el.innerHTML = '<div class="updates-loading"><div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">Loading...</div></div></div>';

  supa.from('updates').select('*').order('created_at', {ascending: false}).limit(50)
    .then(function(result) {
      var data  = result.data || [];

      // Filter
      var filtered = updFilter === 'all' ? data : data.filter(function(u) { return u.tag === updFilter; });

      var tagColors = {info:'#5A5650', ops:'#1B3A5C', '86':'#8B1A1A', 'new':'#1E5C38', spec:'#4A1520'};
      var tagLabels = {info:'Info', ops:'Ops', '86':'86', 'new':'New', spec:'Spec', all:'All'};
      var filterTags = ['all','info','ops','86','new','spec'];

      var filterBtns = '';
      // filter buttons built via DOM after innerHTML set



      var feed = filtered.length === 0
        ? '<div class="empty-state" style="padding:24px 0;"><div class="empty-text">No updates' + (updFilter !== 'all' ? ' with this tag' : ' posted yet') + '.</div></div>'
        : filtered.map(function(u) {
            var bg  = tagColors[u.tag] || '#2E2E2E';
            var ts  = new Date(u.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' ' +
                      new Date(u.created_at).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
            var isAlert = !!u.expires_at;
            var alertBadge = isAlert ? ' <span style="font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(180,80,0,0.3);color:#E08030;margin-left:4px;">TIMED</span>' : '';
            return '<div class="ops-update-card">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
                '<div style="display:flex;align-items:center;gap:6px;">' +
                  '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:3px 8px;border-radius:4px;background:' + bg + ';color:#F0EDE8;">' + u.tag.toUpperCase() + '</span>' +
                  alertBadge +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:8px;">' +
                  '<span style="font-size:11px;color:var(--text3);font-family:monospace;">' + ts + '</span>' +
                  '<button onclick="deleteUpdate(' + u.id + ')" style="background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;">&times;</button>' +
                '</div>' +
              '</div>' +
              '<div style="font-size:13px;color:var(--text);line-height:1.6;">' + u.text + '</div>' +
            '</div>';
          }).join('');

      el.innerHTML =
        '<div class="ops-update-compose">' +
          '<div class="field-label">Tag</div>' +
          '<select id="upd-tag" class="field-input"><option value="info">Info</option><option value="ops">Ops</option><option value="86">86</option><option value="new">New Item</option><option value="spec">Spec Update</option></select>' +
          '<div class="field-label" style="margin-top:12px;">Message</div>' +
          '<textarea id="upd-text" class="field-input" rows="4" placeholder="Write your update for the team..." style="resize:none;line-height:1.5;" oninput="updateCharCount(this)"></textarea>' +
          '<div style="text-align:right;font-size:10px;color:var(--text3);margin-top:4px;" id="upd-char-count">0 / 280</div>' +
          '<div style="display:flex;gap:8px;margin-top:12px;">' +
            '<button class="btn-action btn-primary" onclick="postUpdate()" style="flex:1;">Post Update</button>' +
          '</div>' +
        '</div>' +
        '<div id="upd-filter-row"></div>' +
        '<div style="font-size:10px;color:var(--text3);margin-bottom:10px;">' + data.length + ' total &middot; ' + filtered.length + ' shown</div>' +
        feed;
      // Insert filter buttons via DOM
      setTimeout(function() { _insertFilterBtns(filterTags, tagLabels); }, 0);
    });
}

function setUpdFilter(t) { updFilter = t; renderUpdatesOps(); }

function _insertFilterBtns(filterTags, tagLabels) {
  var row = document.getElementById('upd-filter-row');
  if (!row) return;
  filterTags.forEach(function(t) {
    var btn = document.createElement('button');
    btn.textContent = tagLabels[t];
    var baseStyle = 'border:none;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;margin:2px;';
    btn.style.cssText = (updFilter === t ? 'background:var(--accent);color:#fff;' : 'background:var(--surface2);color:var(--text2);') + baseStyle;

    row.appendChild(btn);
  });
}
function updateCharCount(el) {
  var count = el.value.length;
  var counter = document.getElementById('upd-char-count');
  if (counter) counter.textContent = count + ' / 280';
}


function postUpdate() {
  var tag  = document.getElementById('upd-tag').value;
  var text = document.getElementById('upd-text').value.trim();
  if (!text) { alert('Write a message first.'); return; }

  var btn = document.querySelector('[onclick="postUpdate()"]');
  if (btn) { btn.textContent = 'Posting...'; btn.disabled = true; }

  supa.from('updates').insert({ tag: tag, text: text, date: TODAY, published: true })
    .then(function(result) {
      if (result.error) {
        alert('Error posting: ' + result.error.message);
        if (btn) { btn.textContent = 'Post Update'; btn.disabled = false; }
        return;
      }
      renderUpdatesOps();
    });
}

function deleteUpdate(id) {
  if (!confirm('Delete this update?')) return;
  supa.from('updates').delete().eq('id', id)
    .then(function(result) {
      if (result.error) { alert('Error deleting.'); return; }
      renderUpdatesOps();
    });
}

var opCounts = {};       // d365 -> entered count
var opNotes  = {};       // d365 -> note override
var opView   = 'today';   // 'today' | 'all' | vendor name
var opSaved  = false;

var CAT_COLORS = {
  'BTG WINE':  {bg:'rgba(200,175,30,0.18)',color:'#C8AF1E'},
  'BTB WINE':  {bg:'rgba(160,30,30,0.2)',   color:'#E05050'},
  'BACK BAR':  {bg:'rgba(50,100,160,0.2)',  color:'#7AB0D8'},
  'WELL':      {bg:'rgba(139,74,68,0.25)', color:'#A85A52'},
  'BEER':      {bg:'rgba(180,140,20,0.2)', color:'#D4A830'},
  'KITCHEN':   {bg:'rgba(30,92,56,0.2)',   color:'#38966A'},
  'N.A.':      {bg:'rgba(80,80,80,0.2)',   color:'#8A8680'},
};

var DAY_ORDER = {MON:0,TUE:1,WED:2,THU:3,FRI:4,SAT:5,SUN:6};
var DAYS      = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function opTodayDay() {
  return DAYS[new Date().getDay()];
}

function opVendorsForDay(day) {
  return Object.values(ORDER_VENDORS).filter(function(v) {
    return v.days.indexOf(day) >= 0;
  });
}

function opSuggest(par, count) {
  if (par == null || count == null || count === '') return null;
  var s = (parseFloat(par) || 0) - (parseFloat(count) || 0);
  return Math.max(0, s);
}

function renderOrderPlanner() {
  var el = document.getElementById('view-order');
  var today = opTodayDay();
  var todayVendors = opVendorsForDay(today);

  // Load overrides first, then counts
  loadOrderOverrides(function() {
  todayVendors = opVendorsForDay(today); // refresh after overrides
  supa.from('order_counts').select('*').eq('count_date', TODAY)
    .then(function(result) {
      var saved = result.data || [];
      saved.forEach(function(row) {
        opCounts[row.d365] = row.count;
        if (row.notes) opNotes[row.d365] = row.notes;
      });
      _renderOPInner(el, today, todayVendors);
    });
  }); // end loadOrderOverrides
}

function _renderOPInner(el, today, todayVendors) {
  // View switcher
  var allVendors = Object.values(ORDER_VENDORS).sort(function(a,b) {
    return (DAY_ORDER[a.days[0]] || 0) - (DAY_ORDER[b.days[0]] || 0);
  });

  var viewBtns = [
    {key:'today', label: today + ' Orders (' + todayVendors.length + ')'},
    {key:'all',   label: 'All Vendors'},
  ];
  var viewBtnHTML = viewBtns.map(function(btn) {
    var active = opView === btn.key;
    return '<button class="op-view-btn' + (active ? ' active' : '') + '" onclick="setOPView(\'' + btn.key + '\')">' + btn.label + '</button>';
  }).join('');

  // Which vendors to show
  var showVendors = opView === 'today' ? todayVendors : allVendors;

  // Count items needing order across shown vendors
  var totalNeed = 0;
  showVendors.forEach(function(v) {
    v.items.forEach(function(item) {
      var count = opCounts[item.d365];
      var sug   = opSuggest(item.par, count !== undefined ? count : null);
      if (sug != null && sug > 0) totalNeed++;
    });
  });

  var vendorHTML = showVendors.map(function(v) {
    return _renderOPVendor(v);
  }).join('');

  var exportBtnOrder = '<button onclick="exportOrderSnapshot()" style="padding:11px 14px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius);color:var(--text2);font-size:0.813rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;white-space:nowrap;">&#x1F4CA; Snapshot</button>';
  var clearBtn = '<button onclick="clearOrderCounts()" style="padding:11px 14px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius);color:var(--text3);font-size:0.813rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;white-space:nowrap;">Clear</button>';
  var saveBar = '<div class="op-save-bar">' +
    '<button class="btn-primary" onclick="saveOrderCounts()" style="flex:1;padding:11px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-family:\'DM Sans\',sans-serif;font-size:0.813rem;font-weight:700;">Save Counts</button>' +
    clearBtn +
    exportBtnOrder +
    '</div>';

  el.innerHTML =
    '<div style="display:flex;gap:6px;margin-bottom:14px;">' + viewBtnHTML + '</div>' +
    saveBar +
    vendorHTML +
    '<div style="height:20px;"></div>';
}

function _renderOPVendor(v) {
  var itemsNeedOrder = v.items.filter(function(item) {
    var count = opCounts[item.d365];
    var sug   = opSuggest(item.par, count !== undefined ? count : null);
    return sug != null && sug > 0;
  }).length;

  var daysStr = v.days.join(', ');
  var cutoffBadge = v.cutoff && v.cutoff !== 'nan'
    ? '<span class="op-cutoff">&#x23F0; ' + v.cutoff + '</span>' : '';
  var needBadge = itemsNeedOrder > 0
    ? '<span class="op-need-count">' + itemsNeedOrder + ' to order</span>' : '';

  var itemRows = v.items.map(function(item) {
    var count    = opCounts[item.d365];
    var hasCount = count !== undefined && count !== '';
    var sug      = opSuggest(item.par, hasCount ? count : null);
    var needOrder = sug != null && sug > 0;
    var catStyle  = CAT_COLORS[item.cat] || {bg:'var(--surface3)',color:'var(--text2)'};
    var rowCls    = needOrder ? ' op-row-need' : (hasCount ? ' op-row-counted' : '');
    var sugDisplay = sug != null ? (sug > 0 ? '+' + sug : '&#x2713;') : '—';
    var sugColor   = sug != null && sug > 0 ? 'color:var(--red-bright);font-weight:700;' : 'color:var(--green-bright);';

    return '<div class="op-item-row' + rowCls + '">' +
      '<div class="op-item-info">' +
        '<div class="op-item-name">' + item.name + '</div>' +
        '<div class="op-item-meta">' +
          '<span class="op-cat-badge" style="background:' + catStyle.bg + ';color:' + catStyle.color + ';">' + item.cat + '</span>' +
          (item.d365 ? '<span>' + item.d365 + '</span>' : '') +
          (item.note ? '<span class="op-item-note">&#x26A0; ' + item.note + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="op-item-right">' +
        (item.par != null ? '<div class="op-par-label">par ' + item.par + '</div>' : '') +
        '<input class="op-count-input" type="number" inputmode="numeric" pattern="[0-9]*"' +
          ' placeholder="—" value="' + (hasCount ? count : '') + '"' +
          ' data-d365="' + item.d365 + '" data-par="' + (item.par || '') + '"' +
          ' data-name="' + item.name.replace(/"/g, '&quot;') + '" data-cat="' + item.cat + '" data-vendor="' + v.name + '"' +
          ' oninput="opCountInput(this)" onfocus="this.select()">' +
        '<div class="op-suggest" style="' + sugColor + '">' + sugDisplay + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var addItemBtn = '<button onclick="openOrderItemSheet(\'' + v.name + '\')" ' +
    'style="display:block;width:100%;padding:9px;background:transparent;border:1.5px dashed var(--surface3);' +
    'color:var(--text3);font-size:0.75rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;' +
    'text-align:center;border-top:1px solid var(--surface3);">+ Add Item to ' + v.name + '</button>';

  var editItemBtns = '<div style="display:flex;flex-wrap:wrap;gap:4px;padding:8px 14px;border-top:1px solid var(--surface3);">' +
    v.items.map(function(item) {
      var encoded = encodeURIComponent(JSON.stringify(item));
      return '<button onclick="openOrderItemSheet(\'' + v.name + '\',JSON.parse(decodeURIComponent(\'' + encoded + '\')))" ' +
        'style="font-size:0.563rem;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--surface2);' +
        'color:var(--text3);border:none;cursor:pointer;font-family:\'DM Sans\',sans-serif;">' +
        item.d365 + '</button>';
    }).join('') +
  '</div>';

  var copyBtn = itemsNeedOrder > 0
    ? '<button class="op-copy-btn" onclick="copyVendorOrder(\'' + v.name.replace(/'/g, "\\'") + '\')" style="margin-top:10px;">&#x1F4CB; Copy ' + v.name + ' Order</button>'
    : '';

  var createInvBtn = itemsNeedOrder > 0
    ? '<button class="op-copy-btn" onclick="createInvoiceFromOrder(\'' + v.name.replace(/'/g, "\\'") + '\')" ' +
      'style="background:var(--accent-dim);color:var(--accent-bright);border-top:1px solid var(--surface3);">' +
      '&#x1F9FE; Create Invoice — ' + v.name + ' (' + itemsNeedOrder + ' items)</button>'
    : '';

  return '<div class="op-vendor-card">' +
    '<div class="op-vendor-header">' +
      '<div>' +
        '<div class="op-vendor-name">' + v.name + '</div>' +
        '<div class="op-vendor-meta">' + daysStr + ' &middot; ' + (v.contact || '') + '</div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">' +
        cutoffBadge + needBadge +
      '</div>' +
    '</div>' +
    itemRows +
    editItemBtns +
    addItemBtn +
    copyBtn +
    createInvBtn +
  '</div>';
}

function opCountInput(input) {
  var d365  = input.dataset.d365;
  var val   = input.value.trim();
  opCounts[d365] = val === '' ? undefined : parseFloat(val);

  // Update suggestion display inline
  var row    = input.closest('.op-item-row');
  var sugEl  = row.querySelector('.op-suggest');
  var par    = parseFloat(input.dataset.par) || null;
  var count  = val === '' ? null : parseFloat(val);
  var sug    = opSuggest(par, count);
  if (sugEl) {
    sugEl.textContent = sug != null ? (sug > 0 ? '+' + sug : '✓') : '—';
    sugEl.style.color = sug != null && sug > 0 ? 'var(--red-bright)' : 'var(--green-bright)';
    sugEl.style.fontWeight = sug != null && sug > 0 ? '700' : '';
  }
  row.className = 'op-item-row' + (sug != null && sug > 0 ? ' op-row-need' : (val !== '' ? ' op-row-counted' : ''));
}

function setOPView(v) {
  opView = v;
  renderOrderPlanner();
}

function clearOrderCounts() {
  opCounts = {};
  // Delete today's saved counts from Supabase so reload doesn't refill them
  supa.from('order_counts').delete().eq('count_date', TODAY).then(function() {});
  // Bypass renderOrderPlanner (which re-fetches from Supabase) — render directly
  var el = document.getElementById('view-order');
  var today = opTodayDay();
  loadOrderOverrides(function() {
    var todayVendors = opVendorsForDay(today);
    _renderOPInner(el, today, todayVendors);
    toast('Counts cleared');
  });
}

function saveOrderCounts() {
  var rows = [];
  document.querySelectorAll('.op-count-input').forEach(function(inp) {
    if (inp.value.trim() === '') return;
    rows.push({
      count_date: TODAY,
      d365:       inp.dataset.d365,
      item_name:  inp.dataset.name,
      category:   inp.dataset.cat,
      vendor:     inp.dataset.vendor,
      par:        parseFloat(inp.dataset.par) || null,
      count:      parseFloat(inp.value),
      order_qty:  Math.max(0, (parseFloat(inp.dataset.par) || 0) - parseFloat(inp.value)),
    });
  });

  if (!rows.length) { toast('No counts entered yet'); return; }

  // Deduplicate by d365 before saving (same item can appear in multiple vendors)
  var dedupedOrders = {};
  rows.forEach(function(row) {
    dedupedOrders[row.d365] = row; // last write wins if duplicate
  });
  var dedupRows = Object.values(dedupedOrders);

  supa.from('order_counts')
    .upsert(dedupRows, { onConflict: 'count_date,d365' })
    .then(function(r) {
      if (r && r.error) { toast('Save error: ' + r.error.message); return; }
      toast('Counts saved — ' + dedupRows.length + ' items');
    });
}

function copyVendorOrder(vendorName) {
  var vendor = ORDER_VENDORS[vendorName];
  if (!vendor) return;

  var lines = [];
  var date  = new Date().toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
  lines.push('ORDER — ' + vendorName);
  lines.push(date + ' | Cutoff: ' + (vendor.cutoff || ''));
  if (vendor.email && vendor.email !== 'nan') lines.push(vendor.email);
  lines.push('');

  var orderItems = vendor.items.filter(function(item) {
    var count = opCounts[item.d365];
    var sug   = opSuggest(item.par, count !== undefined ? count : null);
    return sug != null && sug > 0;
  });

  if (!orderItems.length) { toast('Nothing to order from ' + vendorName); return; }

  // Group by category
  var cats = {};
  orderItems.forEach(function(item) {
    if (!cats[item.cat]) cats[item.cat] = [];
    var count = opCounts[item.d365];
    var sug   = opSuggest(item.par, count);
    cats[item.cat].push('  ' + item.d365 + '  ' + item.name + '  x' + sug);
  });

  Object.keys(cats).forEach(function(cat) {
    lines.push('[' + cat + ']');
    cats[cat].forEach(function(l) { lines.push(l); });
    lines.push('');
  });

  navigator.clipboard.writeText(lines.join('\n')).then(function() {
    toast('Copied ' + vendorName + ' order (' + orderItems.length + ' items)');
  });
}


// ─────────────────────────────────────────────
// INVENTORY TREND TRACKER
// ─────────────────────────────────────────────
var trendFilter = 'all';
var trendSearch = '';

function renderInventoryTrend() {
  var el = document.getElementById('view-trend');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4E1;</div><div class="empty-text">Loading trend data...</div></div>';

  // Get all snapshots ordered by date
  // Fetch both count snapshots and confirmed delivery totals in parallel
  Promise.all([
    supa.from('inventory_trend').select('*').order('snap_date', {ascending: true}),
    supa.from('delivery_items').select('d365, item_name, qty_received, received_date, vendor').eq('confirmed', true)
  ]).then(function(results) {
      var trendResult    = results[0];
      var deliveryResult = results[1];
      var data = trendResult.data || [];
      var deliveries = deliveryResult.data || [];

      // Build delivery totals by d365
      var deliveryByD365 = {};
      deliveries.forEach(function(row) {
        if (!deliveryByD365[row.d365]) deliveryByD365[row.d365] = { total: 0, lastDate: '', vendor: row.vendor, name: row.item_name };
        deliveryByD365[row.d365].total += (row.qty_received || 0);
        if (row.received_date > deliveryByD365[row.d365].lastDate) deliveryByD365[row.d365].lastDate = row.received_date;
      });

      if (!data.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4C8;</div>' +
          '<div class="empty-text">No trend data yet.<br><br>' +
          'Trend data comes from two sources:<br>' +
          '• <strong>Orders tab</strong> — Save Counts records what you have on hand<br>' +
          '• <strong>PiPa Count</strong> — Save to Trend after a full count<br><br>' +
          'Depletion rate calculates automatically once you have 2+ snapshots.</div></div>';
        return;
      }

      // Group by d365
      var items = {};
      data.forEach(function(row) {
        if (!items[row.d365]) {
          items[row.d365] = {
            d365: row.d365, name: row.item_name, category: row.category,
            vendor: row.vendor, par: row.par, snaps: []
          };
        }
        items[row.d365].snaps.push({date: row.snap_date, count: row.count});
      });

      // Calc depletion stats per item
      Object.values(items).forEach(function(item) {
        var snaps = item.snaps;
        if (snaps.length < 2) { item.avgDepletion = null; item.weeksToStockout = null; return; }
        var deltas = [];
        for (var i = 1; i < snaps.length; i++) {
          var d = snaps[i-1].count - snaps[i].count;
          if (d > 0) deltas.push(d);
        }
        item.avgDepletion = deltas.length ? deltas.reduce(function(a,b){return a+b;},0) / deltas.length : 0;
        var lastCount = snaps[snaps.length-1].count;
        item.lastCount = lastCount;
        item.weeksToStockout = item.avgDepletion > 0 ? (lastCount / item.avgDepletion).toFixed(1) : null;
      });

      // Filter
      var cats = ['all'].concat([...new Set(Object.values(items).map(function(i){return i.category;}))].filter(Boolean).sort());
      var filtered = Object.values(items).filter(function(item) {
        var catOK = trendFilter === 'all' || item.category === trendFilter;
        var searchOK = !trendSearch || item.name.toLowerCase().includes(trendSearch.toLowerCase());
        return catOK && searchOK;
      }).sort(function(a,b) {
        // Sort: items with depletion data first, then by name
        var aWks = parseFloat(a.weeksToStockout);
        var bWks = parseFloat(b.weeksToStockout);
        if (!isNaN(aWks) && !isNaN(bWks)) return aWks - bWks;
        if (!isNaN(aWks)) return -1;
        if (!isNaN(bWks)) return 1;
        return (a.name || '').localeCompare(b.name || '');
      });

      // Filter buttons
      var catBtns = document.createElement('div');
      catBtns.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;';
      cats.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.textContent = cat === 'all' ? 'All' : cat;
        btn.style.cssText = (trendFilter === cat ? 'background:var(--accent);color:var(--text);' : 'background:var(--surface);color:var(--text2);') +
          'border:1.5px solid transparent;padding:5px 12px;border-radius:20px;font-size:0.688rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;';
        btn.onclick = function() { trendFilter = cat; renderInventoryTrend(); };
        catBtns.appendChild(btn);
      });

      var searchEl = document.createElement('input');
      searchEl.className = 'field-input';
      searchEl.type = 'text';
      searchEl.placeholder = 'Search item...';
      searchEl.value = trendSearch || '';
      searchEl.style.cssText = 'margin-bottom:10px;';
      searchEl.oninput = function() { trendSearch = this.value; renderInventoryTrend(); };

      // Summary stats
      var lowStock = filtered.filter(function(i){ return i.weeksToStockout !== null && parseFloat(i.weeksToStockout) < 2; }).length;
      var snapDates = [...new Set(data.map(function(r){return r.snap_date;}))].sort();

      var summaryHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">' +
          trendStat('&#x1F4C5;', snapDates.length, 'Count Days') +
          trendStat('&#x1F4E6;', Object.keys(items).length, 'Items Tracked') +
          trendStat('&#x26A0;', lowStock, 'Low Stock') +
        '</div>';

      var rowsHTML = filtered.map(function(item) {
        var catStyle = (CAT_COLORS && CAT_COLORS[item.category]) || {bg:'var(--surface3)',color:'var(--text2)'};
        var wks = parseFloat(item.weeksToStockout);
        var wksColor = isNaN(wks) ? 'var(--text3)' : wks < 1 ? 'var(--red-bright)' : wks < 2 ? 'var(--yellow-bright)' : 'var(--green-bright)';
        var wksLabel = item.weeksToStockout != null ? item.weeksToStockout + 'w' : '—';
        var deplLabel = item.avgDepletion != null ? item.avgDepletion.toFixed(1) + '/wk' : '—';
        var snapsLabel = item.snaps.length + ' snap' + (item.snaps.length !== 1 ? 's' : '');
        var rcvdLabel = rcvd != null ? rcvd + ' rcvd' + (lastDlv ? ' · ' + lastDlv : '') : null;
        var lastSnap = item.snaps[item.snaps.length - 1];
        var lastDate = lastSnap ? lastSnap.date : '—';

        var rcvd     = item.totalReceived  != null ? item.totalReceived  : null;
        var lastDlv  = item.lastDelivery   || null;

        return '<div class="trend-row">' +
          '<div class="op-item-info">' +
            '<div class="op-item-name">' + item.name + '</div>' +
            '<div class="op-item-meta">' +
              '<span class="op-cat-badge" style="background:' + catStyle.bg + ';color:' + catStyle.color + ';">' + item.category + '</span>' +
              '<span>' + item.vendor + '</span>' +
              '<span>' + snapsLabel + '</span>' +
            '</div>' +
          '</div>' +
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;">' +
            '<div style="font-size:0.938rem;font-weight:700;color:' + wksColor + ';">' + wksLabel + '</div>' +
            '<div style="font-size:0.563rem;color:var(--text3);">' + deplLabel + '</div>' +
            '<div style="font-size:0.563rem;color:var(--text3);">on hand: ' + (item.lastCount != null ? item.lastCount : '—') + '</div>' +
            (rcvdLabel ? '<div style="font-size:0.563rem;color:var(--green-bright);">' + rcvdLabel + '</div>' : '') +
          '</div>' +
        '</div>';
      }).join('');

      el.innerHTML = '';
      el.appendChild(searchEl);
      el.appendChild(catBtns);
      el.insertAdjacentHTML('beforeend', summaryHTML);
      el.insertAdjacentHTML('beforeend', rowsHTML || '<div class="empty-state"><div class="empty-text">No items match.</div></div>');
    // Attach delivery data to items
      Object.keys(deliveryByD365).forEach(function(d365) {
        if (!items[d365]) {
          var di = deliveryByD365[d365];
          items[d365] = { d365: d365, name: di.name, category: '', vendor: di.vendor, par: null, snaps: [] };
        }
        items[d365].totalReceived  = deliveryByD365[d365].total;
        items[d365].lastDelivery   = deliveryByD365[d365].lastDate;
      });
    });
}

function trendStat(icon, val, label) {
  return '<div style="background:var(--surface);border-radius:var(--radius);padding:12px 8px;text-align:center;">' +
    '<div style="font-size:1.25rem;margin-bottom:2px;">' + icon + '</div>' +
    '<div style="font-size:1.063rem;font-weight:700;color:var(--text);">' + val + '</div>' +
    '<div style="font-size:0.563rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;">' + label + '</div>' +
  '</div>';
}

// SUBMISSIONS HISTORY (ops view — full log)
