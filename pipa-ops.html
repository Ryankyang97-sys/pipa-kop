var subType   = 'waste';
var subDate   = '';
var subSearch = '';


function deleteSubmission(table, id) {
  if (!confirm('Delete this record?')) return;
  supa.from(table).delete().eq('id', id)
    .then(function(r) {
      if (r && r.error) { toast('Error: ' + r.error.message); return; }
      toast('Deleted');
      renderSubmissions();
    });
}

function renderSubmissions() {
  var el = document.getElementById('view-submissions');
  el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">Loading...</div>';

  var tables = { waste: 'waste_log', bottles: 'bottle_log', collateral: 'collateral_requests', checklist: 'checklist_completions', orders: 'order_counts' };
  var tbl = tables[subType] || 'waste_log';

  var query = supa.from(tbl).select('*').order('created_at', {ascending: false}).limit(100);
  if (subDate) query = query.eq(tbl === 'checklist_completions' ? 'shift_date' : (tbl === 'order_counts' ? 'count_date' : 'shift_date'), subDate);

  query.then(function(result) {
    var data = result.data || [];

    // Type filter buttons
    var typeLabels = { waste:'Waste', bottles:'Bottles', collateral:'Collateral', checklist:'Checklists', orders:'Orders' };
    var typeBtns = Object.keys(typeLabels).map(function(t) {
      var active = subType === t;
      var btn = document.createElement('button');
      btn.textContent = typeLabels[t];
      btn.style.cssText = (active ? 'background:var(--accent);color:#fff;' : 'background:var(--surface2);color:var(--text2);') +
        'border:none;padding:5px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;white-space:nowrap;';
      btn.onclick = function() { subType = t; renderSubmissions(); };
      return btn;
    });

    var typeRow = document.createElement('div');
    typeRow.style.cssText = 'display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;scrollbar-width:none;';
    typeBtns.forEach(function(btn) { typeRow.appendChild(btn); });

    // Date filter
    var dateInput = document.createElement('input');
    dateInput.type = 'date';
    dateInput.value = subDate || '';
    dateInput.style.cssText = 'background:var(--surface2);border:1.5px solid var(--surface3);border-radius:8px;color:var(--text);padding:8px 12px;font-size:0.813rem;width:100%;margin-bottom:8px;outline:none;';
    dateInput.onchange = function() { subDate = this.value; renderSubmissions(); };

    // Filter by search
    if (subSearch) {
      data = data.filter(function(row) {
        return JSON.stringify(row).toLowerCase().includes(subSearch.toLowerCase());
      });
    }

    var rowsHTML = '';
    if (!data.length) {
      rowsHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">No records' + (subDate ? ' for ' + subDate : '') + '.</div>';
    } else if (subType === 'waste') {
      rowsHTML = data.map(function(r) {
        var delBtn = document.createElement('button');
        delBtn.innerHTML = '&times;';
        delBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:1.125rem;cursor:pointer;flex-shrink:0;padding:0;';
        delBtn.onclick = (function(id){ return function(){ deleteSubmission('waste_log', id); }; })(r.id);
        var row = document.createElement('div');
        row.className = 'sub-hist-row';
        row.innerHTML = '<div style="flex:1;min-width:0;">' +
          '<div class="sub-hist-name">' + r.item + '</div>' +
          '<div class="sub-hist-meta">' + (r.qty||'') + ' ' + (r.unit||'') + ' &middot; ' + (r.reason||'') + (r.initials ? ' &middot; ' + r.initials : '') + '</div>' +
          '<div class="sub-hist-date">' + (r.shift_date||'') + '</div></div>';
        row.appendChild(delBtn);
        return row.outerHTML;
      }).join('');
    } else if (subType === 'bottles') {
      rowsHTML = data.map(function(r) {
        var delBtn = document.createElement('button');
        delBtn.innerHTML = '&times;';
        delBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:1.125rem;cursor:pointer;flex-shrink:0;padding:0;';
        delBtn.onclick = (function(id){ return function(){ deleteSubmission('bottle_log', id); }; })(r.id);
        var row = document.createElement('div');
        row.className = 'sub-hist-row';
        row.innerHTML = '<div style="flex:1;min-width:0;">' +
          '<div class="sub-hist-name">' + r.wine + '</div>' +
          '<div class="sub-hist-meta">' + (r.amount||'') + '</div>' +
          '<div class="sub-hist-date">' + (r.shift_date||'') + '</div></div>';
        row.appendChild(delBtn);
        return row.outerHTML;
      }).join('');
    } else if (subType === 'collateral') {
      rowsHTML = data.map(function(r) {
        var items2 = [];
        try { items2 = JSON.parse(r.items||'[]'); } catch(e) {}
        var itemStr = items2.map(function(i){ return (i.name||i) + (i.qty ? ' x'+i.qty : ''); }).join(', ');
        var delBtn = document.createElement('button');
        delBtn.innerHTML = '&times;';
        delBtn.style.cssText = 'background:none;border:none;color:var(--text3);font-size:1.125rem;cursor:pointer;flex-shrink:0;padding:0;';
        delBtn.onclick = (function(id){ return function(){ deleteSubmission('collateral_requests', id); }; })(r.id);
        var row = document.createElement('div');
        row.className = 'sub-hist-row';
        row.innerHTML = '<div style="flex:1;min-width:0;">' +
          '<div class="sub-hist-name">Collateral Request</div>' +
          '<div class="sub-hist-meta">' + (itemStr || 'No items') + '</div>' +
          '<div class="sub-hist-date">' + (r.shift_date||'') + '</div></div>';
        row.appendChild(delBtn);
        return row.outerHTML;
      }).join('');
    } else if (subType === 'checklist') {
      rowsHTML = data.map(function(r) {
        var color = r.missed > 0 ? 'var(--yellow-bright)' : 'var(--green-bright)';

          rightCol.appendChild(dateEl);
          info.appendChild(nameEl);
          info.appendChild(metaEl);
          row.appendChild(info);
          row.appendChild(rightCol);
          fragment.appendChild(row);
          return;
        }

        info.appendChild(nameEl);

        if (subType !== 'orders') {
          var tableMap = { waste:'waste_log', bottles:'bottle_log', collateral:'collateral_requests', checklist:'checklist_completions' };

          row.appendChild(delBtn);
        }

        fragment.appendChild(row);
      });
      el.appendChild(fragment);
    }
  });
}

// EXPORT / REPORT GENERATION
// ─────────────────────────────────────────────

function xlsxCell(value, opts) {
  var cell = { v: value !== null && value !== undefined ? value : '' };
  if (typeof value === 'number') cell.t = 'n';
  else if (value instanceof Date) { cell.t = 'd'; cell.z = 'yyyy-mm-dd'; }
  else cell.t = 's';
  if (opts) Object.assign(cell, opts);
  return cell;
}

function xlsxSheet(headers, rows, colWidths) {
  var ws = {};
  var range = { s: { c: 0, r: 0 }, e: { c: headers.length - 1, r: rows.length } };
  headers.forEach(function(h, ci) {
    ws[XLSX.utils.encode_cell({ c: ci, r: 0 })] = { v: h, t: 's', s: { font: { bold: true } } };
  });
  rows.forEach(function(row, ri) {
    row.forEach(function(val, ci) {
      var key = XLSX.utils.encode_cell({ c: ci, r: ri + 1 });
      ws[key] = xlsxCell(val);
    });
  });
  ws['!ref'] = XLSX.utils.encode_range(range);
  if (colWidths) ws['!cols'] = colWidths.map(function(w) { return { wch: w }; });
  return ws;
}

function downloadXlsx(wb, filename) {
  // Generate file as blob
  var wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  var blob  = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  var url   = URL.createObjectURL(blob);

  // Try direct download first
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // On iOS Safari, direct download often doesn't work — show share sheet fallback
  setTimeout(function() {
    // Check if we're on iOS
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
      // Show a modal with an Open button that triggers the share sheet
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:flex-end;justify-content:center;';
      overlay.innerHTML =
        '<div style="background:var(--surface);border-radius:16px 16px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;">' +
          '<div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;">' + filename + '</div>' +
          '<div style="font-size:0.813rem;color:var(--text2);margin-bottom:20px;">Tap Open to view in Files or Excel. From there you can save or share.</div>' +
          '<a href="' + url + '" download="' + filename + '" ' +
            'style="display:block;width:100%;padding:14px;background:var(--accent);color:var(--text);text-align:center;border-radius:var(--radius);font-weight:700;font-size:0.938rem;text-decoration:none;margin-bottom:10px;">' +
            '&#x1F4C2; Open File' +
          '</a>' +
          '<button onclick="this.closest(\'div\').parentElement.remove();URL.revokeObjectURL(\'' + url + '\')" ' +
            'style="width:100%;padding:12px;background:var(--surface2);border:none;border-radius:var(--radius);color:var(--text2);font-size:0.938rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;">' +
            'Cancel' +
          '</button>' +
        '</div>';
      overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); URL.revokeObjectURL(url); } };
      document.body.appendChild(overlay);
    } else {
      URL.revokeObjectURL(url);
      toast(filename + ' downloaded');
    }
  }, 300);
}

// ── 1. ORDER SNAPSHOT ─────────────────────────────────────────────
function exportOrderSnapshot() {
  var wb = XLSX.utils.book_new();
  var today = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  // Collect current counts from the UI
  var countMap = {};
  document.querySelectorAll('.op-count-input').forEach(function(inp) {
    if (inp.value.trim() !== '') countMap[inp.dataset.d365] = parseFloat(inp.value);
  });
  // Also use saved opCounts
  Object.assign(countMap, opCounts);

  Object.values(ORDER_VENDORS).forEach(function(vendor) {
    if (!vendor.items.length) return;
    var headers = ['D365', 'Item', 'Category', 'Par', 'On Hand', 'Order Qty', 'Notes'];
    var rows = vendor.items.map(function(item) {
      var count = countMap[item.d365] !== undefined ? countMap[item.d365] : '';
      var orderQty = (count !== '' && item.par != null) ? Math.max(0, item.par - count) : '';
      return [
        item.d365, item.name, item.cat,
        item.par || '', count, orderQty || '', item.note || ''
      ];
    });
    var ws = xlsxSheet(headers, rows, [12, 36, 12, 6, 8, 9, 24]);

    // Add vendor info at top — prepend 2 rows
    XLSX.utils.sheet_add_aoa(ws, [
      [vendor.name + ' — Order Snapshot — ' + today],
      ['Cutoff: ' + (vendor.cutoff || '') + '   Contact: ' + (vendor.contact || '') + '   ' + (vendor.email || '')],
      []
    ], { origin: 'A1' });

    var sheetName = vendor.name.slice(0, 31).replace(/[\\/*?:\[\]]/g, '');
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  downloadXlsx(wb, 'Order_Snapshot_' + TODAY + '.xlsx');
}

// ── 2. WEEKLY REPORT ──────────────────────────────────────────────
function exportWeeklyReport() {
  var weekStart = getWeekStart();
  var wb = XLSX.utils.book_new();

  // Fetch all this week's data in parallel
  Promise.all([
    supa.from('order_counts').select('*').eq('count_date', TODAY),
    supa.from('waste_log').select('*').gte('shift_date', weekStart),
    supa.from('bottle_log').select('*').gte('shift_date', weekStart),
    supa.from('checklist_completions').select('*').gte('shift_date', weekStart),
    supa.from('collateral_requests').select('*').gte('shift_date', weekStart),
    supa.from('weekly_summary').select('*').eq('week_start', weekStart),
    supa.from('activations_log').select('*').eq('launched', false),
  ]).then(function(results) {
    var orders     = results[0].data || [];
    var waste      = results[1].data || [];
    var bottles    = results[2].data || [];
    var checklists = results[3].data || [];
    var collateral = results[4].data || [];
    var weeklySched= results[5].data || [];
    var activations= results[6].data || [];

    // Sheet 1 — Weekly Summary
    var summarySheet = xlsxSheet(
      ['Vendor', 'Day', 'Contact', 'Confirmed', 'Received', 'Issues', 'Notes'],
      weeklySched.map(function(r) {
        return [r.vendor, r.delivery_day || '', '', r.confirmed ? 'Y' : 'N', r.received ? 'Y' : 'N', r.issues || '', r.notes || ''];
      }),
      [24, 6, 20, 10, 10, 30, 30]
    );
    XLSX.utils.book_append_sheet(wb, summarySheet, 'Weekly Summary');

    // Sheet 2 — Order Counts
    var orderSheet = xlsxSheet(
      ['D365', 'Item', 'Category', 'Vendor', 'Par', 'Count', 'Order Qty'],
      orders.filter(function(r) { return r.order_qty > 0; }).map(function(r) {
        return [r.d365, r.item_name, r.category || '', r.vendor || '', r.par || '', r.count, r.order_qty || 0];
      }),
      [12, 36, 12, 14, 6, 8, 9]
    );
    XLSX.utils.book_append_sheet(wb, orderSheet, 'Order Counts');

    // Sheet 3 — Waste & Breakage
    var wasteSheet = xlsxSheet(
      ['Date', 'Item', 'Category', 'Qty', 'Unit', 'Reason', 'Initials'],
      waste.map(function(r) {
        return [r.shift_date, r.item, r.category || '', r.qty || '', r.unit || '', r.reason || '', r.initials || ''];
      }),
      [12, 28, 12, 6, 8, 24, 8]
    );
    XLSX.utils.book_append_sheet(wb, wasteSheet, 'Waste & Breakage');

    // Sheet 4 — Open Bottles / BTG Sales
    var bottleSheet = xlsxSheet(
      ['Date', 'Wine', 'Amount'],
      bottles.map(function(r) { return [r.shift_date, r.wine, r.amount || '']; }),
      [12, 36, 14]
    );
    XLSX.utils.book_append_sheet(wb, bottleSheet, 'Bottles & BTG Sales');

    // Sheet 5 — Checklists
    var clSheet = xlsxSheet(
      ['Date', 'Shift', 'Done', 'Total', 'Missed', 'Completed At'],
      checklists.map(function(r) {
        return [r.shift_date, r.shift_type === 'am' ? 'AM Opening' : 'PM Closing',
          r.done, r.total, r.missed, r.completed_at ? new Date(r.completed_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : ''];
      }),
      [12, 14, 6, 6, 6, 12]
    );
    XLSX.utils.book_append_sheet(wb, clSheet, 'Checklists');

    // Sheet 6 — Active Activations
    var actSheet = xlsxSheet(
      ['Priority', 'Name', 'D365', 'Vendor', 'Category', 'Launch Date', 'Swap Item', 'Notes', 'Steps Done', 'Issues'],
      activations.map(function(r) {
        var steps = r.steps || {};
        var stepsDone = Object.values(steps).filter(Boolean).length + '/5';
        return [r.priority, r.name, r.d365 || '', r.vendor || '', r.category || '',
          r.launch_date || '', r.swap_item || '', r.notes || '', stepsDone, r.open_issues || ''];
      }),
      [8, 36, 12, 14, 12, 12, 24, 40, 10, 30]
    );
    XLSX.utils.book_append_sheet(wb, actSheet, 'Activations');

    var filename = 'Weekly_Report_' + weekStart + '.xlsx';
    downloadXlsx(wb, filename);
  });
}

// Load overrides from Supabase and merge into ORDER_VENDORS
function loadOrderOverrides(callback) {
  supa.from('order_items_overrides').select('*')
    .then(function(result) {
      var overrides = result.data || [];
      overrides.forEach(function(ov) {
        var vendor = ORDER_VENDORS[ov.vendor];
        if (!vendor) return;
        var existing = vendor.items.findIndex(function(i) { return i.d365 === ov.d365; });
        if (ov.removed) {
          // Remove from list
          if (existing >= 0) vendor.items.splice(existing, 1);
        } else if (existing >= 0) {
          // Update existing item
          vendor.items[existing] = { d365: ov.d365, name: ov.name, cat: ov.cat, par: ov.par, note: ov.note || '', vendor: ov.vendor };
        } else {
          // Add new item
          vendor.items.push({ d365: ov.d365, name: ov.name, cat: ov.cat, par: ov.par, note: ov.note || '', vendor: ov.vendor });
        }
      });
      if (callback) callback();
    });
}

// Show add/edit item sheet
function openOrderItemSheet(vendorName, existingItem) {
  var vendors = Object.keys(ORDER_VENDORS).sort();

  }).join('');
  var catOpts = cats.map(function(cat) {
    return '<option value="' + cat + '"' + (existingItem && existingItem.cat === cat ? ' selected' : '') + '>' + cat + '</option>';
  }).join('');

  var isEdit   = !!existingItem;
  var content  = document.getElementById('addSheetContent');

  content.innerHTML =
    '<div class="sheet-handle"></div>' +

    '<div class="form-group">' +

    '<div class="form-group">' +
      '<label class="form-label">D365 #</label>' +
      '<input class="form-input" id="oi-d365" type="text" inputmode="numeric" placeholder="e.g. 1136347"' +
        ' value="' + (existingItem ? existingItem.d365 : '') + '">' +
    '</div>' +

    '<div class="form-group">' +
      '<label class="form-label">Item Name</label>' +
      '<input class="form-input" id="oi-name" type="text" placeholder="e.g. EPL Limonata"' +
        ' value="' + (existingItem ? existingItem.name.replace(/"/g,'&quot;') : '') + '">' +
    '</div>' +

    '<div class="form-row">' +
      '<div class="form-group">' +
        '<label class="form-label">Category</label>' +
        '<select class="form-select" id="oi-cat">' + catOpts + '</select>' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Par</label>' +
        '<input class="form-input" id="oi-par" type="number" inputmode="numeric" placeholder="e.g. 12"' +
          ' value="' + (existingItem && existingItem.par != null ? existingItem.par : '') + '">' +
      '</div>' +
    '</div>' +

    '<div class="form-group">' +
      '<label class="form-label">Notes (optional)</label>' +
      '<input class="form-input" id="oi-note" type="text" placeholder="e.g. Off Menu, OOS"' +
        ' value="' + (existingItem ? (existingItem.note || '').replace(/"/g,'&quot;') : '') + '">' +
    '</div>' +

    '<div class="sheet-actions">' +
      '<button class="btn-primary" onclick="saveOrderItem(' +
        (isEdit ? '\'' + existingItem.d365 + '\',\'' + existingItem.vendor + '\'' : 'null,null') +
        ')">Save Item</button>' +
    '</div>' +
    (isEdit
      ? '<button class="btn-secondary" style="margin-top:8px;color:var(--red-bright);" ' +
          'onclick="removeOrderItem(\'' + existingItem.d365 + '\',\'' + existingItem.vendor + '\')">Remove from Order Guide</button>'
      : '') +
    '<button class="btn-secondary" style="margin-top:8px;" onclick="closeSheet(\'addSheet\')">Cancel</button>';

  document.getElementById('addSheet').classList.add('open');
}

function saveOrderItem(existingD365, existingVendor) {
  var d365   = document.getElementById('oi-d365').value.trim();
  var name   = document.getElementById('oi-name').value.trim();
  var cat    = document.getElementById('oi-cat').value;
  var vendor = document.getElementById('oi-vendor').value;
  var par    = parseFloat(document.getElementById('oi-par').value) || null;
  var note   = document.getElementById('oi-note').value.trim();

  if (!d365 || !name) { toast('D365 and name required'); return; }

  var row = { d365: d365, name: name, cat: cat, vendor: vendor, par: par, note: note, removed: false };

  supa.from('order_items_overrides')
    .upsert(row, { onConflict: 'd365,vendor' })
    .then(function(r) {
      if (r.error) { toast('Error: ' + r.error.message); return; }
      closeSheet('addSheet');
      toast(existingD365 ? 'Item updated' : 'Item added');
      // Reload overrides and re-render
      loadOrderOverrides(function() { renderOrderPlanner(); });
    });
}

function removeOrderItem(d365, vendor) {
  if (!confirm('Remove ' + d365 + ' from ' + vendor + ' order guide?')) return;
  supa.from('order_items_overrides')
    .upsert({ d365: d365, vendor: vendor, name: '', cat: '', removed: true }, { onConflict: 'd365,vendor' })
    .then(function(r) {
      if (r.error) { toast('Error: ' + r.error.message); return; }
      closeSheet('addSheet');
      toast('Item removed');
      loadOrderOverrides(function() { renderOrderPlanner(); });
    });
}

function renderVendors() {
  var el = document.getElementById('view-vendors');

  var filtered = VENDOR_LIST.filter(function(v) {
    var s = vendorSearch.toLowerCase();
    return !s || v.contact.toLowerCase().includes(s) ||
      v.company.toLowerCase().includes(s) ||
      v.email.toLowerCase().includes(s);
  });

  // Group by company
  var companies = {};
  filtered.forEach(function(v) {
    var co = v.company || 'Other';
    if (!companies[co]) companies[co] = [];
    companies[co].push(v);
  });

  var packBtn = document.createElement('button');
  packBtn.textContent = '\uD83D\uDCCA Export Presentation Pack';
  packBtn.style.cssText = 'width:100%;padding:11px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius);color:var(--text);font-size:0.813rem;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;margin-bottom:10px;';
  packBtn.onclick = exportPresentationPack;

  var searchEl = document.createElement('input');
  searchEl.className = 'field-input';
  searchEl.type = 'text';
  searchEl.placeholder = 'Search contact, company, email...';
  searchEl.value = vendorSearch || '';
  searchEl.style.cssText = 'margin-bottom:12px;';
  searchEl.oninput = function() { vendorSearch = this.value; renderVendors(); };

  var cardsHTML = Object.keys(companies).sort().map(function(coName) {
    var contacts = companies[coName];
    var primary  = contacts.find(function(v) { return v.delivery_days; }) || contacts[0];
    var schedInfo = primary.delivery_days
      ? '<span style="font-size:0.563rem;color:var(--text3);">Delivery: ' + primary.delivery_days + '</span>' +
        (primary.order_days ? '<span style="font-size:0.563rem;color:var(--text3);">Order: ' + primary.order_days + '</span>' : '') +
        (primary.cutoff ? '<span style="font-size:0.563rem;color:var(--yellow-bright);">&#x23F0; ' + primary.cutoff + '</span>' : '')
      : '';

    var contactRows = contacts.map(function(v) {

        ? ' &middot; <a href="tel:' + v.phone.replace(/[^0-9]/g,'') + '" style="color:var(--text2);font-size:0.688rem;">' + v.phone + '</a>'

        '</div>' +
