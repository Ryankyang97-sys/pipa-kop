<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitchen">
<title>Kitchen — EKP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0D0D0D;--surface:#1A1A1A;--surface2:#242424;--surface3:#2E2E2E;
  --text:#F0EDE8;--text2:#8A8680;--text3:#5A5650;
  --accent:#B85C00;--accent-dim:rgba(184,92,0,0.15);--accent-border:rgba(184,92,0,0.35);
  --green:#2D7A4F;--green-dim:rgba(45,122,79,0.12);--green-border:rgba(45,122,79,0.3);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100%;-webkit-text-size-adjust:none;}
.page{padding:calc(var(--safe-top) + 36px) 16px calc(var(--safe-bottom) + 68px);max-width:480px;margin:0 auto;}
a.nav-back{display:flex;align-items:center;gap:6px;margin-bottom:18px;text-decoration:none;color:var(--text3);font-size:0.75rem;font-weight:600;}
.wordmark{font-size:1.35rem;font-weight:700;letter-spacing:-0.02em;}
.wordmark span{color:var(--accent);}
.wordmark-sub{font-size:0.625rem;color:var(--text3);letter-spacing:0.09em;text-transform:uppercase;margin-top:3px;}
.outlet-toggle{display:flex;gap:0;background:var(--surface2);border-radius:8px;padding:3px;margin:14px 0 0;}
.outlet-btn{flex:1;padding:7px;text-align:center;border-radius:6px;font-size:0.75rem;font-weight:700;color:var(--text3);cursor:pointer;transition:all 0.15s;user-select:none;}
.outlet-btn.active{background:var(--accent);color:#fff;}
.tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:14px -16px 0;padding:0 16px;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--surface2);width:max-content;min-width:100%;}
.tab{padding:8px 14px 10px;font-size:0.675rem;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;user-select:none;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel{display:none;padding-top:16px;}
.panel.active{display:block;}
.stat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.stat{font-size:0.625rem;font-weight:700;padding:3px 9px;border-radius:20px;}
.stat-blue{background:rgba(40,80,160,0.15);color:#80aaff;border:1px solid rgba(60,120,220,0.3);}
.stat-orange{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);}
.stat-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.search-wrap{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--surface3);border-radius:10px;padding:10px 14px;margin-bottom:6px;}
.search-icon{color:var(--text3);font-size:1rem;flex-shrink:0;}
.search-input{background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.938rem;width:100%;outline:none;}
.search-input::placeholder{color:var(--text3);}
.search-hint{font-size:0.625rem;color:var(--text3);margin-bottom:12px;padding-left:2px;}
.results-box{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;overflow:hidden;display:none;}
.result-row{padding:11px 14px;border-bottom:1px solid var(--surface2);cursor:pointer;}
.result-row:last-child{border-bottom:none;}
.result-row:active{background:var(--surface2);}
.result-name{font-size:0.813rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.result-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.result-id{font-family:'JetBrains Mono',monospace;font-size:0.688rem;color:var(--accent);}
.result-tag{font-size:0.563rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--text2);}
.result-vendor{font-size:0.688rem;color:var(--text2);}
.no-results{padding:16px 14px;font-size:0.813rem;color:var(--text3);text-align:center;}
.detail-card{background:var(--surface);border:1px solid var(--surface2);border-radius:10px;overflow:hidden;margin-top:10px;}
.detail-header{padding:12px 14px;border-bottom:1px solid var(--surface2);}
.detail-title{font-size:0.875rem;font-weight:700;line-height:1.3;}
.detail-sub{font-size:0.688rem;color:var(--text3);margin-top:3px;}
.detail-ids{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.id-chip{font-family:'JetBrains Mono',monospace;font-size:0.688rem;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);padding:2px 8px;border-radius:4px;}
.detail-close{float:right;font-size:0.75rem;color:var(--text3);cursor:pointer;margin-top:2px;}
.copy-row{padding:10px 14px;display:flex;gap:8px;}
.vendor-block{margin-bottom:10px;}
.vendor-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--surface2);border-radius:10px;cursor:pointer;user-select:none;}
.vendor-header.open{border-radius:10px 10px 0 0;border-bottom:1px solid var(--surface3);}
.vendor-name{font-size:0.813rem;font-weight:700;color:var(--text);}
.vendor-meta{font-size:0.563rem;color:var(--text3);margin-top:1px;}
.vendor-chevron{color:var(--text3);font-size:0.875rem;transition:transform 0.18s;flex-shrink:0;}
.vendor-chevron.open{transform:rotate(180deg);}
.vendor-body{display:none;background:var(--surface);border:1px solid var(--surface2);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.vendor-body.open{display:block;}
.cat-header{padding:6px 14px;background:var(--surface2);border-bottom:1px solid var(--surface3);}
.cat-name{font-size:0.5rem;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--text3);}
.item-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--surface2);gap:8px;}
.item-row:last-child{border-bottom:none;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:0.813rem;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-d365{font-family:'JetBrains Mono',monospace;font-size:0.563rem;color:var(--text3);margin-top:1px;}
.item-case{font-size:0.563rem;color:var(--text2);flex-shrink:0;}
.num-input{background:var(--surface2);border:1px solid var(--surface3);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.875rem;font-weight:600;text-align:center;padding:6px 4px;-moz-appearance:textfield;flex-shrink:0;}
.num-input::-webkit-inner-spin-button,.num-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.num-input:focus{outline:none;border-color:var(--accent);}
.num-input.has-value{border-color:var(--accent);color:var(--accent);}
.par-input{width:44px;color:var(--text2);}
.count-input{width:62px;}
.order-input{width:52px;}
.order-input.needs{color:var(--accent);border-color:var(--accent-border);}
.order-input.zero{color:var(--text3);}
.col-heads{display:flex;align-items:center;padding:3px 14px 5px;gap:8px;}
.col-head{font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);text-align:center;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:0.813rem;font-weight:700;cursor:pointer;}
.btn:active{opacity:0.75;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-secondary{background:var(--surface2);color:var(--text2);}
.btn-ghost{background:transparent;border:1px solid var(--surface3);color:var(--text2);}
.btn-full{width:100%;margin-top:10px;}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.day-pills{display:flex;gap:3px;flex-shrink:0;}
.day-pill{width:26px;height:22px;border-radius:4px;border:1.5px solid var(--surface3);background:var(--surface2);color:var(--text3);font-size:0.5rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;user-select:none;}
.day-pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.loading{text-align:center;padding:32px 16px;color:var(--text3);font-size:0.813rem;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:40px 16px;color:var(--text3);}
.empty-icon{font-size:2rem;margin-bottom:8px;}
.empty-msg{font-size:0.813rem;line-height:1.6;}
#toast{position:fixed;bottom:calc(var(--safe-bottom)+20px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);color:var(--text);font-size:0.813rem;font-weight:600;padding:9px 18px;border-radius:24px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="page">
  <a class="nav-back" href="index.html">&#8249; PiPa Hub</a>
  <div class="wordmark">Kitchen <span>Tool</span></div>
  <div class="wordmark-sub">EKP &middot; BOH Operations</div>

  <div class="outlet-toggle">
    <div class="outlet-btn active" id="ob-pipa"   onclick="setOutlet('pipa')">PiPa</div>
    <div class="outlet-btn"        id="ob-pronto" onclick="setOutlet('pronto')">Pronto</div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('lookup',this)">D365</div>
      <div class="tab"        onclick="switchTab('count',this)">Count</div>
      <div class="tab"        onclick="switchTab('orders',this)">Orders</div>
      <div class="tab"        onclick="switchTab('edt',this)">EDT</div>
    </div>
  </div>

  <!-- D365 LOOKUP -->
  <div class="panel active" id="panel-lookup">
    <div style="font-size:0.563rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;">Search D365 Products</div>
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input class="search-input" id="lookupQ" type="search" placeholder="D365 #, name&#8230;" oninput="dLookup(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="search-hint">Full catalog &mdash; not filtered by active recipes</div>
    <div class="results-box" id="lookupResults"></div>
    <div id="lookupDetail"></div>
  </div>

  <!-- COUNT -->
  <div class="panel" id="panel-count">
    <div class="stat-row" id="countStat"></div>
    <div id="countBody"><div class="loading"><span class="spinner"></span>Loading&hellip;</div></div>
    <button class="btn btn-primary btn-full" id="countSaveBtn" onclick="saveCount()" style="display:none;">&#9729; Save Count</button>
  </div>

  <!-- ORDERS -->
  <div class="panel" id="panel-orders">
    <div class="stat-row" id="orderStat"></div>
    <div class="col-heads" id="orderColHeads" style="display:none;">
      <div style="flex:1;"></div>
      <div class="col-head" style="width:30px;">Unit</div>
      <div class="col-head" style="width:44px;">Par</div>
      <div class="col-head" style="width:52px;">Order</div>
    </div>
    <div id="orderBody"><div class="loading"><span class="spinner"></span>Loading&hellip;</div></div>
    <div class="btn-row" id="orderBtns" style="display:none;">
      <button class="btn btn-primary" style="flex:1;" onclick="copyOrder()">&#128203; Copy Order</button>
      <button class="btn btn-secondary" style="flex:1;" onclick="exportCSV()">&#8675; Export CSV</button>
    </div>
  </div>

  <!-- EDT -->
  <div class="panel" id="panel-edt">
    <div class="stat-row" id="edtStat"></div>
    <div id="edtLegend" style="display:none;">
      <div style="display:flex;justify-content:flex-end;gap:3px;padding:0 14px 6px;">
        <div style="width:26px;font-size:0.5rem;text-align:center;color:var(--text3);font-weight:700;">M</div>
        <div style="width:26px;font-size:0.5rem;text-align:center;color:var(--text3);font-weight:700;">T</div>
        <div style="width:26px;font-size:0.5rem;text-align:center;color:var(--text3);font-weight:700;">W</div>
        <div style="width:26px;font-size:0.5rem;text-align:center;color:var(--text3);font-weight:700;">Th</div>
        <div style="width:26px;font-size:0.5rem;text-align:center;color:var(--text3);font-weight:700;">F</div>
        <div style="width:26px;font-size:0.5rem;text-align:center;color:var(--text3);font-weight:700;">Sa</div>
        <div style="width:26px;font-size:0.5rem;text-align:center;color:var(--text3);font-weight:700;">Su</div>
      </div>
    </div>
    <div id="edtBody"><div class="loading"><span class="spinner"></span>Loading&hellip;</div></div>
    <button class="btn btn-primary btn-full" id="edtSaveBtn" onclick="saveEDT()" style="display:none;">&#9729; Save EDT Schedule</button>
  </div>
</div>

<div id="toast"></div>

<script>
const SB_URL='https://fhbusipvtxjnwidlgpaa.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoYnVzaXB2dHhqbndpZGxncGFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjM5NTksImV4cCI6MjA5MDgzOTk1OX0.GwTqVB31Ewpwal9vkHKeBGeh9XuHOjfnQeV4OB_1rQE';
const EDT_DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];

function sbH(x){return Object.assign({'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},x||{});}
async function sbGet(p){const r=await fetch(SB_URL+'/rest/v1/'+p,{headers:sbH()});if(!r.ok)throw new Error('SB '+r.status+' /'+p);return r.json();}
async function sbPost(t,b){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:sbH({'Prefer':'return=representation'}),body:JSON.stringify(b)});if(!r.ok){const tx=await r.text();throw new Error('POST '+r.status+' '+tx);}return r.json();}
async function sbUpsert(t,b,c){const r=await fetch(SB_URL+'/rest/v1/'+t+'?on_conflict='+c,{method:'POST',headers:sbH({'Prefer':'return=representation,resolution=merge-duplicates'}),body:JSON.stringify(b)});if(!r.ok){const tx=await r.text();throw new Error('UPSERT '+r.status+' '+tx);}return r.json();}
async function sbDelete(p){await fetch(SB_URL+'/rest/v1/'+p,{method:'DELETE',headers:sbH()});}

function debounce(fn,ms){let t;return function(){const a=arguments;clearTimeout(t);t=setTimeout(function(){fn.apply(null,a);},ms);};}
function toast(msg,dur){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},dur||2200);}
function pad8(id){return id?String(id).padStart(8,'0'):'';}
function todayISO(){return new Date().toISOString().slice(0,10);}
function weekStart(){const d=new Date(),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));return mon.toISOString().slice(0,10);}
function copyText(txt,msg){if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){toast(msg||'Copied');});}else{const el=document.createElement('textarea');el.value=txt;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);toast(msg||'Copied');}}

// ── State ────────────────────────────────────────────────────────────
let outlet='pipa';
let activeTab='lookup';
let activeRecipes={};   // outlet → Set<recipe_number>
let orderItems={};      // outlet → [{vendor,category,d365_id,name,case_unit}]
let edtItems={};        // outlet → [{vendor,d365_id,name,case_unit}]
let countData={};       // d365_id → qty  (shared — same item same count regardless of outlet)
let parData={};         // d365_id → par  (shared)
let edtSched={};        // 'outlet|vendor|d365_id|DAY' → bool
let loaded={};          // flags to avoid redundant fetches

// ── Outlet / Tab ─────────────────────────────────────────────────────
function setOutlet(o){
  outlet=o;
  document.getElementById('ob-pipa').classList.toggle('active',o==='pipa');
  document.getElementById('ob-pronto').classList.toggle('active',o==='pronto');
  renderActiveTab();
}
function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  activeTab=id;
  renderActiveTab();
}
function renderActiveTab(){
  if(activeTab==='count')loadAndRenderCount();
  else if(activeTab==='orders')loadAndRenderOrders();
  else if(activeTab==='edt')loadAndRenderEDT();
}

// ── Data loaders (lazy, cached per outlet per session) ────────────────
async function ensureActiveRecipes(o){
  if(loaded['rec_'+o])return;
  const rows=await sbGet('kitchen_recipes?outlet=eq.'+o+'&select=recipe_number,active&limit=500');
  activeRecipes[o]=new Set(rows.filter(function(r){return r.active;}).map(function(r){return r.recipe_number;}));
  loaded['rec_'+o]=true;
}

async function ensureOrderItems(o){
  if(loaded['oi_'+o])return;
  await ensureActiveRecipes(o);
  const active=activeRecipes[o];
  if(!active.size){orderItems[o]=[];loaded['oi_'+o]=true;return;}
  // Step 1: get d365_ids that have at least one active recipe tag
  const nums=Array.from(active).join(',');
  const tags=await sbGet('kitchen_recipe_tags?outlet=eq.'+o+'&recipe_number=in.('+nums+')&select=d365_id&limit=2000');
  const d365s=[...new Set(tags.map(function(t){return t.d365_id;}))];
  if(!d365s.length){orderItems[o]=[];loaded['oi_'+o]=true;return;}
  // Step 2: fetch full item details, preserving sort_order from seed
  const items=await sbGet(
    'kitchen_order_items?outlet=eq.'+o+'&d365_id=in.('+d365s.join(',')+')'
    +'&active=eq.true&select=vendor,category,d365_id,name,case_unit,sort_order&order=sort_order.asc&limit=500'
  );
  orderItems[o]=items;
  loaded['oi_'+o]=true;
}

async function ensureEDTItems(o){
  if(loaded['edt_'+o])return;
  const rows=await sbGet('kitchen_edt_items?outlet=eq.'+o+'&active=eq.true&select=vendor,d365_id,name,case_unit,sort_order&order=sort_order.asc&limit=200');
  edtItems[o]=rows;
  loaded['edt_'+o]=true;
}

async function ensureCounts(){
  if(loaded['counts'])return;
  const rows=await sbGet('kitchen_count?count_date=eq.'+todayISO()+'&select=d365_id,qty&limit=1000');
  rows.forEach(function(c){countData[c.d365_id]=c.qty;});
  loaded['counts']=true;
}

async function ensurePars(){
  if(loaded['pars'])return;
  const rows=await sbGet('kitchen_pars?select=d365_id,par&limit=1000');
  rows.forEach(function(p){parData[p.d365_id]=p.par;});
  loaded['pars']=true;
}

async function ensureEDTSchedule(o){
  const k='sch_'+o;
  if(loaded[k])return;
  const ws=weekStart();
  const rows=await sbGet('kitchen_edt_schedule?week_start=eq.'+ws+'&outlet=eq.'+o+'&select=vendor,d365_id,order_day&limit=1000');
  rows.forEach(function(e){edtSched[o+'|'+e.vendor+'|'+e.d365_id+'|'+e.order_day]=true;});
  loaded[k]=true;
}

// ── COUNT tab ─────────────────────────────────────────────────────────
// Grouped: vendor block (collapsible) → category sub-header → items
// Count is shared (d365 only key), so switching outlet shows same counts
async function loadAndRenderCount(){
  document.getElementById('countSaveBtn').style.display='none';
  document.getElementById('countStat').innerHTML='';
  document.getElementById('countBody').innerHTML='<div class="loading"><span class="spinner"></span>Loading&hellip;</div>';
  try{
    await Promise.all([ensureOrderItems(outlet),ensureCounts()]);
    renderCount();
  }catch(e){
    document.getElementById('countBody').innerHTML='<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div class="empty-msg">'+e.message+'</div></div>';
  }
}

function renderCount(){
  const items=orderItems[outlet]||[];
  if(!items.length){
    document.getElementById('countBody').innerHTML='<div class="empty-state"><div class="empty-icon">&#128203;</div><div class="empty-msg">No active recipes for '+outlet.toUpperCase()+'.<br>Toggle recipes on in pipa-admin &rarr; Kitchen.</div></div>';
    document.getElementById('countSaveBtn').style.display='none';
    document.getElementById('countStat').innerHTML='';
    return;
  }
  document.getElementById('countSaveBtn').style.display='';
  // Group vendor → category → items
  const byV={};
  items.forEach(function(item){
    if(!byV[item.vendor])byV[item.vendor]={};
    const c=item.category||'Other';
    if(!byV[item.vendor][c])byV[item.vendor][c]=[];
    byV[item.vendor][c].push(item);
  });
  const entered=items.filter(function(i){return countData[i.d365_id]!==undefined;}).length;
  document.getElementById('countStat').innerHTML=
    '<span class="stat stat-blue">'+items.length+' items</span>'+
    '<span class="stat stat-'+(entered===items.length?'green':'orange')+'">'+entered+' entered</span>'+
    '<span class="stat stat-blue">'+todayISO()+'</span>';
  let html='';
  const vendors=Object.keys(byV);
  vendors.forEach(function(vendor,vi){
    const cats=byV[vendor];
    const total=Object.values(cats).reduce(function(s,a){return s+a.length;},0);
    const open=vi<2;
    html+='<div class="vendor-block">'
      +'<div class="vendor-header'+(open?' open':'')+'" onclick="toggleVendor(this)">'
      +'<div><div class="vendor-name">'+vendor+'</div><div class="vendor-meta">'+total+' items</div></div>'
      +'<span class="vendor-chevron'+(open?' open':'')+'">&#8964;</span></div>'
      +'<div class="vendor-body'+(open?' open':'')+'">';
    Object.keys(cats).forEach(function(cat){
      html+='<div class="cat-header"><div class="cat-name">'+cat+'</div></div>';
      cats[cat].forEach(function(item){
        const val=countData[item.d365_id]!==undefined?countData[item.d365_id]:'';
        html+='<div class="item-row">'
          +'<div class="item-info"><div class="item-name">'+item.name+'</div><div class="item-d365">'+pad8(item.d365_id)+'</div></div>'
          +'<div class="item-case">'+item.case_unit+'</div>'
          +'<input class="num-input count-input'+(val!==''?' has-value':'')+'" type="number" min="0" step="any" inputmode="decimal" placeholder="&mdash;" value="'+(val!==''?val:'')+'" onchange="setCount(\''+item.d365_id+'\',this)" onclick="this.select()">'
          +'</div>';
      });
    });
    html+='</div></div>';
  });
  document.getElementById('countBody').innerHTML=html;
}

function toggleVendor(hdr){
  const open=hdr.classList.toggle('open');
  hdr.querySelector('.vendor-chevron').classList.toggle('open',open);
  hdr.nextElementSibling.classList.toggle('open',open);
}

function setCount(d365,el){
  const v=parseFloat(el.value);
  if(!isNaN(v)&&v>=0){countData[d365]=v;el.classList.add('has-value');}
  else{delete countData[d365];el.classList.remove('has-value');}
  const items=orderItems[outlet]||[];
  const entered=items.filter(function(i){return countData[i.d365_id]!==undefined;}).length;
  document.getElementById('countStat').innerHTML=
    '<span class="stat stat-blue">'+items.length+' items</span>'+
    '<span class="stat stat-'+(entered===items.length?'green':'orange')+'">'+entered+' entered</span>'+
    '<span class="stat stat-blue">'+todayISO()+'</span>';
}

async function saveCount(){
  const today=todayISO();
  const rows=Object.keys(countData).map(function(d){return{count_date:today,d365_id:d,qty:countData[d]};});
  if(!rows.length){toast('No counts entered');return;}
  const btn=document.getElementById('countSaveBtn');btn.textContent='Saving\u2026';
  try{
    await sbUpsert('kitchen_count',rows,'count_date,d365_id');
    // mirror to inventory_trend for Trend tab in pipa-ops
    const tr=rows.map(function(r){return{snap_date:r.count_date,d365:r.d365_id,item_name:'',category:'KITCHEN',count:r.qty};});
    await sbUpsert('inventory_trend',tr,'snap_date,d365');
    toast('Saved '+rows.length+' counts \u2713');
  }catch(e){toast('Error: '+e.message);}
  finally{btn.textContent='\u2601 Save Count';}
}

// ── ORDERS tab ────────────────────────────────────────────────────────
// Same item list as Count, grouped by vendor only.
// Par is editable (saves to kitchen_pars), order qty pre-filled = max(0, par-count).
async function loadAndRenderOrders(){
  document.getElementById('orderBtns').style.display='none';
  document.getElementById('orderColHeads').style.display='none';
  document.getElementById('orderStat').innerHTML='';
  document.getElementById('orderBody').innerHTML='<div class="loading"><span class="spinner"></span>Loading&hellip;</div>';
  try{
    await Promise.all([ensureOrderItems(outlet),ensureCounts(),ensurePars()]);
    renderOrders();
  }catch(e){
    document.getElementById('orderBody').innerHTML='<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div class="empty-msg">'+e.message+'</div></div>';
  }
}

function renderOrders(){
  const items=orderItems[outlet]||[];
  if(!items.length){
    document.getElementById('orderBody').innerHTML='<div class="empty-state"><div class="empty-icon">&#128230;</div><div class="empty-msg">No active recipes for '+outlet.toUpperCase()+'.<br>Toggle recipes on in pipa-admin &rarr; Kitchen.</div></div>';
    document.getElementById('orderBtns').style.display='none';
    document.getElementById('orderColHeads').style.display='none';
    document.getElementById('orderStat').innerHTML='';
    return;
  }
  document.getElementById('orderBtns').style.display='';
  document.getElementById('orderColHeads').style.display='';
  const byV={};
  items.forEach(function(item){if(!byV[item.vendor])byV[item.vendor]=[];byV[item.vendor].push(item);});
  const toOrder=items.filter(function(i){
    const par=parData[i.d365_id],cnt=countData[i.d365_id];
    return par!==undefined&&cnt!==undefined&&Math.max(0,par-cnt)>0;
  }).length;
  document.getElementById('orderStat').innerHTML=
    '<span class="stat stat-blue">'+items.length+' items</span>'+
    '<span class="stat stat-'+(toOrder>0?'orange':'green')+'">'+toOrder+' to order</span>';
  let html='';
  Object.keys(byV).forEach(function(vendor,vi){
    const vitems=byV[vendor];
    const open=vi<2;
    html+='<div class="vendor-block">'
      +'<div class="vendor-header'+(open?' open':'')+'" onclick="toggleVendor(this)">'
      +'<div><div class="vendor-name">'+vendor+'</div><div class="vendor-meta">'+vitems.length+' items</div></div>'
      +'<span class="vendor-chevron'+(open?' open':'')+'">&#8964;</span></div>'
      +'<div class="vendor-body'+(open?' open':'')+'">';
    vitems.forEach(function(item){
      const cnt=countData[item.d365_id]!==undefined?countData[item.d365_id]:null;
      const par=parData[item.d365_id]!==undefined?parData[item.d365_id]:null;
      const sug=par!==null&&cnt!==null?Math.max(0,par-cnt):null;
      const needs=sug!==null&&sug>0;
      html+='<div class="item-row">'
        +'<div class="item-info"><div class="item-name">'+item.name+'</div>'
        +'<div class="item-d365">'+pad8(item.d365_id)+(cnt!==null?' &middot; on hand: '+cnt:'')+'</div></div>'
        +'<div class="item-case">'+item.case_unit+'</div>'
        +'<input class="num-input par-input" type="number" min="0" step="any" inputmode="decimal" placeholder="par" value="'+(par!==null?par:'')+'" id="par_'+item.d365_id+'" onchange="setPar(\''+item.d365_id+'\',this)" onclick="this.select()">'
        +'<input class="num-input order-input '+(needs?'needs':'zero')+'" type="number" min="0" step="any" inputmode="decimal" placeholder="&mdash;" value="'+(sug!==null?sug:'')+'" id="ord_'+item.d365_id+'" onchange="setOrdQty(\''+item.d365_id+'\',this)" onclick="this.select()">'
        +'</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('orderBody').innerHTML=html;
}

function setPar(d365,el){
  const v=parseFloat(el.value);
  if(!isNaN(v)&&v>=0){
    parData[d365]=v;
    const cnt=countData[d365]!==undefined?countData[d365]:null;
    if(cnt!==null){
      const sug=Math.max(0,v-cnt);
      const ordEl=document.getElementById('ord_'+d365);
      if(ordEl){ordEl.value=sug;ordEl.className='num-input order-input '+(sug>0?'needs':'zero');}
    }
    clearTimeout(el._t);
    el._t=setTimeout(function(){sbUpsert('kitchen_pars',[{d365_id:d365,par:v}],'d365_id').catch(function(){});},1200);
  }
}

function setOrdQty(d365,el){
  const v=parseFloat(el.value);
  el.className='num-input order-input '+(!isNaN(v)&&v>0?'needs':'zero');
}

function getOrdQty(d365){
  const el=document.getElementById('ord_'+d365);
  if(!el)return null;
  const v=parseFloat(el.value);
  return(!isNaN(v)&&v>=0)?v:null;
}

function copyOrder(){
  const items=orderItems[outlet]||[];
  const byV={};
  items.forEach(function(item){
    const qty=getOrdQty(item.d365_id);
    if(qty===null||qty<=0)return;
    if(!byV[item.vendor])byV[item.vendor]=[];
    byV[item.vendor].push(qty+' '+item.case_unit+' \u2014 '+item.name+' ('+pad8(item.d365_id)+')');
  });
  const vks=Object.keys(byV);
  if(!vks.length){toast('Nothing to order');return;}
  let txt='EATALY KOP \u00b7 '+outlet.toUpperCase()+' KITCHEN ORDER \u00b7 '+todayISO()+'\n\n';
  vks.forEach(function(v){txt+=v+'\n';byV[v].forEach(function(l){txt+='  '+l+'\n';});txt+='\n';});
  if(navigator.share){navigator.share({text:txt}).catch(function(){});}
  else{copyText(txt,'Order copied \u2713');}
}

function exportCSV(){
  const items=orderItems[outlet]||[];
  let csv='VENDOR,D365 ID,ITEM NAME,UNIT,CATEGORY,PAR,ON HAND,ORDER QTY\n';
  items.forEach(function(item){
    const par=parData[item.d365_id]!==undefined?parData[item.d365_id]:'';
    const cnt=countData[item.d365_id]!==undefined?countData[item.d365_id]:'';
    const qty=getOrdQty(item.d365_id)!==null?getOrdQty(item.d365_id):'';
    csv+='"'+item.vendor+'","'+pad8(item.d365_id)+'","'+item.name+'","'+item.case_unit+'","'+(item.category||'')+'","'+par+'","'+cnt+'","'+qty+'"\n';
  });
  const b=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='EKP_Kitchen_'+outlet.toUpperCase()+'_'+todayISO()+'.csv';a.click();
  toast('CSV exported \u2713');
}

// ── EDT tab ───────────────────────────────────────────────────────────
// outlet+vendor = siloed silo. PiPa:EDT-CK != Pronto:EDT-CK.
// Day pills saved weekly to kitchen_edt_schedule.
async function loadAndRenderEDT(){
  document.getElementById('edtSaveBtn').style.display='none';
  document.getElementById('edtLegend').style.display='none';
  document.getElementById('edtStat').innerHTML='';
  document.getElementById('edtBody').innerHTML='<div class="loading"><span class="spinner"></span>Loading&hellip;</div>';
  try{
    await Promise.all([ensureEDTItems(outlet),ensureEDTSchedule(outlet)]);
    renderEDT();
  }catch(e){
    document.getElementById('edtBody').innerHTML='<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><div class="empty-msg">'+e.message+'</div></div>';
  }
}

function renderEDT(){
  const items=edtItems[outlet]||[];
  if(!items.length){
    document.getElementById('edtBody').innerHTML='<div class="empty-state"><div class="empty-icon">&#128197;</div><div class="empty-msg">No active EDT items for '+outlet.toUpperCase()+'.<br>Toggle items on in pipa-admin &rarr; Kitchen.</div></div>';
    document.getElementById('edtSaveBtn').style.display='none';
    document.getElementById('edtLegend').style.display='none';
    document.getElementById('edtStat').innerHTML='';
    return;
  }
  document.getElementById('edtSaveBtn').style.display='';
  document.getElementById('edtLegend').style.display='';
  const byV={};
  items.forEach(function(item){if(!byV[item.vendor])byV[item.vendor]=[];byV[item.vendor].push(item);});
  const slots=Object.keys(edtSched).filter(function(k){return k.startsWith(outlet+'|')&&edtSched[k];}).length;
  document.getElementById('edtStat').innerHTML=
    '<span class="stat stat-blue">'+items.length+' items</span>'+
    '<span class="stat stat-orange">'+slots+' day-slots</span>'+
    '<span class="stat stat-blue">wk '+weekStart()+'</span>';
  let html='';
  Object.keys(byV).forEach(function(vendor){
    const vitems=byV[vendor];
    html+='<div class="vendor-block">'
      +'<div class="vendor-header open" onclick="toggleVendor(this)">'
      +'<div><div class="vendor-name">'+vendor+'</div><div class="vendor-meta" style="color:var(--accent);">'+outlet.toUpperCase()+'</div></div>'
      +'<span class="vendor-chevron open">&#8964;</span></div>'
      +'<div class="vendor-body open">';
    vitems.forEach(function(item){
      html+='<div class="item-row">'
        +'<div class="item-info"><div class="item-name">'+item.name+'</div><div class="item-d365">'+pad8(item.d365_id)+' &middot; '+item.case_unit+'</div></div>'
        +'<div class="day-pills">';
      EDT_DAYS.forEach(function(day){
        const key=outlet+'|'+item.vendor+'|'+item.d365_id+'|'+day;
        html+='<div class="day-pill'+(edtSched[key]?' on':'')+'" onclick="toggleDay(this,\''+key+'\')">'+day[0]+'</div>';
      });
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('edtBody').innerHTML=html;
}

function toggleDay(el,key){
  edtSched[key]=!edtSched[key];
  el.classList.toggle('on',!!edtSched[key]);
  const slots=Object.keys(edtSched).filter(function(k){return k.startsWith(outlet+'|')&&edtSched[k];}).length;
  const statEl=document.getElementById('edtStat');
  statEl.innerHTML=statEl.innerHTML.replace(/<span class="stat stat-orange">.*?<\/span>/,'<span class="stat stat-orange">'+slots+' day-slots</span>');
}

async function saveEDT(){
  const ws=weekStart();
  const rows=Object.keys(edtSched).filter(function(k){return edtSched[k]&&k.startsWith(outlet+'|');}).map(function(k){
    const p=k.split('|'); // [outlet, vendor, d365_id, day]
    return{week_start:ws,outlet:p[0],vendor:p[1],d365_id:p[2],order_day:p[3]};
  });
  const btn=document.getElementById('edtSaveBtn');btn.textContent='Saving\u2026';
  try{
    await sbDelete('kitchen_edt_schedule?week_start=eq.'+ws+'&outlet=eq.'+outlet);
    if(rows.length)await sbPost('kitchen_edt_schedule',rows);
    toast('EDT saved ('+rows.length+' day-slots) \u2713');
  }catch(e){toast('Error: '+e.message);}
  finally{btn.textContent='\u2601 Save EDT Schedule';}
}

// ── D365 LOOKUP ───────────────────────────────────────────────────────
const dLookup=debounce(runLookup,300);
async function runLookup(val){
  const res=document.getElementById('lookupResults');
  val=(val||'').trim();
  if(val.length<2){res.style.display='none';res.innerHTML='';return;}
  res.style.display='block';res.innerHTML='<div class="no-results"><span class="spinner"></span>Searching\u2026</div>';
  try{
    const s=val.replace(/^0+/,'')||'0';
    let q=/^\d+$/.test(s)
      ?'kitchen_products?or=(d365_id.eq.'+encodeURIComponent(val)+',d365_id.eq.'+encodeURIComponent(s)+',adaco_id.eq.'+encodeURIComponent(val)+',adaco_id.eq.'+encodeURIComponent(s)+')&select=d365_id,adaco_id,name,vendor_name,macrofamily,purchase_unit&limit=40&order=name'
      :'kitchen_products?name=ilike.'+encodeURIComponent('*'+val+'*')+'&select=d365_id,adaco_id,name,vendor_name,macrofamily,purchase_unit&limit=40&order=name';
    const data=await sbGet(q);
    if(!data.length){res.innerHTML='<div class="no-results">No results for &ldquo;'+val+'&rdquo;</div>';return;}
    res.innerHTML=data.map(function(r){
      const safe=JSON.stringify(r).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return'<div class="result-row" onclick="showDetail(\''+safe+'\')">'
        +'<div class="result-name">'+r.name+'</div>'
        +'<div class="result-meta">'
        +'<span class="result-id">'+pad8(r.d365_id)+'</span>'
        +(r.adaco_id?'<span class="result-id" style="color:var(--text2);">Adaco '+r.adaco_id+'</span>':'')
        +(r.macrofamily?'<span class="result-tag">'+r.macrofamily+'</span>':'')
        +(r.vendor_name?'<span class="result-vendor">'+r.vendor_name+'</span>':'')
        +'</div></div>';
    }).join('');
  }catch(e){res.innerHTML='<div class="no-results">Error: '+e.message+'</div>';}
}

function showDetail(itemStr){
  const item=JSON.parse(itemStr);
  document.getElementById('lookupResults').style.display='none';
  document.getElementById('lookupQ').value='';
  document.getElementById('lookupDetail').innerHTML=
    '<div class="detail-card">'
    +'<div class="detail-header">'
    +'<span class="detail-close" onclick="document.getElementById(\'lookupDetail\').innerHTML=\'\'">&#10005;</span>'
    +'<div class="detail-title">'+item.name+'</div>'
    +'<div class="detail-sub">'+(item.vendor_name||'No vendor')+(item.macrofamily?' &middot; '+item.macrofamily:'')+'</div>'
    +'<div class="detail-ids"><span class="id-chip">D365 '+pad8(item.d365_id)+'</span>'
    +(item.adaco_id?'<span class="id-chip" style="background:var(--surface2);border-color:var(--surface3);color:var(--text2);">Adaco '+item.adaco_id+'</span>':'')
    +'</div>'
    +(item.purchase_unit?'<div style="margin-top:6px;font-size:0.688rem;color:var(--text3);">Order unit: '+item.purchase_unit+'</div>':'')
    +'</div>'
    +'<div class="copy-row">'
    +'<button class="btn btn-secondary" style="flex:1;font-size:0.75rem;" onclick="copyText(\''+pad8(item.d365_id)+'\',\'D365 # copied\')">Copy D365 #</button>'
    +(item.adaco_id?'<button class="btn btn-ghost" style="flex:1;font-size:0.75rem;" onclick="copyText(\''+item.adaco_id+'\',\'Adaco ID copied\')">Copy Adaco ID</button>':'')
    +'</div></div>';
}
