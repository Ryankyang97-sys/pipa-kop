<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Manager">
<meta name="theme-color" content="#3B0D14">
<title>PiPa KOP — Manager</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#3B0D14;--surface:#501828;--surface2:#62202E;--surface3:#7A2E3C;
  --text:#F5EDE8;--text2:#C4A49A;--text3:#8A6058;
  --accent:#8B4A44;--accent-bright:#A85A52;--accent-dim:rgba(139,74,68,0.3);
  --nav-bg:#F5EDE8;--nav-border:rgba(105,57,53,0.2);--nav-active:#693935;--nav-active-bg:rgba(105,57,53,0.1);
  --green:#1E5C38;--green-dim:rgba(30,92,56,0.25);--green-bright:#38966A;
  --red-dim:rgba(180,30,30,0.25);--red-bright:#E05050;
  --yellow-dim:rgba(200,165,20,0.2);--yellow-bright:#D4A830;
  --blue-dim:rgba(50,100,160,0.25);--blue-bright:#7AB0D8;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html{min-height:100vh;background:#3B0D14;}
html,body{font-family:'DM Sans',sans-serif;background:#3B0D14;color:var(--text);height:100%;overflow:hidden;font-size:100%;-webkit-text-size-adjust:none;}

/* PIN SCREEN */
.pin-screen{position:fixed;inset:0;background:#3B0D14;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.pin-logo{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text3);margin-bottom:8px;}
.pin-title{font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.pin-sub{font-size:0.813rem;color:var(--text2);margin-bottom:36px;}
.pin-dots{display:flex;gap:14px;margin-bottom:32px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--surface3);transition:background 0.15s;}
.pin-dot.filled{background:var(--text);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.pin-btn{height:60px;border-radius:var(--radius);background:var(--surface);border:none;color:var(--text);font-size:1.25rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.1s;}
.pin-btn:active{background:var(--surface3);}
.pin-btn.del{font-size:1rem;color:var(--text2);}
.pin-error{font-size:0.813rem;color:var(--red-bright);margin-top:16px;opacity:0;transition:opacity 0.2s;}
.pin-error.show{opacity:1;}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;padding:calc(var(--safe-top) + 10px) 16px 0;background:var(--bg);border-bottom:1px solid var(--surface3);}
.header-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;}
.header-title{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);}
.header-badge{font-size:0.688rem;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--surface3);color:var(--text2);}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:6px 4px calc(var(--safe-bottom) + 6px);background:var(--nav-bg);border-top:1px solid var(--nav-border);display:flex;gap:2px;}
.bottom-nav::after{content:"";position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom,0px);background:var(--nav-bg);z-index:99;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border-radius:10px;cursor:pointer;color:var(--nav-active);opacity:0.4;font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;transition:all 0.15s;}
.nav-tab .nav-icon{font-size:1.125rem;line-height:1;}
.nav-tab.active{opacity:1;background:var(--nav-active-bg);}

/* SCROLL */
.scroll-area{position:fixed;top:calc(var(--safe-top) + 52px);bottom:calc(var(--safe-bottom) + 60px);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 24px;background:#3B0D14;}
.view{display:none;background:#3B0D14;}.view.active{display:block;}

/* CARDS & FORMS */
.card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:8px;}
.section-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:0 2px 8px;margin-top:18px;}
.section-label:first-child{margin-top:0;}
.form-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);display:block;margin-bottom:6px;}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.875rem;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent-bright);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text3);}
.form-select option{background:var(--surface2);}
.form-textarea{resize:none;line-height:1.5;}
.form-group{margin-bottom:12px;}
.btn-primary{width:100%;padding:13px;border-radius:var(--radius);background:var(--surface3);color:var(--text);border:1.5px solid var(--surface3);font-size:0.875rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-primary:active{opacity:0.8;}
.btn-sm{padding:6px 12px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);border:none;font-size:0.688rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-approve{background:var(--green-dim);color:var(--green-bright);border:1px solid var(--green);}
.btn-flag{background:var(--red-dim);color:var(--red-bright);border:1px solid var(--red-bright);}

/* ALERT BADGE */
.alert-badge{display:inline-flex;padding:3px 8px;border-radius:4px;font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.badge-alert{background:rgba(180,80,0,0.3);color:#E08030;}
.badge-info{background:var(--surface3);color:var(--text2);}
.badge-ops{background:var(--blue-dim);color:var(--blue-bright);}
.badge-86{background:var(--red-dim);color:var(--red-bright);}
.badge-new{background:var(--green-dim);color:var(--green-bright);}
.badge-spec{background:var(--accent-dim);color:var(--accent-bright);}

/* SUBMISSION ROWS */
.sub-row{background:var(--surface);border-radius:var(--radius);padding:12px;margin-bottom:6px;border-left:3px solid var(--surface3);}
.sub-row.approved{border-left-color:var(--green);}
.sub-row.flagged{border-left-color:var(--red-bright);}
.sub-name{font-size:0.844rem;font-weight:600;color:var(--text);}
.sub-meta{font-size:0.688rem;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.sub-actions{display:flex;gap:6px;margin-top:10px;}
.sub-note{font-size:0.813rem;color:var(--text2);margin-top:8px;padding:8px;background:var(--surface2);border-radius:var(--radius-sm);line-height:1.5;}

/* SCRATCHPAD */
.scratch-item{background:var(--surface);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.scratch-text{font-size:0.844rem;color:var(--text);flex:1;line-height:1.5;}
.scratch-meta{font-size:0.625rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:4px;}
.scratch-del{background:none;border:none;color:var(--text3);font-size:1.25rem;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}

/* EMPTY */
.empty-state{text-align:center;padding:40px 24px;color:var(--text3);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.empty-text{font-size:0.813rem;line-height:1.6;}

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top) + 64px);left:50%;transform:translateX(-50%) translateY(-14px);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:0.813rem;font-weight:600;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">PiPa KOP</div>
  <div class="pin-title">Manager Access</div>
  <div class="pin-sub">Enter your PIN to continue</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinPress('')"></button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">&#x232B;</button>
  </div>
  <div class="pin-error" id="pinError">Incorrect PIN</div>
</div>

<div id="app" style="display:none;">

// ── PIN ──────────────────────────────────────────────────────────
var pinEntry = '';
function pinPress(d) {
  if (!d || pinEntry.length >= 4) return;
  pinEntry += d;
  document.getElementById('dot' + (pinEntry.length-1)).classList.add('filled');
  if (pinEntry.length === 4) setTimeout(checkPin, 100);
}
function pinDel() {
  if (!pinEntry.length) return;
  pinEntry = pinEntry.slice(0,-1);
  document.getElementById('dot' + pinEntry.length).classList.remove('filled');
}
function checkPin() {
  // Fetch live PIN from Supabase each time (so changes take effect immediately)
  supa.from('app_settings').select('value').eq('key', 'manager_pin').single()
    .then(function(r) {
      var currentPIN = (r.data && r.data.value) ? r.data.value : MANAGER_PIN;
      if (pinEntry === currentPIN) {
        MANAGER_PIN = currentPIN; // cache it
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
        initManagerRealtime();
      } else {
        document.getElementById('pinError').classList.add('show');
        pinEntry = '';
        [0,1,2,3].forEach(function(i){ document.getElementById('dot'+i).classList.remove('filled'); });
        setTimeout(function(){ document.getElementById('pinError').classList.remove('show'); }, 1500);
      }
    })
    .catch(function() {
      // Fallback to hardcoded if Supabase unreachable
      if (pinEntry === MANAGER_PIN) {
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
        initManagerRealtime();
      } else {
        document.getElementById('pinError').classList.add('show');
        pinEntry = '';
        [0,1,2,3].forEach(function(i){ document.getElementById('dot'+i).classList.remove('filled'); });
        setTimeout(function(){ document.getElementById('pinError').classList.remove('show'); }, 1500);
      }
    });
}

// ── APP ──────────────────────────────────────────────────────────
function initApp() {
  var time = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('shiftBadge').textContent = time;
  switchView('shift');
}

function switchView(v) {
  document.querySelectorAll('.view').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(x){x.classList.remove('active');});
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  var renders = {shift:renderShift, alerts:renderAlerts, submissions:renderSubmissions, scratch:renderScratch};
  if (renders[v]) renders[v]();
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2200);
}

// ── SHIFT OVERVIEW ───────────────────────────────────────────────
function renderShift() {
  var el = document.getElementById('view-shift');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4E1;</div><div class="empty-text">Loading shift data...</div></div>';

  Promise.all([
    supa.from('checklist_completions').select('*').eq('shift_date', TODAY),
    supa.from('waste_log').select('*').eq('shift_date', TODAY),
    supa.from('bottle_log').select('*').eq('shift_date', TODAY),
    supa.from('pull_flags').select('*').eq('shift_date', TODAY),
    supa.from('collateral_requests').select('*').eq('shift_date', TODAY),
  ]).then(function(results) {
    var checklists = results[0].data || [];
    var waste      = results[1].data || [];
    var bottles    = results[2].data || [];
    var pulls      = results[3].data || [];
    var collat     = results[4].data || [];

    var eightySixd = pulls.filter(function(p){return p.flag_type==='86';});
    var needs      = pulls.filter(function(p){return p.flag_type==='need';});

    var clHTML = checklists.length ? checklists.map(function(c) {
      var pct = c.total ? Math.round((c.done/c.total)*100) : 0;
      var color = c.missed > 0 ? 'var(--yellow-bright)' : 'var(--green-bright)';
      return '<div class="card">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
          '<div style="font-size:0.844rem;font-weight:700;">' + (c.shift_type==='am'?'AM Opening':'PM Closing') + '</div>' +
          '<div style="font-size:0.75rem;font-weight:700;color:'+color+';">' + c.done + '/' + c.total + ' complete</div>' +
        '</div>' +
        (c.missed > 0 ? '<div style="font-size:0.75rem;color:var(--yellow-bright);">&#x26A0; ' + c.missed + ' items not completed</div>' : '<div style="font-size:0.75rem;color:var(--green-bright);">&#x2713; All items complete</div>') +
        '<div style="font-size:0.625rem;color:var(--text3);font-family:monospace;margin-top:4px;">' + new Date(c.completed_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) + '</div>' +
      '</div>';
    }).join('') : '<div class="card" style="color:var(--text3);font-size:0.813rem;">No checklists completed yet.</div>';

    var statCards =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;">' +
        statCard('&#x1F5D1;', waste.length, 'Waste Entries') +
        statCard('&#x1F377;', bottles.length, 'Open Bottles') +
        statCard('&#x1F6AB;', eightySixd.length, "86'd Items") +
        statCard('&#x1F4CB;', collat.length, 'Requests') +
      '</div>';

    var s86HTML = '';
    if (eightySixd.length) {
      var clearAllBtn =
        '<button onclick="clearAll86s()" ' +
        'style="font-size:0.688rem;font-weight:700;padding:4px 10px;border-radius:6px;' +
        'background:var(--red-dim);color:var(--red-bright);border:none;cursor:pointer;' +
        'font-family:\'DM Sans\',sans-serif;">Clear All</button>';
      s86HTML =
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;margin-top:18px;">' +
          '<div class="section-label" style="margin:0;">86\'d Items</div>' +
          clearAllBtn +
        '</div>' +
        eightySixd.map(function(p) {
          var itemId = String(p.item_id || p.id || '').replace(/'/g,'');
          return '<div class="sub-row flagged" style="display:flex;align-items:center;justify-content:space-between;">' +
            '<div class="sub-name">' + p.item_name + '</div>' +
            '<button data-itemid="' + itemId + '" onclick="clear86(this.dataset.itemid)" ' +
              'style="font-size:0.688rem;font-weight:700;padding:3px 9px;border-radius:5px;' +
              'background:var(--surface2);color:var(--text3);border:none;cursor:pointer;' +
              'font-family:\'DM Sans\',sans-serif;flex-shrink:0;margin-left:8px;">Clear</button>' +
          '</div>';
        }).join('');
    }

    el.innerHTML =
      '<div class="section-label">Today\'s Overview</div>' +
      statCards +
      '<div class="section-label">Checklist Status</div>' +
      clHTML +
      s86HTML;
  });
}

function clear86(itemId) {
  // Try delete by item_id first, fall back to clearing all matching item_name
  supa.from('pull_flags').delete()
    .eq('item_id', itemId).eq('flag_type', '86')
    .then(function(r) {
      if (r && r.error) { toast('Delete failed: ' + r.error.message); return; }
      toast('86 cleared');
      renderShiftOverview();
    })
    .catch(function(e) { toast('Error: ' + (e.message || e)); });
}

function clearAll86s() {
  supa.from('pull_flags').delete().eq('flag_type', '86')
    .then(function(r) {
      if (r && r.error) { toast('Delete failed: ' + r.error.message); return; }
      toast('All 86s cleared');
      renderShiftOverview();
    })
    .catch(function(e) { toast('Error: ' + (e.message || e)); });
}

function statCard(icon, count, label) {
  return '<div class="card" style="text-align:center;padding:16px 8px;">' +
    '<div style="font-size:1.5rem;margin-bottom:4px;">' + icon + '</div>' +
    '<div style="font-size:1.25rem;font-weight:700;color:var(--text);">' + count + '</div>' +
    '<div style="font-size:0.625rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;">' + label + '</div>' +
  '</div>';
}

// ── ALERTS COMPOSER ──────────────────────────────────────────────
function renderAlerts() {
  var el = document.getElementById('view-alerts');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4E1;</div><div class="empty-text">Loading...</div></div>';

  supa.from('updates').select('*').not('expires_at','is',null).order('created_at',{ascending:false}).limit(20)
    .then(function(result) {
      var data = result.data || [];
      var now  = new Date();
      var active  = data.filter(function(u){ return new Date(u.expires_at) > now; });
      var expired = data.filter(function(u){ return new Date(u.expires_at) <= now; });

      var durationOpts = [
        {val:15,  label:'15 min'},
        {val:30,  label:'30 min'},
        {val:60,  label:'1 hour'},
        {val:120, label:'2 hours'},
        {val:240, label:'4 hours'},
        {val:480, label:'8 hours'},
      ].map(function(o){ return '<option value="'+o.val+'">'+o.label+'</option>'; }).join('');

      var activeFeed = active.length ? active.map(function(u) {
        var exp = new Date(u.expires_at);
        var mins = Math.round((exp - now) / 60000);
        var timeLeft = mins >= 60 ? Math.round(mins/60) + 'h left' : mins + 'min left';
        return '<div class="card" style="border-left:3px solid var(--yellow-bright);">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
            '<span class="alert-badge badge-alert">ALERT · ' + timeLeft + '</span>' +
            '<button onclick="deleteAlert('+u.id+')" style="background:none;border:none;color:var(--text3);font-size:1.25rem;cursor:pointer;">&times;</button>' +
          '</div>' +
          '<div style="font-size:0.844rem;color:var(--text);line-height:1.5;">' + u.text + '</div>' +
        '</div>';
      }).join('') : '<div class="card" style="color:var(--text3);font-size:0.813rem;">No active alerts.</div>';

      el.innerHTML =
        '<div class="section-label">Post Alert</div>' +
        '<div class="card">' +
          '<div class="form-group">' +
            '<label class="form-label">Duration</label>' +
            '<select id="alert-dur" class="form-select">' + durationOpts + '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Message</label>' +
            '<textarea id="alert-text" class="form-textarea" rows="3" placeholder="e.g. Kitchen is running behind — hold large parties for 30 min"></textarea>' +
          '</div>' +
          '<button class="btn-primary" onclick="postAlert()">Post Alert to Team</button>' +
        '</div>' +
        '<div class="section-label">Active Alerts</div>' +
        activeFeed;
    });
}

function postAlert() {
  var text = document.getElementById('alert-text').value.trim();
  var mins = parseInt(document.getElementById('alert-dur').value);
  if (!text) { toast('Write a message first'); return; }
  var expiresAt = new Date(Date.now() + mins * 60000).toISOString();
  supa.from('updates').insert({tag:'ops', text:text, date:TODAY, published:true, expires_at:expiresAt})
    .then(function(r) {
      if (r.error) { toast('Error: ' + r.error.message); return; }
      toast('Alert posted');
      renderAlerts();
    });
}

function deleteAlert(id) {
  if (!confirm('Remove this alert?')) return;
  supa.from('updates').delete().eq('id', id)
    .then(function(r){ if (!r.error) { toast('Alert removed'); renderAlerts(); } });
}

// ── SUBMISSIONS INBOX ────────────────────────────────────────────
function renderSubmissions() {
  var el = document.getElementById('view-submissions');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4E1;</div><div class="empty-text">Loading...</div></div>';

  Promise.all([
    supa.from('waste_log').select('*').eq('shift_date', TODAY).order('created_at',{ascending:false}),
    supa.from('bottle_log').select('*').eq('shift_date', TODAY).order('created_at',{ascending:false}),
    supa.from('collateral_requests').select('*').eq('shift_date', TODAY).order('created_at',{ascending:false}),
    supa.from('approvals').select('*'),
  ]).then(function(results) {
    var waste   = results[0].data || [];
    var bottles = results[1].data || [];
    var collat  = results[2].data || [];
    var approvals = results[3].data || [];

    function getApproval(type, id) {
      return approvals.find(function(a){ return a.record_type===type && a.record_id===id; });
    }

    function subRow(type, id, title, meta) {
      var appr = getApproval(type, id);
      var cls  = appr ? (appr.status==='approved' ? ' approved' : ' flagged') : '';
      return '<div class="sub-row'+cls+'">' +
        '<div class="sub-name">'+title+'</div>' +
        '<div class="sub-meta">'+meta+'</div>' +
        (appr && appr.note ? '<div class="sub-note">&#x1F4DD; '+appr.note+'</div>' : '') +
        (!appr ?
          '<div class="sub-actions">' +
            '<button class="btn-sm btn-approve" onclick="approveRecord(\''+type+'\','+id+',\'approved\')">&#x2713; Acknowledge</button>' +
            '<button class="btn-sm btn-flag" onclick="approveRecord(\''+type+'\','+id+',\'flagged\')">&#x26A0; Flag</button>' +
            '<button class="btn-sm" onclick="addNote(\''+type+'\','+id+')">+ Note</button>' +
          '</div>' :
          '<div style="font-size:0.625rem;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:0.06em;">' +
            (appr.status==='approved'?'&#x2713; Acknowledged':'&#x26A0; Flagged') + ' &middot; <button class="btn-sm" onclick="addNote(\''+type+'\','+id+')" style="font-size:0.625rem;">Edit note</button>' +
          '</div>'
        ) +
      '</div>';
    }

    var wasteHTML = waste.length ?
      waste.map(function(w){ return subRow('waste_log', w.id, w.item, w.qty+' '+w.unit+' · '+w.reason+(w.initials?' · '+w.initials:'')); }).join('') :
      '<div class="card" style="color:var(--text3);font-size:0.813rem;">No waste logged today.</div>';

    var bottleHTML = bottles.length ?
      bottles.map(function(b){ return subRow('bottle_log', b.id, b.wine, b.amount+' remaining'); }).join('') :
      '<div class="card" style="color:var(--text3);font-size:0.813rem;">No bottles logged today.</div>';

    var collatHTML = collat.length ?
      collat.map(function(c){
        var items = JSON.parse(c.items||'[]');
        var names = items.map(function(i){return (i.name||i)+' x'+(i.qty||1);}).join(', ');
        return subRow('collateral_requests', c.id, 'Collateral Request', names);
      }).join('') :
      '<div class="card" style="color:var(--text3);font-size:0.813rem;">No requests today.</div>';

    el.innerHTML =
      '<div class="section-label">Waste & Breakage</div>' + wasteHTML +
      '<div class="section-label">Open Bottles</div>' + bottleHTML +
      '<div class="section-label">Collateral Requests</div>' + collatHTML;
  });
}



function approveRecord(type, id, status) {
  supa.from('approvals').upsert({record_type:type, record_id:id, status:status, approved_at:new Date().toISOString()}, {onConflict:'record_type,record_id'})
    .then(function(r){
      if (r.error) { toast('Error'); return; }
      toast(status === 'approved' ? 'Acknowledged' : 'Flagged');
      renderSubmissions();
    });
}

function addNote(type, id) {
  var note = prompt('Add a manager note:');
  if (note === null) return;
  supa.from('approvals').upsert({record_type:type, record_id:id, status:'noted', note:note, approved_at:new Date().toISOString()}, {onConflict:'record_type,record_id'})
    .then(function(r){
      if (r.error) { toast('Error'); return; }
      toast('Note saved');
      renderSubmissions();
    });
}

// ── SCRATCHPAD ───────────────────────────────────────────────────
function renderScratch() {
  var el = document.getElementById('view-scratch');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F4DD;</div><div class="empty-text">Loading notes...</div></div>';

  supa.from('manager_notes').select('*').order('created_at',{ascending:false})
    .then(function(result) {
      var notes = result.data || [];
      var feed = notes.length ? notes.map(function(n) {
        var ts = new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
                 new Date(n.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        return '<div class="scratch-item">' +
          '<div style="flex:1;">' +
            '<div class="scratch-text">' + n.text + '</div>' +
            '<div class="scratch-meta">' + ts + '</div>' +
          '</div>' +
          '<button class="scratch-del" onclick="deleteNote('+n.id+')">&times;</button>' +
        '</div>';
      }).join('') :
      '<div class="card" style="color:var(--text3);font-size:0.813rem;">No notes yet.</div>';

      el.innerHTML =
        '<div class="section-label">Add Note</div>' +
        '<div class="card">' +
          '<textarea id="scratch-input" class="form-textarea" rows="3" placeholder="Tasks, reminders, shift notes..."></textarea>' +
          '<button class="btn-primary" style="margin-top:10px;" onclick="saveNote()">Save Note</button>' +
        '</div>' +
        '<div class="section-label">Notes</div>' +
        feed;
    });
}

function saveNote() {
  var text = document.getElementById('scratch-input').value.trim();
  if (!text) return;
  supa.from('manager_notes').insert({text:text})
    .then(function(r){
      if (r.error) { toast('Error saving'); return; }
      toast('Note saved');
      renderScratch();
    });
}

function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  supa.from('manager_notes').delete().eq('id',id)
    .then(function(r){ if(!r.error){ toast('Deleted'); renderScratch(); } });
}

// ─────────────────────────────────────────────
// REALTIME
// ─────────────────────────────────────────────
var inboxBadgeCount = 0;

function initManagerRealtime() {
  var submissionTables = ['waste_log', 'bottle_log', 'collateral_requests', 'checklist_completions'];

  submissionTables.forEach(function(tbl) {
    supa.channel('mgr-' + tbl)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: tbl }, function(payload) {
        inboxBadgeCount++;
        updateInboxBadge();
        // If currently on submissions tab, refresh it
        var active = document.querySelector('.view.active');
        if (active && active.id === 'view-submissions') renderSubmissions();
        // If on shift tab, refresh it
        if (active && active.id === 'view-shift') renderShift();
        // Toast notification
        var labels = { waste_log: 'Waste entry', bottle_log: 'Bottle log', collateral_requests: 'Collateral request', checklist_completions: 'Checklist completed' };
        toast((labels[tbl] || tbl) + ' submitted');
      })
      .subscribe();
  });

  // Listen for new manager alerts
  supa.channel('mgr-updates')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'updates' }, function() {
      var active = document.querySelector('.view.active');
      if (active && active.id === 'view-alerts') renderAlerts();
    })
    .subscribe();
}

function updateInboxBadge() {
  var tab = document.getElementById('nav-submissions');
  if (!tab) return;
  if (inboxBadgeCount > 0) {
    tab.style.position = 'relative';
    var badge = tab.querySelector('.rt-badge') || document.createElement('span');
    badge.className = 'rt-badge';
    badge.textContent = inboxBadgeCount;
    badge.style.cssText = 'position:absolute;top:4px;right:8px;background:var(--red-bright);color:#fff;border-radius:10px;font-size:0.5rem;font-weight:700;padding:1px 5px;min-width:14px;text-align:center;';
    if (!tab.querySelector('.rt-badge')) tab.appendChild(badge);
  }
}

</script>
