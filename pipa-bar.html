<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3B0D14">
<meta name="apple-mobile-web-app-title" content="Bar Tools">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>PiPa Bar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#3B0D14;--surface:#501828;--surface2:#62202E;--surface3:#7A2E3C;
  --text:#F5EDE8;--text2:#C4A49A;--text3:#8A6058;
  --accent:#8B4A44;--accent-bright:#A85A52;--accent-dim:rgba(139,74,68,0.3);
  --nav-bg:#F5EDE8;--nav-border:rgba(105,57,53,0.2);--nav-active:#693935;--nav-active-bg:rgba(105,57,53,0.1);
  --green:#1E5C38;--green-dim:rgba(30,92,56,0.25);--green-bright:#38966A;
  --red-dim:rgba(180,30,30,0.25);--red-bright:#E05050;
  --yellow-dim:rgba(200,165,20,0.2);--yellow-bright:#D4A830;
  --blue-dim:rgba(50,100,160,0.25);--blue-bright:#7AB0D8;--surface4:#8A3848;
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html{background:#3B0D14;min-height:100vh;}html{font-size:100%;}html,body{font-family:'DM Sans',sans-serif;background:#3B0D14;color:#F5EDE8;height:100%;overflow:hidden;-webkit-text-size-adjust:none;text-size-adjust:none;}
.header{position:fixed;top:0;left:0;right:0;z-index:100;padding:calc(var(--safe-top) + 10px) 16px 0;background:var(--bg);border-bottom:1px solid var(--surface3);}
.header-row{padding-bottom:10px;}
.header-subtitle{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);}
.updates-btn{background:var(--surface3);border:none;border-radius:20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.688rem;font-weight:700;padding:6px 12px;cursor:pointer;letter-spacing:0.03em;transition:background 0.15s;}
.updates-btn.active{background:var(--accent);color:#fff;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:6px 4px calc(var(--safe-bottom) + 6px);background:var(--nav-bg);border-top:1px solid var(--nav-border);display:flex;gap:2px;}.bottom-nav::after{content:"";position:fixed;bottom:0;left:0;right:0;height:env(safe-area-inset-bottom,0px);background:var(--nav-bg);z-index:99;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border-radius:10px;cursor:pointer;color:var(--nav-active);opacity:0.4;font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;transition:all 0.15s;}
.nav-tab .nav-icon{font-size:1.125rem;line-height:1;}
.nav-tab.active{opacity:1;background:var(--nav-active-bg);color:var(--nav-active);}
.scroll-area{position:fixed;top:calc(var(--safe-top) + 80px);bottom:calc(var(--safe-bottom) + 60px);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 24px;}
.view{display:none;background:#3B0D14;}.view.active{display:block;background:#3B0D14;}
.section-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:0 2px 8px;margin-top:18px;}
.section-label:first-child{margin-top:0;}
.form-group{margin-bottom:12px;}
.form-label{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text2);display:block;margin-bottom:6px;}
.form-input,.form-select{width:100%;padding:11px 12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--accent-bright);}
.form-input::placeholder{color:var(--text3);}
.form-select option{background:var(--surface2);}
/* Back Bar */
.item-row{display:flex;align-items:center;gap:8px;padding:10px;background:var(--surface);border-radius:var(--radius);margin-bottom:4px;min-height:52px;}
.item-row.counted{background:var(--surface2);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:0.844rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-name.counted{color:var(--text2);}
.item-meta{font-size:0.656rem;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:1px;display:flex;align-items:center;gap:6px;}
.count-cluster{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.count-field{display:flex;flex-direction:column;align-items:center;gap:2px;}
.count-label{font-size:0.5rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);}
.count-input{width:50px;height:42px;background:var(--bg);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1.063rem;font-weight:500;text-align:center;outline:none;-webkit-appearance:none;}
.count-input:focus{border-color:var(--accent-bright);}
.count-input.has-value{border-color:var(--green);background:var(--green-dim);}
.flag-btn{width:34px;height:42px;background:var(--surface3);border:none;border-radius:var(--radius-sm);color:var(--text3);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.flag-btn.flagged{background:var(--red-dim);color:var(--red-bright);}
.flag-pill{font-size:0.563rem;font-weight:700;padding:1px 5px;border-radius:4px;}
.flag-pill.low{background:var(--yellow-dim);color:var(--yellow-bright);}
.flag-pill.empty,.flag-pill.broken{background:var(--red-dim);color:var(--red-bright);}
.send-bar{padding:10px 0 4px;}
/* Buttons */
.btn-send{width:100%;padding:14px;border-radius:var(--radius);background:var(--surface3);color:var(--text);border:1px solid var(--surface4,var(--surface3));font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.02em;}
.btn-send:active{opacity:0.75;}
.btn-clear-sm{width:100%;padding:11px;border-radius:var(--radius);background:var(--surface2);color:var(--text2);border:none;font-size:0.75rem;font-weight:600;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;}
.btn-send-accent{width:100%;padding:14px;border-radius:var(--radius);background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
/* Specs/Wines */
.spec-search{width:100%;padding:11px 16px;background:var(--surface);border:1.5px solid var(--surface3);border-radius:24px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
.spec-search:focus{border-color:var(--accent-bright);}
.spec-search::placeholder{color:var(--text3);}
.spec-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.spec-filters::-webkit-scrollbar{display:none;}
.spec-filter{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text2);border:1.5px solid transparent;}
.spec-filter.active{border-color:var(--accent-bright);color:var(--text);background:var(--accent-dim);}
.recipe-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.recipe-header{padding:14px 14px 10px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;}
.recipe-name{font-size:0.938rem;font-weight:700;}
.recipe-sub{font-size:0.688rem;color:var(--text2);margin-top:3px;font-family:'JetBrains Mono',monospace;display:flex;gap:10px;}
.recipe-chevron{color:var(--text3);font-size:14px;transition:transform 0.2s;flex-shrink:0;padding-top:2px;}
.recipe-header.open .recipe-chevron{transform:rotate(180deg);}
.recipe-body{display:none;padding:0 14px 14px;}
.recipe-body.open{display:block;}
.recipe-meta-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.recipe-meta-tag{font-size:0.625rem;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--text2);}
.ing-table{width:100%;border-collapse:collapse;}
.ing-table tr{border-bottom:1px solid var(--surface3);}
.ing-table tr:last-child{border-bottom:none;}
.ing-table td{padding:7px 4px;font-size:0.813rem;vertical-align:middle;}
.ing-qty{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--accent-bright);width:46px;}
.ing-unit{font-size:0.688rem;color:var(--text2);width:40px;}
/* Submit / Collateral */
.coll-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border-radius:var(--radius);margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;}
.coll-item.selected{border-color:var(--accent-bright);background:var(--accent-dim);}
.coll-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.813rem;}
.coll-item.selected .coll-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.coll-name{font-size:0.844rem;font-weight:500;flex:1;}
.coll-qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.coll-qty{width:44px;height:34px;background:var(--bg);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.938rem;text-align:center;outline:none;-webkit-appearance:none;}
.custom-input-row{display:flex;gap:8px;margin:8px 0;}
.custom-input-row input{flex:1;padding:11px 12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.custom-input-row input::placeholder{color:var(--text3);}
.custom-input-row input:focus{border-color:var(--accent-bright);}
.add-btn{padding:11px 16px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;font-size:0.813rem;font-weight:700;cursor:pointer;}
.add-custom-btn{width:100%;padding:12px;border-radius:var(--radius);background:var(--surface);border:1px dashed var(--surface3);color:var(--text2);font-size:0.813rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;}
.submit-section-title{font-size:0.813rem;font-weight:700;color:var(--text);margin:20px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--surface3);display:flex;align-items:center;justify-content:space-between;}
.submit-section-title:first-child{margin-top:0;}
.log-item{background:var(--surface);border-radius:var(--radius);padding:11px 14px;margin-bottom:6px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.log-item-info{flex:1;min-width:0;}
.log-item-name{font-size:14px;font-weight:600;}
.log-item-meta{font-size:0.688rem;color:var(--text2);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.log-item-remove{background:none;border:none;color:var(--text3);font-size:1.25rem;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0;}
.log-add-form{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.form-row-3{display:flex;gap:8px;margin-bottom:10px;}
.form-row-3 .form-group{flex:1;min-width:0;}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.reason-pill,.amount-pill{padding:7px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--surface3);background:var(--surface2);color:var(--text2);transition:all 0.15s;user-select:none;}
.reason-pill.active{background:var(--accent-dim);color:var(--text);border-color:var(--accent-bright);}
.amount-pill.active{background:var(--green-dim);color:var(--green-bright);border-color:var(--green);}
.btn-add-entry{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--accent-bright);border:1px dashed var(--accent-bright);font-size:0.813rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
/* Updates */
.update-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:8px;}
.update-tag{display:inline-flex;padding:3px 8px;border-radius:20px;font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;}
.tag-86{background:var(--red-dim);color:var(--red-bright);}
.tag-new{background:var(--green-dim);color:var(--green-bright);}
.tag-spec{background:var(--accent-dim);color:var(--accent-bright);}
.tag-ops{background:var(--blue-dim);color:var(--blue-bright);}
.tag-info{background:var(--surface3);color:var(--text2);}
.update-text{font-size:14px;line-height:1.6;color:var(--text);}
.update-sub{font-size:0.688rem;color:var(--text3);margin-top:6px;font-family:'JetBrains Mono',monospace;}
/* Flag sheet */
.sheet-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);align-items:flex-end;}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:20px 16px calc(var(--safe-bottom) + 16px);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--surface3);margin:0 auto 18px;}
.sheet-title{font-size:1rem;font-weight:700;margin-bottom:16px;}
.flag-options{display:flex;gap:8px;margin-bottom:16px;}
.flag-opt{flex:1;padding:14px 8px;border-radius:var(--radius);border:2px solid var(--surface3);background:var(--surface2);color:var(--text2);font-size:0.75rem;font-weight:700;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.flag-opt .ficon{font-size:1.25rem;}
.flag-opt.sel-empty,.flag-opt.sel-broken{border-color:var(--red-bright);background:var(--red-dim);color:var(--red-bright);}
.flag-opt.sel-low{border-color:var(--yellow-bright);background:var(--yellow-dim);color:var(--yellow-bright);}
.flag-save{width:100%;padding:13px;border-radius:var(--radius);background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.flag-clear{width:100%;padding:11px;border-radius:var(--radius);background:var(--surface3);color:var(--text2);border:none;font-size:0.813rem;font-weight:600;cursor:pointer;margin-top:8px;}
.notes-area{width:100%;padding:12px;background:var(--surface2);border:1.5px solid var(--surface3);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none;line-height:1.5;}
.notes-area:focus{border-color:var(--accent-bright);}
.notes-area::placeholder{color:var(--text3);}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:0.813rem;line-height:1.6;}
.toast{position:fixed;top:calc(var(--safe-top) + 64px);left:50%;transform:translateX(-50%) translateY(-14px);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:0.813rem;font-weight:600;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* CHECKLIST */
.cl-toggle-row{display:flex;gap:8px;margin-bottom:14px;padding-top:4px;}
.cl-toggle{flex:1;padding:12px;border-radius:var(--radius);text-align:center;font-size:0.813rem;font-weight:700;cursor:pointer;background:var(--surface);color:var(--text2);border:1.5px solid var(--surface3);transition:all 0.15s;}
.cl-toggle.active{border-color:var(--accent-bright);background:var(--accent-dim);color:var(--text);}
.cl-progress-wrap{margin-bottom:12px;}
.cl-progress-bar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.cl-progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s;}
.cl-progress-label{font-size:0.688rem;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.cl-item{display:flex;align-items:center;gap:12px;padding:11px 12px;background:var(--surface);border-radius:var(--radius);margin-bottom:4px;cursor:pointer;min-height:48px;}
.cl-item.done{background:var(--surface2);}
.cl-box{width:26px;height:26px;border-radius:6px;border:2px solid var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--green-bright);transition:all 0.15s;}
.cl-item.done .cl-box{background:var(--green);border-color:var(--green);color:#fff;}
.cl-label{font-size:0.813rem;color:var(--text);flex:1;line-height:1.3;}
.cl-item.done .cl-label{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--surface3);}
.cl-send-bar{margin-top:16px;}

/* BAR PULL LIST */
.bb-pull-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;background:var(--surface);border-radius:var(--radius);margin-bottom:4px;border:1.5px solid transparent;transition:all 0.15s;}
.bb-pull-row.needed{background:var(--green-dim);border-color:var(--green);}
.bb-pull-row.eighty-six{background:var(--red-dim);border-color:var(--red-bright);}
.bb-pull-info{flex:1;min-width:0;}
.bb-pull-name{font-size:0.844rem;font-weight:500;color:var(--text);}
.bb-pull-cat{font-size:0.625rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.bb-pull-actions{display:flex;gap:6px;flex-shrink:0;}
.bb-btn-need{padding:7px 12px;border-radius:var(--radius-sm);background:var(--surface3);color:var(--text2);border:1.5px solid transparent;font-size:0.688rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.bb-btn-need.active{background:var(--green);color:#fff;border-color:var(--green);}
.bb-btn-86{padding:7px 12px;border-radius:var(--radius-sm);background:var(--surface3);color:var(--text2);border:1.5px solid transparent;font-size:0.688rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.bb-btn-86.active{background:var(--red-bright);color:#fff;border-color:var(--red-bright);}


/* BAR PULL — pipa-count style */
.bp-section-header{position:sticky;top:-12px;z-index:10;background:#3B0D14;padding:14px 6px 8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.bp-section-header h2{font-size:0.938rem;font-weight:700;color:var(--text);}
.bp-section-header h2 span{font-size:0.688rem;color:var(--text2);margin-left:8px;font-weight:400;}
.bp-progress{font-family:'JetBrains Mono',monospace;font-size:0.688rem;color:var(--green);background:var(--green-dim);padding:3px 8px;border-radius:8px;}
.bp-chevron{font-size:0.75rem;color:var(--text3);transition:transform 0.2s;margin-left:8px;}
.bp-section-header.collapsed .bp-chevron{transform:rotate(-90deg);}
.bp-section-body{overflow:hidden;}
.bp-section-body.collapsed{display:none;}
.bp-item-row{display:flex;align-items:center;padding:10px 8px;background:var(--surface);border-radius:var(--radius);margin-bottom:4px;gap:8px;min-height:52px;border-left:3px solid transparent;}
.bp-item-row.needed{background:var(--green-dim);border-left-color:var(--green);}
.bp-item-row.is86{border-left-color:var(--red-bright);}
.bp-item-info{flex:1;min-width:0;}
.bp-item-name{font-size:0.844rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bp-item-meta{font-size:0.656rem;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:1px;display:flex;align-items:center;gap:6px;}
.bp-badge{font-size:0.563rem;font-weight:700;padding:1px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:0.05em;}
.bp-badge.need{background:var(--green-dim);color:var(--green-bright);}
.bp-badge.s86{background:var(--red-dim);color:var(--red-bright);}
.bp-actions{display:flex;gap:4px;flex-shrink:0;align-items:center;}
.bp-btn{height:40px;padding:0 12px;border-radius:8px;background:var(--surface3);color:var(--text2);border:none;font-size:0.688rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.bp-btn.need.active{background:var(--green);color:#fff;}
.bp-btn.s86.active{background:var(--red-bright);color:#fff;}

/* WINE CARDS */
.wine-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;cursor:pointer;}
.wine-card-header{padding:16px 16px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.wine-card-left{flex:1;min-width:0;}
.wine-name{font-size:1rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px;}
.wine-appellation{font-size:0.688rem;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.wine-type-badge{flex-shrink:0;padding:4px 8px;border-radius:6px;font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
.wine-type-badge.Sparkling{background:rgba(200,175,30,0.18);color:#C8AF1E;}
.wine-type-badge.White{background:rgba(27,58,92,0.25);color:var(--blue-bright);}
.wine-type-badge.Rosé{background:rgba(184,92,0,0.18);color:#D4834A;}
.wine-type-badge.Red{background:rgba(160,30,30,0.25);color:var(--red-bright);}
.wine-type-badge.Specialty{background:var(--green-dim);color:var(--green-bright);}
.wine-card-body{display:none;padding:0 16px 16px;border-top:1px solid var(--surface3);}
.wine-card-body.open{display:block;}
.wine-section{margin-top:14px;}
.wine-section-label{font-size:0.563rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text2);margin-bottom:5px;border-bottom:1px solid var(--surface3);padding-bottom:4px;}
.wine-section-text{font-size:0.844rem;color:var(--text);line-height:1.6;}
.wine-pairings{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.wine-pairing-tag{font-size:0.688rem;padding:4px 9px;border-radius:6px;background:var(--surface2);color:var(--text2);font-weight:500;}

/* COLLATERAL COLLAPSIBLE CATEGORIES */
.coll-cat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 4px 8px;cursor:pointer;user-select:none;font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-top:14px;}
.coll-cat-header:first-child{margin-top:0;}
.coll-cat-chevron{font-size:0.75rem;color:var(--text3);transition:transform 0.2s;margin-left:4px;}
.coll-cat-header.collapsed .coll-cat-chevron{transform:rotate(-90deg);}
.coll-cat-body{overflow:hidden;}
.coll-cat-body.collapsed{display:none;}

/* CHECKLIST COLLAPSIBLE SECTIONS */
.cl-sec-header{display:flex;align-items:center;justify-content:space-between;padding:12px 4px 8px;cursor:pointer;user-select:none;margin-top:6px;}
.cl-sec-title{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);}
.cl-sec-chevron{font-size:0.75rem;color:var(--text3);transition:transform 0.2s;}
.cl-sec-header.collapsed .cl-sec-chevron{transform:rotate(-90deg);}
.cl-sec-body{overflow:hidden;}
.cl-sec-body.collapsed{display:none;}
.cl-sec-badge{font-size:0.625rem;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--text3);font-family:'JetBrains Mono',monospace;}
.cl-sec-badge.complete{background:var(--green-dim);color:var(--green-bright);}

.cl-complete-banner{background:var(--green-dim);border:1px solid var(--green);border-radius:var(--radius-sm);padding:8px 12px;font-size:0.75rem;font-weight:600;color:var(--green-bright);margin-bottom:4px;text-align:center;}.cl-complete-banner.incomplete{background:var(--yellow-dim);border-color:var(--yellow-bright);color:var(--yellow-bright);}
.cl-complete-btn{width:100%;padding:14px;border-radius:var(--radius);background:var(--surface3);color:var(--text);border:1.5px solid var(--surface3);font-size:0.875rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px;transition:all 0.15s;}
.cl-complete-btn:active{background:var(--green);border-color:var(--green);color:#fff;}

/* Prevent sticky headers from intercepting clicks on items below */
.bp-section-body{position:relative;z-index:1;}
.cl-sec-body{position:relative;z-index:1;}
.coll-cat-body{position:relative;z-index:1;}

/* Pull need stepper */
.need-stepper { display:flex; align-items:center; gap:0; }
.need-stepper-btn {
  width:28px; height:32px; border:none; cursor:pointer;
  background:var(--surface3); color:var(--text);
  font-size:1rem; font-weight:700; line-height:1;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; touch-action:manipulation;
}
.need-stepper-btn:first-child { border-radius:6px 0 0 6px; }
.need-stepper-btn:last-child  { border-radius:0 6px 6px 0; }
.need-stepper-btn.active-accent { background:var(--accent); color:#fff; }
.need-stepper-input {
  width:36px; height:32px;
  background:var(--surface2); border:none; border-top:1px solid var(--surface3); border-bottom:1px solid var(--surface3);
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:0.875rem; font-weight:700; text-align:center;
  -webkit-appearance:none; appearance:none; outline:none;
  padding:0;
}
.need-stepper-input::-webkit-inner-spin-button,
.need-stepper-input::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
.need-stepper-input.has-value { background:var(--accent); color:#fff; border-color:var(--accent); }
</style>

// ─────────────────────────────────────────────
var VENDOR_PREFIXES = ['Baldor', 'Beta', 'Filthy', 'Fever Tree'];
function displayName(n) {
  for (var i=0;i<VENDOR_PREFIXES.length;i++) if (n.indexOf(VENDOR_PREFIXES[i]+' ')===0) return n.slice(VENDOR_PREFIXES[i].length+1);
  return n;
}
function renderBackBar() {
  var el = document.getElementById('view-backbar');
  var html = '';

  BACK_BAR.forEach(function(sec, secIdx) {
    var needCount = sec.items.filter(function(it){ return pullNeeds[it.id]; }).length;
    var s86Count  = sec.items.filter(function(it){ return pull86[it.id]; }).length;
    var flagged   = needCount + s86Count;
    var progressHTML = flagged
      ? '<span class="bp-progress">' + needCount + ' need' + (s86Count ? ' &middot; ' + s86Count + " 86'd" : '') + '</span>'
      : '<span class="bp-progress" style="background:transparent;color:var(--text3);">0/' + sec.items.length + '</span>';

    var bbSecOpen = bbOpenSections[sec.section] ? '' : ' collapsed';
    html += '<div class="bp-sec-wrap">' +
      '<div class="bp-section-header' + bbSecOpen + '" onclick="toggleBPSection(this);event.stopPropagation();">' +
        '<h2>' + sec.section + '</h2>' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
          progressHTML +
          '<span class="bp-chevron">&#x25BE;</span>' +
        '</div>' +
      '</div>' +
      '<div class="bp-section-body' + bbSecOpen + '">';

    sec.items.forEach(function(item) {
      var needed = !!pullNeeds[item.id];
      var is86   = !!pull86[item.id];
      var rowCls = needed ? ' needed' : (is86 ? ' is86' : '');
      var _nq = typeof pullNeeds[item.id]==='number' ? pullNeeds[item.id] : (pullNeeds[item.id]?1:0);
      var badge = _nq > 0 ? '<span class="bp-badge need">Need ' + _nq + '</span>' : (is86 ? '<span class="bp-badge s86">86d</span>' : '');

      var needQty = typeof pullNeeds[item.id]==='number' ? pullNeeds[item.id] : (pullNeeds[item.id]?1:0);
      var safeId  = item.id.replace(/'/g, '');
      var needStepper =
        '<div class="need-stepper">' +
          '<button class="need-stepper-btn' + (needQty > 0 ? ' active-accent' : '') + '" ' +
            'onclick="stepPullNeed(\'' + safeId + '\',-1)" ontouchstart="">&#8722;</button>' +
          '<input class="need-stepper-input' + (needQty > 0 ? ' has-value' : '') + '" ' +
            'type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="99" ' +
            'value="' + (needQty > 0 ? needQty : '') + '" ' +
            'placeholder="0" ' +
            'data-id="' + safeId + '" ' +
            'oninput="setPullNeedDirect(this)" onfocus="this.select();">' +
          '<button class="need-stepper-btn' + (needQty > 0 ? ' active-accent' : '') + '" ' +
            'onclick="stepPullNeed(\'' + safeId + '\',1)" ontouchstart="">+</button>' +
        '</div>';

      var s86Btn = document.createElement('button');
      s86Btn.className = 'bp-btn s86' + (is86 ? ' active' : '');
      s86Btn.innerHTML = is86 ? "86'd" : '86';
      s86Btn.setAttribute('onclick', "togglePull86('" + item.id + "')");

      html +=
        '<div class="bp-item-row' + rowCls + '">' +
          '<div class="bp-item-info">' +
            '<div class="bp-item-name">' + item.name + '</div>' +
            '<div class="bp-item-meta">' + item.cat + (badge ? ' ' + badge : '') + '</div>' +
          '</div>' +
          '<div class="bp-actions">' +
            needStepper +
            s86Btn.outerHTML +
          '</div>' +
        '</div>';
    });

    html += '</div></div>';
  });

  var needTotal = Object.keys(pullNeeds).filter(function(k){return pullNeeds[k];}).length;
  var s86Total  = Object.keys(pull86).filter(function(k){return pull86[k];}).length;
  var total = needTotal + s86Total;

  html += '<div class="send-bar">';
  if (total > 0) {
    html += '<button class="btn-send" style="margin-bottom:8px;" onclick="postPullToUpdates()">Post Pull to Updates</button>';
    html += '<button class="btn-send" style="background:var(--surface2);color:var(--text2);margin-bottom:8px;" onclick="copyPullList()">Copy Pull List</button>';
    html += '<button class="btn-clear-sm" onclick="clearPullList()">Clear all flags</button>';
  }
  html += '</div>';

  el.innerHTML = html;
}

function toggleBPSection(header) {
  event.stopPropagation();
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
  var title = header.querySelector('h2');
  if (title) bbOpenSections[title.textContent.trim()] = !header.classList.contains('collapsed');
}



function stepPullNeed(id, delta) {
  var cur = typeof pullNeeds[id]==='number' ? pullNeeds[id] : (pullNeeds[id]?1:0);
  var next = Math.max(0, cur + delta);
  pullNeeds[id] = next;
  dbSet('pullNeeds', pullNeeds);
  renderBackBar();
}
function setPullNeedDirect(input) {
  var id  = input.dataset.id;
  var val = parseInt(input.value) || 0;
  if (val < 0) val = 0;
  pullNeeds[id] = val;
  input.classList.toggle('has-value', val > 0);
  // Update adjacent stepper buttons live
  var btns = input.parentElement.querySelectorAll('.need-stepper-btn');
  btns.forEach(function(b){ b.classList.toggle('active-accent', val > 0); });
  dbSet('pullNeeds', pullNeeds);
  // Update section badge without full re-render
  var needTotal2 = Object.keys(pullNeeds).filter(function(k){ return !!pullNeeds[k]; }).length;
  var s86Total2  = Object.keys(pull86).filter(function(k){ return pull86[k]; }).length;
  var total2 = needTotal2 + s86Total2;
  // Just refresh the badge in the section header
  var row = input.closest('.bp-item-row');
  if (row) {
    var metaEl = row.querySelector('.bp-item-meta');
    if (metaEl) {
      var cat = metaEl.textContent.split(' Need')[0].split(' 86')[0].trim();
      var badgeHTML = val > 0 ? ' <span class="bp-badge need">Need ' + val + '</span>' : '';
      metaEl.innerHTML = cat + badgeHTML;
    }
    row.className = 'bp-item-row' + (val > 0 ? ' needed' : '');
  }
}

function incrementPullNeed(id) {
  var cur = typeof pullNeeds[id]==='number' ? pullNeeds[id] : (pullNeeds[id]?1:0);
  pullNeeds[id] = cur + 1;
  dbSet('pullNeeds', pullNeeds);
  renderBackBar();
}
function clearPullNeed(id) {
  pullNeeds[id] = 0;
  dbSet('pullNeeds', pullNeeds);
  renderBackBar();
}

function togglePullNeed(id, event) {
  if (event) event.stopPropagation();
  if (pull86[id]) { pull86[id] = false; dbSet('pull86', pull86); }
  pullNeeds[id] = !pullNeeds[id];
  dbSet('pullNeeds', pullNeeds);
  renderBackBar();
}

function togglePull86(id, event) {
  if (event) event.stopPropagation();
  if (pullNeeds[id]) { pullNeeds[id] = false; dbSet('pullNeeds', pullNeeds); }
  pull86[id] = !pull86[id];
  dbSet('pull86', pull86);

  if (pull86[id]) {
    // Find item name
    var itemName = id;
    BACK_BAR.forEach(function(sec) {
      sec.items.forEach(function(item) {
        if (item.id === id) itemName = item.name;
      });
    });
    // Auto-post 86 update to Supabase
    supa.from('updates').insert({
      tag: '86', text: itemName + ' is 86’d — we are out for the shift.',
      date: TODAY, published: true
    }).then(function(r){ if(r.error) console.warn('86 update:', r.error.message); });
    // Save to pull_flags
    supa.from('pull_flags').insert({
      item_id: id, item_name: itemName, flag_type: '86'
    }).then(function(r){ if(r.error) console.warn('pull flag:', r.error.message); });
  }

  renderBackBar();
}

function clearPullList() {
  if (!confirm('Clear all flags?')) return;
  pullNeeds = {}; pull86 = {};
  dbSet('pullNeeds', pullNeeds); dbSet('pull86', pull86);
  renderBackBar();
}

function postPullToUpdates() {
  var needItems = [];
  var s86Items  = [];
  BACK_BAR.forEach(function(sec) {
    sec.items.forEach(function(item) {
      var qty = typeof pullNeeds[item.id]==='number' ? pullNeeds[item.id] : (pullNeeds[item.id]?1:0);
      if (qty > 0) needItems.push(item.name + (qty>1?' (x'+qty+')':''));
      if (pull86[item.id]) s86Items.push(item.name);
    });
  });
  if (!needItems.length && !s86Items.length) { toast('Nothing flagged to post'); return; }
  var lines = [];
  if (needItems.length) lines.push('Needs Pull: ' + needItems.join(', '));
  if (s86Items.length)  lines.push("86'd: " + s86Items.join(', '));
  supa.from('updates').insert({ tag: 'ops', text: lines.join(' — '), date: TODAY, published: true })
    .then(function(r) {
      if (r && r.error) { toast('Post failed: ' + r.error.message); return; }
      toast('Posted to Updates ✓');
    });
}

function copyPullList() {
  var date  = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  var lines = ['Bar Pull — ' + date, ''];
  var needLines = [];
  var s86Lines  = [];
  BACK_BAR.forEach(function(sec) {
    sec.items.forEach(function(item) {
      if (pullNeeds[item.id]) needLines.push('- ' + item.name);
      if (pull86[item.id])   s86Lines.push('- ' + item.name);
    });
  });
  if (needLines.length) { lines.push('NEEDS PULL:'); needLines.forEach(function(l){lines.push(l);}); lines.push(''); }
  if (s86Lines.length)  { lines.push("86'D:"); s86Lines.forEach(function(l){lines.push(l);}); lines.push(''); }
  var text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { toast('Copied to clipboard'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('Copied to clipboard');
  }
}


function onCount(input) {
  const id = input.dataset.id;
  const val = input.value.trim();
  if (val === '') { delete counts[id]; input.classList.remove('has-value'); }
  else { counts[id] = parseInt(val) || 0; input.classList.add('has-value'); }
  saveAll();
  const row = input.closest('.item-row');
  const hasAny = row.querySelectorAll('.count-input')[0].value.trim() !== '';
  row.classList.toggle('counted', hasAny);
  row.querySelector('.item-name').classList.toggle('counted', hasAny);
}

function clearBackBar() {
  if (!confirm('Clear all back bar counts?')) return;
  counts = {};
  itemFlags = {};
  saveAll();
  renderUpdates();
  toast('Counts cleared');
}

function sendToWhatsApp() {
  const date = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  let lines = [`🥃 *Back Bar Count — ${date}*`, ''];

  let anyCounted = false;
  BACK_BAR.forEach(sec => {
    const secLines = [];
    sec.items.forEach(item => {
      const val = counts[item.id];
      const flag = itemFlags[item.id];
      if (val !== undefined || flag) {
        anyCounted = true;
        let line = `• ${item.name}`;
        if (val !== undefined) line += `: ${val} btl`;
        if (flag) {
          line += ` — *${flag.type.toUpperCase()}*`;
          if (flag.note) line += ` (${flag.note})`;
        }
        secLines.push(line);
      }
    });
    if (secLines.length) {
      lines.push(`*${sec.section}*`);
      lines.push(...secLines);
      lines.push('');
    }
  });

  // Add any unflagged items not counted as "not checked"
  const flaggedOnly = [];
  BACK_BAR.forEach(sec => sec.items.forEach(item => {
    if (counts[item.id] === undefined && itemFlags[item.id]) {
      flaggedOnly.push(`• ${item.name} — *${itemFlags[item.id].type.toUpperCase()}*`);
    }
  }));
  if (flaggedOnly.length) {
    lines.push('*⚠️ Flagged (not counted)*');
    lines.push(...flaggedOnly);
    lines.push('');
  }

  if (!anyCounted && !flaggedOnly.length) {
    toast('Enter some counts first');
    return;
  }

  lines.push('_Sent via PiPa Bar app_');
  const msg = encodeURIComponent(lines.join('\n'));
  window.open(`https://wa.me/${RYAN_WHATSAPP}?text=${msg}`, '_blank');
}

let activeFlagId = null;

function openFlagSheet(id, name) {
  activeFlagId = id;
  document.getElementById('flagSheetTitle').textContent = name;
  const existing = itemFlags[id];
  document.getElementById('fopt-empty').className  = 'flag-opt' + (existing?.type==='empty'  ? ' sel-empty'  : '');
  document.getElementById('fopt-low').className    = 'flag-opt' + (existing?.type==='low'    ? ' sel-low'    : '');
  document.getElementById('fopt-broken').className = 'flag-opt' + (existing?.type==='broken' ? ' sel-broken' : '');
  document.getElementById('flagNote').value = existing?.note || '';
  document.getElementById('flagSheet').classList.add('open');
}

function closeFlagSheet(e) {
  if (e.target === document.getElementById('flagSheet'))
    document.getElementById('flagSheet').classList.remove('open');
}

function selectFlag(type) {
  document.getElementById('fopt-empty').className  = 'flag-opt' + (type==='empty'  ? ' sel-empty'  : '');
  document.getElementById('fopt-low').className    = 'flag-opt' + (type==='low'    ? ' sel-low'    : '');
  document.getElementById('fopt-broken').className = 'flag-opt' + (type==='broken' ? ' sel-broken' : '');
}

function saveFlag() {
  if (!activeFlagId) return;
  const selected = ['empty','low','broken'].find(t =>
    document.getElementById('fopt-' + t).className.includes('sel-'));
  const note = document.getElementById('flagNote').value.trim();
  if (selected || note) {
    itemFlags[activeFlagId] = { type: selected || 'low', note };
  }
  saveAll();
  document.getElementById('flagSheet').classList.remove('open');
  renderBackBar();
  toast('Flag saved');
}

function clearFlag() {
  if (!activeFlagId) return;
  delete itemFlags[activeFlagId];
  saveAll();
  document.getElementById('flagSheet').classList.remove('open');
  renderBackBar();
  toast('Flag cleared');
}

    if (opsRecipes && Array.isArray(opsRecipes) && opsRecipes.length > 0) return opsRecipes;
  } catch(e) {}
  return _getDefaultRecipes();
}

const MENUS = ['All','PiPa','Cortina','Mocktail','Next Menu'];

function renderSpecs() {
  const el = document.getElementById('view-specs');
  const allRecipes = getBarRecipes();
  const filtered = allRecipes.filter(r => {
    const menuOK   = specFilter === 'All' || r.menu === specFilter;
    const searchOK = !specSearch ||
      r.name.toLowerCase().includes(specSearch.toLowerCase()) ||
      r.ingredients.some(i => i.name.toLowerCase().includes(specSearch.toLowerCase()));
    return menuOK && searchOK;
  });

  const menuPillClass = { PiPa:'pill-pipa', Cortina:'pill-cortina', Mocktail:'pill-mocktail', 'Next Menu':'pill-next', Other:'pill-other' };

  const filterBtns = MENUS.map(m => `
    <div class="spec-filter ${specFilter===m?'active':''}" onclick="setMenuFilter('${m}')">${m}</div>`).join('');

  const recipesHTML = filtered.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No recipes match.</div></div>`
    : filtered.map(r => {
        const ings = r.ingredients.map(i => `
          <tr>
            <td class="ing-qty">${i.qty}</td>
            <td class="ing-unit">${i.unit}</td>
            <td>${i.name}</td>
          </tr>`).join('');
        const pillCls = menuPillClass[r.menu] || 'pill-other';
        return `
          <div class="recipe-card" id="rc-${r.id}">
            <div class="recipe-header" onclick="toggleRecipe('${r.id}')">
              <div>
                <div class="recipe-name">${r.name}</div>
                <div class="recipe-sub"><span>${r.glass}</span><span>${r.method}</span></div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="menu-pill ${pillCls}">${r.menu}</span>
                <span class="recipe-chevron">▾</span>
              </div>
            </div>
            <div class="recipe-body" id="rbody-${r.id}">
              <div class="recipe-meta-row">
                ${r.ice    ? `<span class="recipe-meta-tag">🧊 ${r.ice}</span>` : ''}
                ${r.garnish? `<span class="recipe-meta-tag">🍊 ${r.garnish}</span>` : ''}
              </div>
              <table class="ing-table">${ings}</table>
            </div>
          </div>`;
      }).join('');

  el.innerHTML = `
    <div style="position:sticky;top:-10px;z-index:10;background:var(--bg);padding:0 0 4px;">
      <input class="spec-search" type="text" placeholder="Search by name or ingredient…"
        value="${specSearch}" oninput="specSearch=this.value;renderSpecs()">
      <div class="spec-filters">${filterBtns}</div>
    </div>
    ${recipesHTML}`;
}

};

function renderSubmit() {
  const el = document.getElementById('view-collateral');

  // Waste entries
  const wasteItems = wasteLog.map((w, i) => `

      <div class="log-item-info">
        <div class="log-item-name">${w.item}</div>
        <div class="log-item-meta">${w.qty}&nbsp;${w.unit} &middot; ${w.reason}${w.initials ? ' &middot; ' + w.initials : ''}</div>
      </div>
      <button class="log-item-remove" onclick="removeWaste(${i})">&times;</button>
    </div>`).join('');

  const wasteReasonPills = WASTE_REASONS.map(r =>
    `<div class="reason-pill${wActiveReason === r ? ' active' : ''}" onclick="setWasteReason('${r}')">${r}</div>`
  ).join('');

  // Bottle entries
  const bottleItems = bottleLog.map((b, i) => `

      <div class="log-item-info">
        <div class="log-item-name">${b.wine}</div>
        <div class="log-item-meta">${b.amount} remaining &middot; ${b.date}</div>
      </div>
      <button class="log-item-remove" onclick="removeBottle(${i})">&times;</button>
    </div>`).join('');

  const amountPills = BOTTLE_AMOUNTS.map(a =>
    `<div class="amount-pill${bActiveAmount === a ? ' active' : ''}" onclick="setBottleAmount('${a}')">${a}</div>`
  ).join('');

  // Collateral
  let collItems = '';
  Object.keys(COLL_CATALOG).forEach(cat => {
    const catItems = COLL_CATALOG[cat];
    const selCount = catItems.filter(item => collateral.find(c => c.name === item)).length;
    const metaBadge = selCount ? ` <span style="font-size:0.625rem;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--accent-dim);color:var(--accent-bright);margin-left:6px;">${selCount} selected</span>` : '';
    var collCatOpen = collOpenCats[cat] ? '' : ' collapsed';
    collItems += '<div class="coll-cat-header' + collCatOpen + '" onclick="toggleCollCat(this)">' +
      `<span>${cat}${metaBadge}</span>` +
      `<span class="coll-cat-chevron">&#x25BE;</span>` +
    `</div>`;
    collItems += '<div class="coll-cat-body collapsed" onclick="event.stopPropagation()">';

    COLL_CATALOG[cat].forEach(item => {
      const ex       = collateral.find(c => c.name === item);
      const selected = !!ex;
      const qty      = ex ? ex.qty : '1';
      const enc      = encodeURIComponent(item);
      collItems += `<div class="coll-item${selected ? ' selected' : ''}" data-item="${enc}" onclick="toggleColl(event)">` +
        `<div class="coll-check">${selected ? '&#x2713;' : ''}</div>` +
        `<div class="coll-name">${item}</div>` +
        (selected ? `<div class="coll-qty-wrap" onclick="event.stopPropagation()">` +
          `<span style="font-size:11px;color:var(--text2);">Qty</span>` +
          `<input class="coll-qty" type="number" inputmode="numeric" value="${qty}" data-item="${enc}" oninput="updateCQ(this)">` +
          `</div>` : '') +
        `</div>`;
    });
    collItems += '</div>'; // close coll-cat-body
  });

  if (collCustom.length) {
    collItems += `<div class="section-label">Custom</div>`;
    collCustom.forEach((item, i) => {
      collItems += `<div class="coll-item selected">` +
        `<div class="coll-check">&#x2713;</div><div class="coll-name">${item.name}</div>` +
        `<div class="coll-qty-wrap" onclick="event.stopPropagation()">` +
          `<span style="font-size:11px;color:var(--text2);">Qty</span>` +
          `<input class="coll-qty" type="number" inputmode="numeric" value="${item.qty || 1}" data-ci="${i}" oninput="updateCCQ(this)">` +
        `</div>` +
        `<button data-ci="${i}" onclick="removeCC(this)" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>` +
        `</div>`;
    });
  }

  const totalItems = wasteLog.length + bottleLog.length + collateral.length + collCustom.length;

  el.innerHTML = `
    <div class="submit-section-title">
      <span>Waste &amp; Breakage</span>
      <span style="font-size:11px;color:var(--text2);">${wasteLog.length} logged</span>
    </div>
    ${wasteItems || '<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">Nothing logged yet.</div>'}
    <div class="log-add-form">
      <div class="form-group" style="margin-bottom:10px;">
        <label class="form-label">Item</label>
        <input class="form-input" id="w-item" placeholder="e.g. Campari, Negroni, rocks glass" type="text">
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">Qty</label>
          <input class="form-input" id="w-qty" placeholder="1" inputmode="decimal" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Unit</label>
          <select class="form-select" id="w-unit">
            <option>oz</option><option>btl</option><option>ea</option><option>pour</option><option>other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Initials</label>
          <input class="form-input" id="w-initials" placeholder="AB" maxlength="4" type="text" style="text-transform:uppercase;">
        </div>
      </div>
      <label class="form-label">Reason</label>
      <div class="pill-row">${wasteReasonPills}</div>
      <button class="btn-add-entry" onclick="addWasteEntry()">+ Add to Waste Log</button>
    </div>

    <div class="submit-section-title">
      <span>Open Bottle Log</span>
      <span style="font-size:11px;color:var(--text2);">${bottleLog.length} logged</span>
    </div>
    ${bottleItems || '<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">No open bottles logged yet.</div>'}
    <div class="log-add-form">
      <div class="form-group" style="margin-bottom:10px;">
        <label class="form-label">Wine Name</label>
        <input class="form-input" id="b-wine" placeholder="e.g. Allegrini Valpolicella" type="text">
      </div>
      <label class="form-label">Remaining</label>
      <div class="pill-row">${amountPills}</div>
      <button class="btn-add-entry" onclick="addBottleEntry()">+ Add to Bottle Log</button>
    </div>

    <div class="submit-section-title">
      <span>Collateral Requests</span>
      <span style="font-size:11px;color:var(--text2);">${collateral.length + collCustom.length} selected</span>
    </div>
    ${collItems}
    <button class="add-custom-btn" onclick="toggleCI()">+ Add custom item</button>
    ${customShowInput ? `<div class="custom-input-row"><input type="text" id="ciInput" placeholder="e.g. Ice bucket, bar towels..."><button class="add-btn" onclick="addCI()">Add</button></div>` : ''}

    <div class="send-bar" style="margin-top:16px;">
      <button class="btn-send" style="margin-bottom:8px;" onclick="saveToSupabase().then(function(){toast('Saved to log ✓');})">Save to Log</button>
      ${totalItems > 0 ? '<button class="btn-clear-sm" onclick="clearSubmit()">Clear all entries</button>' : ''}
    </div>`;

  var wi=document.getElementById('w-item'),wq=document.getElementById('w-qty');
  var wu=document.getElementById('w-unit'),wx=document.getElementById('w-initials'),bw=document.getElementById('b-wine');
  if(wi)wi.value=wItemVal; if(wq)wq.value=wQtyVal; if(wu)wu.value=wUnitVal; if(wx)wx.value=wInitialsVal; if(bw)bw.value=bWineVal;
  if(customShowInput)setTimeout(function(){var inp=document.getElementById('ciInput');if(inp)inp.focus();},50);
}

// Waste helpers
function setWasteReason(r) {
  var ei=document.getElementById('w-item'); var eq=document.getElementById('w-qty');
  var eu=document.getElementById('w-unit'); var ex=document.getElementById('w-initials');
  if(ei)wItemVal=ei.value; if(eq)wQtyVal=eq.value; if(eu)wUnitVal=eu.value; if(ex)wInitialsVal=ex.value;
  wActiveReason=(wActiveReason===r)?'':r;
  document.querySelectorAll('.reason-pill').forEach(function(p){p.classList.toggle('active',p.textContent.trim()===wActiveReason);});
}
function addWasteEntry() {
  const item = document.getElementById('w-item').value.trim();
  if (!item) { toast('Enter an item name'); return; }
  if (!wActiveReason) { toast('Select a reason'); return; }
  wasteLog.push({
    item, reason: wActiveReason,
    qty:      document.getElementById('w-qty').value.trim() || '1',
    unit:     document.getElementById('w-unit').value,
    initials: document.getElementById('w-initials').value.trim().toUpperCase(),
  });
  dbSet('wasteLog', wasteLog);
  wActiveReason='';
  wItemVal='';wQtyVal='';wInitialsVal='';wUnitVal='oz';
  renderSubmit();
  toast('Waste entry added');
}
function removeWaste(i) { wasteLog.splice(i, 1); dbSet('wasteLog', wasteLog); renderSubmit(); }

// Bottle helpers
function setBottleAmount(a) {
  var ew=document.getElementById('b-wine'); if(ew)bWineVal=ew.value;
  bActiveAmount=(bActiveAmount===a)?'':a;
  document.querySelectorAll('.amount-pill').forEach(function(p){p.classList.toggle('active',p.textContent.trim()===bActiveAmount);});
}
function addBottleEntry() {
  const wine = document.getElementById('b-wine').value.trim();
  if (!wine) { toast('Enter a wine name'); return; }
  if (!bActiveAmount) { toast('Select remaining amount'); return; }
  const today = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });
  bottleLog.push({ wine, amount: bActiveAmount, date: today });
  dbSet('bottleLog', bottleLog);
  bActiveAmount='';
  bWineVal='';
  renderSubmit();
  toast('Bottle entry added');
}
function removeBottle(i) { bottleLog.splice(i, 1); dbSet('bottleLog', bottleLog); renderSubmit(); }

// Collateral helpers
function toggleCollCat(header, event) {
  if (event) event.stopPropagation();
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
  var span = header.querySelector('span');
  if (span) collOpenCats[span.textContent.trim()] = !header.classList.contains('collapsed');
}

function toggleColl(event) {
  event.stopPropagation();
  if (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON') return;
  const name = decodeURIComponent(event.currentTarget.getAttribute('data-item'));
  const idx  = collateral.findIndex(c => c.name === name);
  if (idx >= 0) collateral.splice(idx, 1); else collateral.push({ name, qty: '1' });
  dbSet('collateral', collateral); renderSubmit();
}
function updateCQ(input) {
  const name = decodeURIComponent(input.getAttribute('data-item'));
  const item = collateral.find(c => c.name === name);
  if (item) { item.qty = input.value; dbSet('collateral', collateral); }
}
function toggleCI() { customShowInput = !customShowInput; renderSubmit(); }
function addCI() {
  const inp = document.getElementById('ciInput');
  const val = inp ? inp.value.trim() : '';
  if (!val) return;
  collCustom.push({ name: val, qty: '1' });
  dbSet('collcustom', collCustom); customShowInput = false; renderSubmit();
}
function removeCC(btn) { collCustom.splice(parseInt(btn.getAttribute('data-ci')), 1); dbSet('collcustom', collCustom); renderSubmit(); }
function updateCCQ(input) { const i = parseInt(input.getAttribute('data-ci')); if (collCustom[i]) { collCustom[i].qty = input.value; dbSet('collcustom', collCustom); } }
function clearSubmit() {
  if (!confirm('Clear all logged entries?')) return;
  wasteLog = []; bottleLog = []; collateral = []; collCustom = [];
  dbSet('wasteLog', wasteLog); dbSet('bottleLog', bottleLog);
  dbSet('collateral', collateral); dbSet('collcustom', collCustom);
  renderSubmit();
}

// Send all three sections in one WhatsApp message
function saveToSupabase() {
  wasteLog.forEach(function(w) {
    supa.from('waste_log').insert({item:w.item, qty:w.qty, unit:w.unit, reason:w.reason, initials:w.initials})
      .then(function(r){ if(r.error) console.warn('waste:', r.error); });
  });
  bottleLog.forEach(function(b) {
    supa.from('bottle_log').insert({wine:b.wine, amount:b.amount})
      .then(function(r){ if(r.error) console.warn('bottle:', r.error); });
  });
  var items = collateral.concat(collCustom);
  if (items.length) {
    supa.from('collateral_requests').insert({items:JSON.stringify(items)})
      .then(function(r){ if(r.error) console.warn('collat:', r.error); });
  }
}



// CHECKLIST — items loaded from Supabase
var CL_DATA   = { am: [], pm: [] };   // populated by loadClData()
var clLoaded  = false;
var clShift    = 'am';
var clChecked  = { am: dbGet('cl-am-'+TODAY)||{}, pm: dbGet('cl-pm-'+TODAY)||{} };
var clInitials     = dbGet('cl-initials') || '';
var clOpenSections = {};
var bbOpenSections = {};
var collOpenCats   = {};

function loadClData(cb) {
  if (clLoaded) { cb(); return; }
  supa.from('checklist_items')
    .select('*')
    .eq('active', true)
    .order('sort_order', { ascending: true })
    .then(function(r) {
      var rows = r.data || [];
      CL_DATA = { am: [], pm: [] };
      ['am','pm'].forEach(function(shift) {
        var bySection = {};
        var sectionOrder = [];
        rows.filter(function(x){ return x.shift === shift; }).forEach(function(row) {
          if (!bySection[row.section]) {
            bySection[row.section] = [];
            sectionOrder.push(row.section);
          }
          bySection[row.section].push(row.item);
        });
        CL_DATA[shift] = sectionOrder.map(function(sec) {
          return { section: sec, items: bySection[sec] };
        });
      });
      clLoaded = true;
      cb();
    });
}

function renderChecklist() {
  var el = document.getElementById('view-checklist');
  if (!clLoaded) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Loading checklist…</div></div>';
    loadClData(function() { renderChecklist(); });
    return;
  }
  var sections = CL_DATA[clShift];
  var checked  = clChecked[clShift];
  var total = 0, done = 0;
  sections.forEach(function(s){ total += s.items.length; });
  Object.keys(checked).forEach(function(k){ if(checked[k]) done++; });
  var pct = total ? Math.round((done/total)*100) : 0;

  var toggles = ['am','pm'].map(function(s){
    var lbl = s==='am' ? '&#x2600;&#xFE0F; AM Opening' : '&#x1F319; PM Closing';
    return '<div class="cl-toggle'+(clShift===s?' active':'') + '" onclick="setClShift(\''+s+'\')">'+lbl+'</div>';
  }).join('');

  var rows = '';
  var idx = 0;
  sections.forEach(function(sec) {
    // Count done/total for this section
    var secTotal = sec.items.length;
    var secDone  = 0;
    for (var i = idx; i < idx + secTotal; i++) {
      if (checked[String(i)]) secDone++;
    }
    var secComplete = secDone === secTotal;
    var progressBadge = secComplete
      ? '<span class="cl-sec-badge complete">&#x2713; Done</span>'
      : '<span class="cl-sec-badge">' + secDone + '/' + secTotal + '</span>';

    var clSecOpen = clOpenSections[sec.section] ? '' : ' collapsed';
    rows += '<div class="cl-sec-wrap">' +
      '<div class="cl-sec-header' + clSecOpen + '" onclick="toggleClSec(this)">' +
        '<span class="cl-sec-title">' + sec.section + '</span>' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
          progressBadge +
          '<span class="cl-sec-chevron">&#x25BE;</span>' +
        '</div>' +
      '</div>' +
      '<div class="cl-sec-body' + clSecOpen + '">';

    sec.items.forEach(function(item) {
      var key = String(idx);
      var d   = !!checked[key];
      rows += '<div class="cl-item'+(d?' done':'') + '" onclick="toggleCl(\''+key+'\')">'+
        '<div class="cl-box">'+(d?'&#x2713;':'')+'</div>'+
        '<div class="cl-label">'+item+'</div>'+
        '</div>';
      idx++;
    });
    rows += '</div></div>';
  });

  var label = clShift==='am' ? 'AM Opening' : 'PM Closing';
  var compKey  = 'cl-complete-' + clShift + '-' + TODAY;
  var compData = dbGet(compKey);
  var isIncomplete = compData && compData.indexOf('incomplete') >= 0;
  var compBanner = compData
    ? '<div class="cl-complete-banner' + (isIncomplete ? ' incomplete' : '') + '">&#x2713; ' + label + ' marked complete &middot; ' + compData + '</div>'
    : '';

  el.innerHTML =
    '<div style="position:sticky;top:-12px;z-index:10;background:var(--bg);padding:4px 0 12px;">' +
      '<div class="cl-toggle-row">' + toggles + '</div>' +
      '<div class="cl-progress-wrap">' +
        '<div class="cl-progress-bar"><div class="cl-progress-fill" style="width:'+pct+'%"></div></div>' +
        '<div class="cl-progress-label">'+done+'/'+total+' complete</div>' +
      '</div>' +
      compBanner +
    '</div>' +
    rows +
    '<div class="cl-send-bar">' +
      '<button class="cl-complete-btn" onclick="markClComplete()">&#x2713; Mark ' + label + ' Complete</button>' +
      '<button class="btn-clear-sm" onclick="clearCl()">Reset checklist</button>' +
    '</div>';
}

function toggleClSec(header) {
  event.stopPropagation();
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
  var title = header.querySelector('.cl-sec-title');
  if (title) clOpenSections[title.textContent] = !header.classList.contains('collapsed');
}


function setClShift(s) { clShift=s; renderChecklist(); }

function toggleCl(key) {
  var checked = clChecked[clShift];
  checked[key] = !checked[key];
  dbSet('cl-'+clShift+'-'+TODAY, checked);
  renderChecklist();
}

function saveClInit(input) {
  clInitials = input.value.toUpperCase();
  input.value = clInitials;
  dbSet('cl-initials', clInitials);
}

function clearCl() {
  if(!confirm('Reset all checkboxes for this shift?')) return;
  clChecked[clShift] = {};
  dbSet('cl-'+clShift+'-'+TODAY, {});
  dbSet('cl-complete-'+clShift+'-'+TODAY, null);
  renderChecklist();
}

function markClComplete() {
  var sections = CL_DATA[clShift];
  var checked  = clChecked[clShift];
  var total = 0, done = 0;
  sections.forEach(function(s){ total += s.items.length; });
  Object.keys(checked).forEach(function(k){ if(checked[k]) done++; });
  var missed = total - done;
  var label  = clShift === 'am' ? 'AM Opening' : 'PM Closing';

  if (missed > 0) {
    var confirmed = confirm(missed + ' item' + (missed > 1 ? 's' : '') + ' not completed. Mark ' + label + ' complete anyway?');
    if (!confirmed) return;
  }

  var time = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  var date = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  var ts   = time + ' · ' + date + (missed > 0 ? ' · ' + missed + ' item' + (missed > 1 ? 's' : '') + ' incomplete' : '');
  var key  = 'cl-complete-' + clShift + '-' + TODAY;
  dbSet(key, ts);
  supa.from('checklist_completions').insert({shift_type:clShift, done:done, total:total, missed:missed})
    .then(function(r){ if(r.error) console.warn('checklist:', r.error); });
  toast(label + ' marked complete');
  renderChecklist();
}



function renderUpdates() {
  var el = document.getElementById('view-updates');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">Loading updates...</div></div>';
  supa.from('updates').select('*').eq('published', true).order('date', {ascending:false})
    .then(function(result) {
      var data = result.data; var error = result.error;
      if (error || !data) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">📢</div><div class="empty-text">Could not load updates.</div></div>';
        return;
      }
      if (!data.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">📢</div><div class="empty-text">No updates yet.</div></div>';
        return;
      }
      var tagLabel = { '86':"🚫 86'd", 'new':'✅ New Item', 'spec':'📋 Spec Update', 'ops':'📦 Ops', 'info':'ℹ️ Info' };
      var tagClass = { '86':'tag-86', 'new':'tag-new', 'spec':'tag-spec', 'ops':'tag-ops', 'info':'tag-info' };
      el.innerHTML = data.map(function(u) {
        var lbl = tagLabel[u.tag] || u.tag;
        var cls = tagClass[u.tag]  || 'tag-info';
        var ds  = new Date(u.date).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
        return '<div class="update-card">' +
          '<span class="update-tag ' + cls + '">' + lbl + '</span>' +
          '<div class="update-text">' + u.text + '</div>' +
          '<div class="update-sub">' + ds + '</div>' +
        '</div>';
      }).join('');
    });
}

e to complement food. The black rooster (Gallo Nero) on the label = mark of authenticity.", "producer": "Small family estate in Gaiole in Chianti, one of the three historic Classico communes. Chianti Classico occupies the hills between Florence and Siena — Italy's most storied wine landscape.", "pairings": "Tagliatelle Bolognese, Lasagna Emiliana, Bistecca, Salumi e Formaggi, Salsicciotta pizza, Tagliatelle al Fungo"}, {"name": "Fontanafredda Barbera Briccotondo", "type": "Red", "appellation": "Piemonte DOC · Piemonte", "tasting": "Deep ruby, purple highlights. Fresh and fruit-forward: cherry, plum, blackcurrant, violet, light earthy note with hint of spice. Medium-full-bodied with very soft tannins and Barbera's signature striking acidity. Juicy, generous, refreshing.", "selling": "Barbera is Piemonte's everyday red — more planted than Nebbiolo and loved for food versatility. Naturally high acidity makes it one of the best pizza and pasta reds on the list. For guests who want Italian red without the tannin weight of Barolo or Chianti.", "producer": "Founded 1878 on House of Savoy land, Serralunga d'Alba, heart of the Barolo zone. Barbera is the most widely planted grape in Piemonte — the everyday wine of the region.", "pairings": "Salsicciotta pizza, Tagliatelle Bolognese, Lasagna Emiliana, Tagliatelle al Fungo, Salumi e Formaggi, Stinco di Maiale"}, {"name": "Allegrini Valpolicella", "type": "Red", "appellation": "Valpolicella DOC · Veneto", "tasting": "Transparent ruby. Fresh and vibrant: cherry, raspberry, violet, light dried herbs and spice. Light to medium-bodied, lively acidity, soft tannins. Smooth, easy, and bright. Serve slightly cool.", "selling": "Allegrini is one of Valpolicella's most respected estates, best known for Amarone. Made from Corvina, Corvinone, and Rondinella. For guests who want something lighter and more food-friendly than Chianti or Barbera.", "producer": "Quality leader in Valpolicella for generations, based in Fumane in the Classico zo var WINE_TYPES = ['All','Sparkling','White','Rosé','Red','Specialty'];
var wineFilter = 'All';
var wineSearch = '';

function renderWines() {
  var el = document.getElementById('view-wines');
  var filtered = WINE_NOTES.filter(function(w) {
    var typeOK   = wineFilter === 'All' || w.type === wineFilter;
    var searchOK = !wineSearch ||
      w.name.toLowerCase().includes(wineSearch.toLowerCase()) ||
      w.pairings.toLowerCase().includes(wineSearch.toLowerCase()) ||
      w.appellation.toLowerCase().includes(wineSearch.toLowerCase()) ||
      w.tasting.toLowerCase().includes(wineSearch.toLowerCase());
    return typeOK && searchOK;
  });

  var filterBtns = WINE_TYPES.map(function(t) {
    return '<div class="spec-filter' + (wineFilter===t?' active':'') + '" onclick="setWineFilter(\'' + t + '\')">' + t + '</div>';
  }).join('');

  var cards = filtered.map(function(w, i) {
    var pairingTags = w.pairings.split(',').map(function(p) {
      return '<span class="wine-pairing-tag">' + p.trim() + '</span>';
    }).join('');
    return '<div class="wine-card" onclick="toggleWineCard(this)">' +
      '<div class="wine-card-header">' +
        '<div class="wine-card-left">' +
          '<div class="wine-name">' + w.name + '</div>' +
          '<div class="wine-appellation">' + w.appellation + '</div>' +
        '</div>' +
        '<div class="wine-type-badge ' + w.type + '">' + w.type + '</div>' +
      '</div>' +
      '<div class="wine-card-body">' +
        '<div class="wine-section"><div class="wine-section-label">Tasting</div><div class="wine-section-text">' + w.tasting + '</div></div>' +
        '<div class="wine-section"><div class="wine-section-label">Selling Point</div><div class="wine-section-text">' + w.selling + '</div></div>' +
        '<div class="wine-section"><div class="wine-section-label">Producer</div><div class="wine-section-text">' + w.producer + '</div></div>' +
        '<div class="wine-section"><div class="wine-section-label">Pairings</div><div class="wine-pairings">' + pairingTags + '</div></div>' +
      '</div>' +
    '</div>';
  }).join('');

  var emptyState = filtered.length === 0
    ? '<div class="empty-state"><div class="empty-icon">🍷</div><div class="empty-text">No wines match your search.</div></div>'
    : '';

  el.innerHTML =
    '<div style="position:sticky;top:-12px;z-index:10;background:var(--bg);padding:0 0 4px;">' +
      '<input class="spec-search" type="text" placeholder="Search wine name, region, tasting, or food pairing..." ' +
        'value="' + (wineSearch||'') + '" oninput="wineSearch=this.value;renderWines()">' +
      '<div class="spec-filters">' + filterBtns + '</div>' +
    '</div>' +
    cards + emptyState;
}

function toggleWineCard(card) {
  var body = card.querySelector('.wine-card-body');
  var isOpen = body.classList.contains('open');
  // Close all open cards first
  document.querySelectorAll('.wine-card-body.open').forEach(function(b) { b.classList.remove('open'); });
  if (!isOpen) body.classList.add('open');
}


function setWineFilter(f) {
  wineFilter = f;
  renderWines();
}

// HELPERS
// ─────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }); }
  catch(e) { return d; }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
var _hd = document.getElementById('headerDate');
if (_hd) _hd.textContent = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

var _renderMap = { updates:renderUpdates, checklist:renderChecklist, backbar:renderBackBar, specs:renderSpecs, wines:renderWines, collateral:renderCollateral };
function recoverView() { try { var a=document.querySelector('.view.active'); if(a&&_renderMap[a.id.replace('view-','')]) _renderMap[a.id.replace('view-','')](); } catch(e){} }
document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='visible') setTimeout(recoverView,150); });
window.addEventListener('pageshow', function(e){ if(e.persisted) setTimeout(recoverView,150); });
setInterval(function(){ var a=document.querySelector('.view.active'); if(a&&a.children.length===0) recoverView(); },2000);

renderUpdates();

// ─────────────────────────────────────────────
// REALTIME SUBSCRIPTIONS
// ─────────────────────────────────────────────
function initRealtime() {
  // Listen for new updates — refresh Updates tab live
  supa.channel('bar-updates')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'updates' }, function(payload) {
      var active = document.querySelector('.view.active');
      if (active && active.id === 'view-updates') {
        renderUpdates();
      } else {
        // Show a badge on the updates nav button
        var btn = document.getElementById('updates-header-btn');
        if (btn) btn.style.background = 'var(--accent)';
      }
    })
    .subscribe();

  // Listen for 86 flags — show toast and refresh bar pull
  supa.channel('bar-pull-flags')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pull_flags' }, function(payload) {
      if (payload.new && payload.new.flag_type === '86') {
        toast('86 flagged: ' + payload.new.item_name);
      }
    })
    .subscribe();
}

initRealtime();
